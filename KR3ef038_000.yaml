front:
  text: 傷寒瑣言序醫之為道何道也曰君子之道也苟非存心有恆者可輕議哉何則夫藥之性能生人亦能殺人蓋操之不得其要則反生為殺矣惟君子則然心不苟故其為業必精及其臨病必詳以審故能化悲痛為歡欣小人之性忍以貪貪則惟利是圖忍則輕忽視人命逮及臨病則誇以略不察病之虛實輒投瞑眩之藥不殺人也幾希吾固為君子之道也豫晚年得子方逾弱冠柔軟多病習懶不能自強必非能受此道者日夜痛心懼夫吾歿之後有病委之庸醫足可以傷生滅性孟子云不孝有三無後為大有子多病不傳以濟生之道一旦夭扎祖宗之祀事絶矣豈為人父之道哉某今年七十有七衰邁殊甚桑榆之日豈能久照日夜用心以輯成傷寒明理續編論法雖略備非有師承口訣不能融會貫通於心又著瑣言一卷文雖鄙俚然言簡意到其中包括仲景不傳之妙皆世所未嘗聞見剖露肺肝以罄其蘊奧實升高之梯階當寶之如珠玉潛心玩繹搜索以盡厥旨有疑輒問不可因循務期日進高遠司馬溫公曰達則為良相不達則為良醫豈非君子之道乎汝宜服膺此訓敬慎而行之他日倘能以斯道濟人亦君子也若存心不古以吾言為妄謬反以斯道殺人負吾之用心非吾之子也正統十年乙丑中元日餘杭節菴道人陶華書明理續論序昔朱肱奉議著傷寒百問書成經進授醫博士其書付監刊行道遇豫章名醫宋道方因就質之宋為指駁數十條肱罔然自失由是書監不刊事見續易簡方雙鍾李知先又為歌括八韻二書吾鄉先輩例以為活人之書按魏志他傳云出書一卷此書可以活人則活人之名所由始而仲景傷寒論是也朱李二公雖知有仲景之書不能臻其閫奧未足以充活人之名正統改元余遊京師遇臨江劉志善先生授書一卷指摘百問亦數十條攜以南歸呈之松江趙景元先生奉議之書固未盡善而劉公所駁似為大闕後人無議為也且仲景之書流傳既久魚魯實多微辭奧旨之互見殘簡斷篇之後先朱公既未知其文又不知其證候然自漢魏以來高人逸士所著不傳於今者何可勝數因出示諸書曰郭白雲傷寒補亡龐安常卒病論韓祇和微旨楊仁齊傷寒類書王實證治常器之楊大授凡此數種皆有功於仲景而東南醫流所未見也景元亦自編一書曰傷寒類例久未之成不以示人庚寅冬豫病足不出戶庭數月因觀成無己明理論只五十證辨究詳明惜其未備於是乃集所見所聞比類附例斟酌而損益之遂成一書名曰明理續論姑以自備遺亡非敢傳諸人也雖朱公百問積平生之勤尚不免後人之紛紜言之豫實何人仍以數月而有所成蓋賴古人之成訓有以啓發之初學醫之士或有所得焉當有知豫心者乃記其所由於卷首云刻陶節菴傷寒六書序嘗聞治身猶治兵治兵者必精孫吳之韜略然後能偵虛實諳奇正而施攻守之方治身者必洞岐黃之奧旨然後能察寒熱知標本而施調劑之法如舍昔人之著述而談醫猶舍孫吳之兵法而賈勇也鮮有濟矣豫觀昔人之著惟傷寒最詳但說愈詳而施之者愈溷經候何以傳變陰陽何以運遞愚者暗於臨證智者逞於創奇不知張仲景郭白雲諸君盡生平之力而筆之於書豈無所見惟執一說而不究大全斯妙義當前而莫睹矣豫少好醫道嘗嘆疾之有傷寒猶兵之有侵軼也呼吸存亡瞬息生死因博求古今傷寒書得陶氏節菴六集如所云明理論家祕瑣言與殺車槌一提金截江網者鑿乎通天地和陰陽調血脈分營衛即虛邪賊風防之有法臨證施之毫髮不爽誠回生之精義仁壽之妙道也故梓之以廣其傳焉時萬曆壬子歲夏月朔日太醫院學生李存濟題
