body:
  text: 殺車槌法卷之三吾專傷寒深明奧旨脈正則道合神機用藥則隨手取應的本續論全備發明殺車槌法世之罕有永為養生之寶矣今將祕驗三十七方就注三十七槌法二十條煎法二十條劫病並制解法名殺車槌也實為我肺腑不傳之妙我後子孫一字不可輕露莫與俗人言莫使庸醫見爾宜謹慎珍藏毋違我之至囑也劫病法一傷寒發狂奔走人難制伏先於病人處生火一盆用醋一碗傾於火上其煙沖鼻入內即安方可察其陽狂陰躁親切用藥無差若初起頭疼發熱惡寒方除已後登高而歌棄衣而走逾垣上屋罵詈叫喊大渴欲死脈來有力乃因邪熱傳裡陽盛發狂當用寒藥下之此為陽狂凡見舌卷囊縮者不治若病起無頭疼身微熱面赤戴陽煩躁脈來沉微無力欲坐臥於泥水中乃因寒極而發躁即陰證似陽當用熱藥溫之此為陰躁凡見厥冷下利譫語者不治醫者不看脈以虛陽上膈而躁誤為實熱反與涼藥使渴盛燥急則氣消成大害矣須詳脈來有力無力此為良法一傷寒腹中痛甚將涼水一盞與病人飲之其痛稍可者屬熱痛當用涼藥清之清之不已而或繞臍硬痛大便結實煩渴屬燥屎痛急用寒藥下之若食積痛同治法若小腹硬痛小水自利大便黑身目黃者屬蓄血痛亦用寒劑加行血藥下盡黑物則愈此三者皆痛隨利減之法也若飲水愈加作痛屬寒痛當用溫藥和之和之不已而或四肢厥冷腹痛嘔吐瀉利急用熱藥救之須詳脈來有力無力此為良法一傷寒直中陰經真寒證甚重而無脈或吐瀉脫元而無脈將好酒薑汁各半盞與病人服之其脈來者可治當察其脈用藥不拘脈浮沉大小但指下出見者生如用此法脈不至者必死又當問病人有何疼痛處若有痛證要知痛甚者脈必伏宜隨病制宜如無痛證用此法而脈至者此為吉兆尤當問病人若平素原無正取脈須用覆手取之脈必見也此屬反關脈診法與正取法同若平素正取有脈後因病診之無脈者亦當覆手取之取之而脈出者陰陽錯亂也宜和合陰陽如覆取正取俱無脈者必死矣此為良法一傷寒舌上生苔不拘滑白黃黑俱用井水浸青布片於舌上洗淨後用生薑片子時時浸水刮之其苔自退凡見舌生黑苔芒刺者必死此熱毒入深十有九死是腎水克心火也若發黃者用生薑時時周身擦之其黃自退若心胸脅下有邪氣結實滿悶硬痛又法用生薑一斤搗渣去汁炒微燥帶潤用絹包於患處款款尉之稍可又將渣和均前汁炒乾再尉許久豁然寬快俱為良法一傷寒鼻衄成流久不止者將山梔炒黑色為細末吹入鼻內外將水紙搭於鼻沖其血自止若點滴不成流者其邪在經未解照後祕方用藥不在此法一傷寒熱邪傳裡服轉藥後鹽炒麩皮一升將絹包於病人腹上款款尉之使藥氣得熱則行大便易通矣一傷寒吐血不止用韭汁磨京墨呷下其血見黑必止如無韭汁用雞子清亦可正謂赤屬火而黑屬水也一傷寒直中陰經真寒證或陰毒證身如被杖腹中絞痛嘔逆沉重不知人事四體堅冷如石手指甲唇青藥不得入口六脈沉細或無脈欲絶者將蔥縛一握切去根葉取白三寸許搗如餅先用麝香半分填於臍中後放蔥餅臍上以火尉之連換二三餅稍醒灌入生薑汁煎服回陽救急湯如不醒再灸關元氣海二三十壯使熱氣通其內逼邪出於外以復陽氣如用此法手足不溫汗不出不省人事者必死也此為良法一傷寒熱病熱邪傳裡亢極無解用黃連煎水一盞放井中頓冷浸青布搭在胸中徐徐換之待熱勢稍退即除不可久漬夏天用此法冬天不宜用一傷寒服藥轉吐出不納者隨用竹管重捺內關後將生薑自然汁半盞熱飲其吐即止大凡服寒藥熱飲熱藥寒飲中和之劑溫和服之如要取汗雖辛甘之劑亦宜熱服如要止汗雖辛甘溫之劑亦宜溫服此為良法一中風痰厥昏迷卒倒不省人事欲絶者先用皂莢末捻紙燒煙衝入鼻中有嚏可治隨用吐痰法將皂莢末五分半夏白礬各三分為細末薑汁調服探吐後服導痰湯加減治之無嚏不可治此為良法一治乾霍亂不得吐者用滾湯一碗入皂莢末三分鹽一撮調服探吐莫與米湯設若與之即死是穀氣反助邪氣也一中寒卒倒昏迷不省者先用熱酒薑汁各半盞灌入稍醒後服加味理中飲為效如不飲酒人只用薑汁灌之依法調治此證冬月甚有之余月幾希矣製藥法一用附子去皮臍先將鹽水薑汁各半盞用沙鍋煮七沸後入黃連甘草各半兩再加童便半盞再煮七沸住火良久撈起入瓷器盛貯伏地氣一晝夜取出曬乾以備後用庶無毒害頂圓臍正一兩一枚者佳此為良法一用川大黃須錦紋者佳銼成飲片用酒拌均燥干以備後用不傷陰血如年壯實熱者生用不須制之此為良法一用麻黃去節先滾醋湯略浸片時撈起以備後用庶免太發如冬月嚴寒腠理致密當生用者不須制之此為良法一用茱萸將鹽水拌均炒燥以備後用庶無小毒此為良法解藥法一用附子後身目紅者乃附毒之過用蘿蔔搗水濾汁二大盞入黃連甘草各半兩犀角三錢煎至八分飲之以解附毒其紅即除如解遲必血從耳目口鼻出者必死無蘿蔔用蘿蔔子搗水取汁亦可此為良法如無蘿蔔子用澄清泥漿水亦可也一用大黃後瀉利不止者用烏梅二個炒粳米一撮乾薑三錢人參炒白朮各半兩生附子皮一錢半甘草一錢升麻少許燈心一握水二大鐘去滓後入炒陳壁土一匙調服即止取土氣以助胃氣也此為良法一用麻黃後汗出不止者將病人發披水盆中足露出外用炒糯米半升龍骨牡蠣藁本防風各一兩研為細末周身撲之隨後祕方用藥免致亡陽而死為良法煎藥法一用發汗藥先煎麻黃一二沸後入余藥同煎一用止汗藥先煎桂枝一二沸後入余藥同煎一用和解藥先煎柴胡一二沸後入余藥同煎一用下藥先煎滾水入枳實一二沸後入余藥同煎一用溫藥先煎乾姜一二沸後入余藥同煎一用行血藥先煎桃仁一二沸後入余藥同煎一用利水藥先煎豬苓一二沸後入余藥同煎一用止瀉藥先煎炒白朮一二沸後入余藥同煎一用消渴藥先煎天花粉一二沸後入余藥同煎一用止痛藥先煎白芍藥一二沸後入余藥同煎一用發黃藥先煎茵陳一二沸後入余藥同煎一用發斑藥先煎青黛一二沸後入余藥同煎一用發狂藥先煎石膏一二沸後入余藥同煎一用嘔吐藥先煎半夏一二沸後入余藥同煎一用勞力感寒藥先煎黃耆一二沸後入余藥同煎一用感冒傷寒藥先煎羌活一二沸後入余藥同煎一用暑證藥先煎香薷一二沸後入余藥同煎一用風病藥先煎防風一二沸後入余藥同煎一用腹如雷鳴藥先煎煨生薑一二沸後入余藥同煎一用濕證藥先煎蒼朮一二沸後入余藥同煎祕用三十七方就注三十七槌法升麻發表湯即麻黃湯自有加減法治冬月正傷寒頭痛發熱惡寒脊強脈浮緊無汗為表證此足太陽膀胱經受邪當發汗以頭如斧劈身如火熾者宜用此湯麻黃桂枝甘草杏仁升麻川芎防風白芷羌活本經發熱惡寒頭痛無汗而喘者本方加乾葛去升麻本經發熱惡寒身體痛者本方加蒼朮芍藥去杏仁本經惡寒發熱身癢面赤者以其不得小汗出故也本方去白芷杏仁加柴胡芍藥本經頭痛發熱惡寒胸中飽悶者本方加枳殼桔梗本經感寒深重服湯不作汗者宜再服至二三劑而汗不出者死本經汗後不解者宜再服量證輕重用麻黃升麻分多寡為當水二鍾姜三片蔥白二莖槌法加江西豆豉一撮煎之熱服取汗如神宜厚被覆首凡中病即止不得多服多則反加別病矣疏邪實表湯即桂枝湯自有加減法治冬月正傷風頭痛發熱惡寒脊強脈浮緩自汗為表證此足太陽膀胱經受邪當實表散邪無汗者不可服桂枝赤芍藥甘草防風川芎羌活白朮如汗不止加黃耆喘加柴胡杏仁胸中飽悶加枳殼桔梗水二鍾姜三片棗二枚槌法加膠飴二匙煎之溫服羌活沖和湯以代桂枝麻黃青龍各半等湯此太陽經之神藥也治春夏秋非時感冒暴寒頭痛發熱惡寒脊強無汗脈浮緊此足太陽膀胱經受邪是表證宜發散不與冬時正傷寒同治法此湯非獨治三時暴寒春可治溫夏可治熱秋可治濕治雜證亦有神也祕之不與庸俗知此奇妙耳本方自有加減法備開於後羌活一錢半防風一錢蒼朮一錢半黃芩一錢川芎一錢白芷一錢甘草一錢生地黃二錢細辛五分不可多如胸中飽悶加枳殼桔梗去生地黃夏月本方加石膏知母名神術湯如服此湯後不作汗本方加蘇葉喘而惡寒身熱本方加杏仁生地黃汗後不解宜再服汗下兼行加大黃釜底抽薪之法其春夏秋感冒非時傷風亦有頭痛惡寒身熱脈浮緩自汗宜實表本方去蒼朮加白朮汗不止加黃耆即加減沖和湯再不止以小柴胡加桂枝芍藥一錢如神水二鍾姜三片棗二枚煎至一鍾槌法加蔥白搗汁五匙入藥再煎一二沸如發汗用熱服止汗用溫服柴葛解肌湯即葛根湯本湯自有加減法治足陽明胃經受證目疼鼻乾不眠頭疼眼眶痛脈來微洪宜解肌屬陽明經病其正陽明腑病別有治法柴胡乾葛甘草黃芩芍藥羌活白芷桔梗本經無汗惡寒甚者去黃芩加麻黃冬月宜加春宜少夏秋去之加蘇葉本經有汗而渴者治法開在如神白虎湯下水二鍾姜三片棗二枚槌法加石膏末一錢煎之熱服柴胡雙解飲即小柴胡湯本方自有加減法治足少陽膽經受證耳聾脅痛寒熱嘔而口苦脈來弦數屬半表半裡宜和解此經膽無出入有三禁不可汗下吐也只有小柴胡一湯隨病加減再無別湯柴胡黃芩半夏甘草人參陳皮芍藥本經證小便不利者加茯苓本經嘔者入薑汁竹茹脅痛加青皮痰多加栝蔞仁貝母寒熱似瘧者加桂枝渴者加天花粉知母齒燥無津液加石膏嗽者加五味金沸草壞證加鱉甲本經證心下飽悶未經下者非結胸乃表邪傳至胸中未入乎腑證雖滿悶尚為在表只消小柴胡加枳桔未效就以本方對小陷胸加枳桔一服豁然其妙如神祕之不與俗人言之耳虛煩類傷寒證本方加竹葉炒粳米本經與陽明合病本方加葛根芍藥如拾芥婦人熱入血室加當歸紅花男子熱入血室加生地黃老婦人傷寒無表證其熱勝者本方加大黃甚者加芒硝水二鍾姜一片棗二枚槌法入生艾汁三匙煎之溫服桂枝大黃湯即桂枝湯內加大黃本方自有加減法治足太陰脾經受證腹滿而痛咽乾而渴手足溫脈來沉而有力此因邪熱從陽經傳入陰經也桂枝赤芍藥甘草大黃枳實柴胡本經腹滿不惡寒而喘者加大腹皮去甘草水二鍾姜一片棗二枚煎之臨服槌法入檳榔磨水二匙熱服加味理中飲即理中湯本方自有加減法治足太陰脾經受證自利不渴手足溫身無熱脈來沉而無力此屬臟寒乾薑白朮人參甘草肉桂陳皮茯苓厥陰消渴氣上衝心飢不欲食食即吐蛔腹痛大便實者本方加大黃蜜少許利之本經腹濡滿時減者依本方去甘草本經嘔吐者入半夏薑汁本經蜷臥沉重利不止少加附子利後身體痛者急溫之加附子自利腹痛者入木香磨薑汁調服和之水二鍾姜一片棗二枚煎之臨服槌法入炒陳壁土一匙調服取土氣以助胃氣茵陳將軍湯即茵陳湯本方自有加減法治足太陰脾經腹滿身目發黃小水不利大便實發渴或頭汗至頸而還脈來沉重者宜用大黃茵陳山梔甘草厚朴黃芩枳實大便自調者去大黃厚朴加大腹皮利小便清為效水二鍾姜一片槌法加燈心一握煎之熱服導赤散即五苓散本方自有加減法治小水不利小腹滿或下焦蓄熱或引飲過多或小水短赤而渴脈沉數者以利小便為先惟汗後亡津液與陽明汗多者則以利小便為戒茯苓豬苓澤瀉桂枝白朮甘草滑石山梔中濕身目黃者加茵陳水結胸證加木通燈心如小水不利而見頭汗出者乃陽脫也得病起無熱但譫語煩躁不安精采不與人相當此湯治之水二鍾姜一片燈心二十莖槌法入鹽二字調服六乙順氣湯以代大承氣小承氣調胃承氣大柴胡三乙承氣湯大陷胸等湯之神藥也舉世無人知此奇妙耳祕之莫與俗人言本方自有加減法備開此湯治傷寒熱邪傳裡大便結實口燥咽乾怕熱譫語揭衣狂妄揚手擲足斑黃陽厥潮熱自汗胸腹滿硬繞臍疼痛等證悉皆治之效不盡述大黃枳實黃芩厚朴甘草柴胡芒硝芍藥潮熱自汗譫語發渴揚手擲足揭去衣被狂妄斑黃大便實者俱屬正陽明胃腑病依本方口燥咽乾大便實者屬少陰依本方下利純清心下硬痛而渴者屬少陰依本方怕熱發渴譫妄手足乍冷乍溫大便實者陽厥證屬厥陰依本方舌卷囊縮者難治須急下之譫語發渴大便實繞臍硬痛者有燥屎依本方熱病目不明謂神水已竭不能照物病已篤矣惟宜急下依本方目中不了了即目不明也轉屎氣者謂下泄也有燥屎焉當下之依本方如更衣者止後服不必盡劑不更衣者宜再少與大便通者愈結胸證心下硬痛手不可近燥渴譫語大便實者依本方去甘草加甘遂桔梗凡傷寒過經及老弱並血氣兩虛之人或婦人産後有下證或有下後不解或有表證尚未除而里證又急不得不下者用此湯去芒硝下之則吉蓋恐轉藥硝性燥急故有此戒大凡傷寒邪熱傳裡結實須看熱氣淺深用藥今之庸醫與俗醫不分當急下可少與宜微和胃氣之論一概用大黃芒硝亂投湯劑下之因茲枉死者多矣余謂傷寒之邪傳來非一治之則殊耳病有三焦俱傷者則痞滿燥實堅全俱宜大承氣湯厚朴苦溫以去痞枳實苦寒以泄滿芒硝鹹寒以潤燥軟堅大黃苦寒以泄實去熱病斯愈矣邪在中焦則有燥實堅三證故用調胃承氣湯以甘草和中芒硝潤燥大黃泄實不用枳朴恐傷上焦虛無氤氳之元氣調胃之名自此然矣上焦受傷則痞而實用小承氣湯枳實厚朴之能除痞大黃之泄實去芒硝不傷下焦血分之真陰謂不伐其根本也若夫大柴胡湯則有表證尚未除而里證又急不得不下者只得以此湯通表裡而緩治之猶有老弱及血氣兩虛之人亦宜用此故經云轉藥孰緊有芒硝者緊也大承氣最緊小承氣次之調胃承氣又次之大柴胡又次之其大柴胡加大黃小柴胡加芒硝方為轉藥蓋為病輕者設也仲景又云蕩滌傷寒熱積皆用湯液切禁丸藥不可不知也上先將水二鍾滾三沸後入藥煎至八分槌法臨時服入鐵鏽水三匙調服立效取鐵性沉重之義最能墜熱開結有神此千金不傳之祕若非吾之子孫承繼焉肯泄露玄機故戒耳如神白虎湯即白虎湯本方自有加減法治身熱渴而有汗不解或經汗過渴不解脈來微洪宜用石膏知母甘草人參山梔麥門冬五味子心煩者加竹茹一團如大渴心煩背惡寒者依本方去山梔加天花粉無渴不可服此藥為大忌水二鍾棗一枚姜一片槌法加淡竹葉十片煎之熱服三黃石膏湯此湯治陽毒發斑身黃如塗朱眼珠如火狂叫欲走六脈洪大燥渴欲死鼻乾面赤齒黃過經不解已成壞證表裡皆熱欲發其汗病熱不退又復下之大便遂頻小便不利亦有錯治溫證而成此證者又八九日已經汗下後脈洪數身壯熱拘急沉重欲治其內由表未解欲發其表則里證又急趑趄不能措手待斃而已殊不知熱在三焦閉塞經絡津液榮衛不通遂成此證又治汗下後三焦生熱脈洪譫語不休晝夜喘息鼻時加衄身目俱黃狂叫欲走者通用此湯治之有神人所不識石膏一兩半黃芩黃連黃柏各七錢山梔三十個麻黃五分香豉二合水二鍾姜三片棗一枚槌法入細茶一撮煎之熱服三黃巨勝湯此湯治陽毒發斑狂亂妄言大渴叫喊目赤脈數大便燥實不通上氣喘急舌卷囊縮難治者權以此湯劫之三黃石膏湯內去麻黃豆豉加大黃芒硝是也水二鍾姜一片棗二枚煎之槌法臨服入泥漿清水二匙調服即安沖和靈寶飲治兩感傷寒起於頭痛惡寒發熱口燥舌乾以陽先受病多者以此湯探之中病即愈羌活防風川芎生地黃細辛黃芩柴胡甘草乾葛白芷石膏水二鍾煨生薑三片棗二枚槌法入黑豆一撮煎之溫服取微汗為愈如不愈表證多而甚急者方可用麻黃葛根為解表如里證多而甚急者先以調胃承氣為攻裡是也如以陰經自中病發熱下利身疼痛脈沉細無力不渴蜷臥昏重者又當先救里溫之回陽救急湯是分表裡寒熱而治此其權變大法也歟古云兩感雖為死證猶有可救之理及用藥先後寒熱之劑若發表攻裡一誤則枉死者多矣良可痛哉深可惜哉豫將不傳之妙祕驗之方盡吐露非惟救人有功亦且陰騭匪輕謹之慎之毋怠毋忽桃仁承氣對子即桃仁承氣湯本方自有加減法治熱邪傳裡熱蓄膀胱其人如狂小水自利大便黑小腹滿痛身目黃譫語燥渴為蓄血證脈沉有力宜此湯下盡黑物則愈未服前而血自下者為欲愈不宜服桃仁桂枝芒硝大黃芍藥柴胡青皮當歸甘草枳實水二鍾姜三片煎之臨服槌法入蘇木煎汁三匙調服消斑青黛飲治邪熱傳裡裡實表虛血熱不散熱氣乘於皮膚而為斑也輕則如疹子重則如錦紋重甚則斑爛皮膚或本屬陽誤投熱藥或當下不下或下後未解皆能致此不可發汗重令開泄更加斑爛也然而斑之方萌與蚊跡相類發斑多見於胸腹蚊跡只在於手足陽脈洪大病人昏憒先紅後赤者斑也脈不洪大病人自靜先紅後黃者蚊跡也其或大便自利怫鬱氣短燥屎不通又如果靨者盧醫復生不能施其巧矣凡汗下不解足冷耳聾煩悶咳嘔便是發斑之候黃連甘草石膏知母柴胡玄參生地黃山梔犀角青黛人參大便實者去人參加大黃上水二鍾姜一片棗二枚煎之槌法臨服入苦酒一匙調服生地芩連湯此湯治鼻衄成流久不止者或熱毒入深吐血不止者宜用黃芩山梔桔梗甘草生地黃柴胡川芎芍藥犀角如無升麻代之外用劫法水紙搭於鼻沖如去血過多錯語失神撮空閉目不知人事者同治法水二鍾棗二枚煎至八分槌法臨服入茅根搗汁磨京墨調飲如無茅根以藕搗汁亦可加味犀角地黃湯此湯治煩躁漱水不下咽者屬上焦有瘀血宜用犀角生地黃牡丹皮芍藥甘草桔梗陳皮紅花當歸水二鍾姜二片煎之臨服槌法入生藕節搗汁三匙溫服回陽救急湯即四逆湯本方自有加減法治寒邪直中陰經真寒證初病起無身熱無頭疼只惡寒四肢厥冷戰栗腹疼吐瀉不渴引衣自蓋蜷臥沉重或手指甲唇青或口吐涎沫或至無脈或脈來沉遲而無力者宜用熟附子乾薑人參甘草白朮肉桂陳皮五味子茯苓半夏或嘔吐涎沫或有小腹痛加鹽炒茱萸無脈者加豬膽汁一匙泄瀉不止加升麻黃耆嘔吐不止加薑汁水二鍾姜三片煎之臨服入麝香三釐調服中病以手足溫和即止不得多服多則反加別病矣如後止可用前理中飲加減治之無妨回陽反本湯此湯治陰盛格陽陰極發躁微渴面赤欲坐臥於泥水井中脈來無力或脈全無欲絶者宜用熟附子乾薑甘草人參麥門冬五味子臘茶陳皮面戴陽者下虛也加蔥七莖黃連少許用澄清泥漿水一鍾煎之臨服入蜜五匙頓冷服之取汗為效柴胡百合湯此湯治瘥後昏沉發熱渴而錯語失神及百合勞復等證柴胡人參黃芩甘草知母百合生地黃陳皮渴加天花粉胸中煩躁加山梔有微頭疼加羌活川芎嘔吐入薑汁炒半夏胸中飽悶加枳殼桔梗食復者加枳實黃連甚重大便實者加大黃胸中虛煩加竹茹竹葉瘥後乾嘔錯語失神呻吟睡不安者加黃連犀角咳喘者加杏仁百合宜加麻連心中驚惕為血少加當歸茯苓遠志虛汗者加黃耆脾倦加白朮腹如雷鳴加煨生薑勞復時熱不除加葶藶烏梅生艾汁水二鍾棗一枚姜三片槌法醋煮鱉甲煎之溫服如聖飲治剛柔二痓頭搖口噤身反張手足攣搐頭面赤項強急與瘛瘲同治法羌活防風川芎白芷柴胡芍藥甘草當歸烏藥半夏黃芩有汗是柔痓加白朮桂枝無汗是剛痓加麻黃蒼朮口噤咬牙者如大便實用大黃利之水二鍾姜三片煎之臨服入薑汁竹瀝溫服溫經益元湯治因汗後大虛頭眩振振欲劈地並肉瞤筋惕及因發汗太多衛虛亡陽汗不止或下後利不止身疼痛者並皆治之熟地黃人參白朮黃耆甘草白芍藥當歸生地黃白茯苓陳皮肉桂附子如飽悶加枳殼去地黃如瘦人去芍藥有熱去附子利不止加炒白朮升麻陳壁土去當歸地黃嘔者加薑汁製半夏渴者加天花粉汗後惡風寒屬表虛去附子肉桂生地黃加桂枝膠飴水二鍾姜三片棗一枚槌法加糯米一撮煎之溫服逍遙湯治有患傷寒瘥後血氣未平勞動助熱復還於經絡因與婦人交接淫欲而復發不易有病者謂之勞復因交接淫欲而無病人反得病者謂之陰陽易豫曾見舌出數寸而死者多矣此證最難治必宜此湯人參知母竹青如卵縮腹痛倍加黃連甘草滑石生地黃韭根柴胡犀角水二鍾棗二枚姜三片煎之槌法臨服入燒裩襠末一錢半調服有黏汗出為效不黏汗出再服以小水利陰頭腫即愈升陽散火湯此湯治有患人叉手抹胸尋衣摸床譫語昏沉不醒人事俗醫不識見病便呼為風證而因風藥誤人死者多矣殊不知肝熱乘於肺金元氣虛不能自主持名曰撮空證小便利者可治小便不利者不可治人參當歸柴胡芍藥黃芩甘草白朮麥門冬陳皮茯神有痰者加薑汁炒半夏大便燥實譫語發渴加大黃泄漏者加升麻炒白朮水二鍾姜三片棗二枚槌法入金首飾煎之熱服再造散治患頭疼發熱項脊強惡寒無汗用發汗藥二三劑汗不出者庸醫不識此證不論時令遂以麻黃重藥及火劫取汗誤人死者多矣殊不知陽虛不能作汗故有此證名曰無陽證黃耆人參桂枝甘草熟附細辛羌活防風川芎煨生薑夏月加黃芩石膏冬月不必加水二鍾棗二枚煎至一鍾槌法再加炒芍藥一撮煎三沸溫服黃龍湯治有患心下硬痛下利純清水譫語發渴身熱庸醫不識此證但見下利便呼為漏底傷寒而便用熱藥止之就如抱薪救火誤人死者多矣殊不知此因熱邪傳裡胃中燥屎結實此利非內寒而利乃日逐飲湯藥而利也宜急下之名曰結熱利證身有熱者宜用此湯身無熱者用前六乙順氣湯大黃芒硝枳實厚朴甘草人參當歸年老氣血虛者去芒硝水二鍾姜三片棗子二枚煎之後再加桔梗煎一沸熱服為度調榮養衛湯即補中益氣湯治有患頭疼身熱惡寒微渴濈然汗出身作痛腳腿痠疼無力沉倦脈空浮而無力庸醫不識因見頭疼惡寒發熱便呼為正傷寒而大發其汗所以輕變重而害人者多矣殊不知勞力內傷氣血外感寒邪宜少辛甘溫之劑則愈名曰勞力感寒證故經云勞者溫之損者溫之溫能除大熱正此謂也有下證者大柴胡下之則緩人參黃耆當歸生地黃川芎柴胡陳皮甘草細辛羌活防風白朮元氣不足者加升麻少許須知元氣不足者至陰之下求其升口渴加天花粉知母喘嗽加杏仁去升麻汗不止加芍藥去升麻細辛胸中煩熱加山梔竹茹乾嘔者加薑汁炒半夏胸中飽悶加枳殼桔梗去生地黃甘草黃耆白朮少許痰盛者加栝蔞仁貝母去防風細辛腹痛去耆術加芍藥乾薑和之其因血鬱內傷有痛處或大便黑加桃仁紅花去芍辛羌防黃耆白朮太甚者加大黃下盡瘀血則愈後撮本方去大黃調理水二鍾姜三片棗二枚槌法入蔥白一莖煎之溫服導赤各半湯治患傷寒後心下不硬腹中不滿大小便如常身無寒熱漸變神昏不語或睡中獨語一二句目赤唇焦舌乾不飲水稀粥與之則咽不與則不思形如醉人庸醫不識而誤人者多矣殊不知熱傳手陰心也心火上而逼肺所以神昏名越經證黃連黃芩甘草犀角麥門冬滑石山梔茯神知母人參水二鍾薑棗煎之槌法加燈心一握煎沸熱服益元湯治有患身熱頭疼全無不煩便作躁悶面赤飲水不得入口庸醫不識呼為熱證而用涼藥誤死者多矣殊不知元氣虛弱是無根虛火泛上名曰戴陽證熟附甘草乾薑人參五味麥門冬黃連知母蔥艾水二鍾姜一片棗二枚煎之臨服槌法入童便三匙頓冷服桂苓飲治有患初得病無熱譫語煩躁不安精采不與人相當庸醫不識呼為狂發誤用下藥死者多矣殊不知此因熱結膀胱名曰如狂證豬苓澤瀉桂枝甘草白朮知母黃柏山梔蕀葉水二鍾姜三片煎至一鍾槌法再加滑石末一錢煎三沸溫服取微汗為效當歸活血湯治有患無頭疼無惡寒止則身熱發渴小水利大便黑口出無倫語庸醫不識呼為熱證而用涼劑誤人多矣殊不知內傳心脾二經使人昏迷沉重故名挾血如見祟當歸赤芍藥甘草紅花桂心乾薑枳殼生地黃人參柴胡桃仁泥服三帖後去桃仁紅花乾薑桂心加白朮茯苓水二鍾姜一片煎之槌法入酒三匙調服加味導痰湯治有患憎寒壯熱頭痛昏沉迷悶上氣喘急口出涎沫庸醫不識皆為傷寒治之誤人多矣殊不知此因內傷七情以致痰迷心竅神不守舍神出舍空空則痰生也名曰挾痰如鬼祟痰證類傷寒與此同治法茯苓半夏南星枳實黃芩白朮陳皮甘草桔梗黃連栝蔞仁人參年力壯盛先用吐痰法次服此湯水二鍾姜三片棗二枚煎之臨服槌法入竹瀝薑汁溫服加減調中飲治食積類傷寒頭疼發熱惡寒氣口脈緊盛但身不痛此與為異耳經云飲食自倍腸胃乃傷輕則消化重則吐下此良法也蒼朮厚朴陳皮甘草白朮山楂神麯枳實草果黃連乾薑腹中痛加桃仁痛甚大便實熱加大黃下之去山楂草果神麯乾薑心中兀兀欲吐者與乾霍亂同吐法用滾水一碗入鹽一撮皂莢末五分探吐水二鍾姜一片煎之槌法臨服入木香磨取汁調飲即效加減續命湯治腳氣類傷寒頭疼身熱惡寒肢節痛便祕嘔逆腳軟屈弱不能轉動但起於腳膝耳禁用補劑及淋洗防風芍藥白朮川芎防己桂枝甘草麻黃蒼朮羌活暑中三陽所患必熱脈來數去桂枝麻黃加黃芩黃柏柴胡寒中三陰所患必冷脈來遲加附子起於濕者脈來弱加牛膝木瓜起於風者脈來浮加獨活元氣虛加人參少許大便實者加大黃水二鍾棗二枚姜一片燈心二十莖煎之槌法入薑汁調之溫服芩連消毒湯治天行大頭病發熱惡寒頭項腫痛脈洪取作痰火治之其喉痹者亦照此方治之柴胡甘草桔梗川芎黃芩荊芥黃連防風羌活枳殼連翹射干白芷先加大黃利去一二次後依本方去大黃加人參當歸調理水二鍾姜三片煎至一鍾鼠黏子一撮再煎一沸槌法入竹瀝薑汁調服六神通解散治時行三月後謂之晚發頭痛身熱惡寒脈洪數先用沖和湯不愈後服此湯麻黃甘草黃芩石膏滑石蒼朮川芎羌活細辛水二鍾姜三片槌法入豆豉一撮蔥白二莖煎之熱服取汗中病即止
