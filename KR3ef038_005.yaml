body:
  text: 傷寒證脈藥截江網卷之五傷寒傷寒之病非比雜科乃大方脈之首務也其間脈理精深艮震無常死生反掌甚所難明苟或有稱治傷寒者未免羊質虎皮然則名譽虛隆而實德則病矣余早年盲學昏昏如蠅觸牖後得漢長沙張仲景先師治法所得石函遺著名曰遺芳嘉祕玩而誦之以開茅塞手足舞蹈不自知也數試數驗豈不珍重哉第恐吾老子亦猶前之昏學臨病無措故將遺旨應手得心訣法纂以成集名曰傷寒證脈藥截江網存與朝夕備覽以看省己之愚原夫傷寒之脈浮大動數滑為陽沉澀弱弦微為陰其弦緊浮滑沉澀六者為殘賊之脈故諸脈作病春弦夏洪秋毛冬石土緩為四季之正脈浮沉遲數為客主左為人迎右為氣口呼出心肺為陽吸入腎肝為陰一呼一吸為一息寸口為陽尺澤為陰中為關界陽主氣陰主血血為榮氣為衛寒則傷榮風則傷衛理自然也所謂傷寒之病從淺入深先以皮膚肌肉次入筋骨腸胃專以浮中沉遲數辨其陰陽寒熱及表裡虛實而斷之矣諸浮為在表輕手於皮膚之上便得之曰浮略重指於皮膚之下肌肉之上陰陽各半得之曰中證屬半表半裡諸沉為在裡重手於肌肉之下筋骨之間方得之曰沉屬陰諸遲為在臟屬寒諸數為在腑屬熱陰陽寒熱虛實用在有力無力中分有力者為陽為熱為實無力者為陰為寒為虛雜病以弦為陽傷寒以弦為陰雜病以緩為弱傷寒以緩為和傷寒以大為病進以緩為邪退緩為胃脈有胃氣曰生無胃氣曰死傷寒病中有神脈如脈中有力即為有神神者氣血之先也兩手無脈曰雙伏一手無脈曰單伏必有正汗也寸口陽脈中或見沉細者但無力者為陽中伏陰尺部陰脈中或見沉數者為陰中伏陽寸口數大有力為重陽尺部微而無力為重陰寸口細微如絲為脫陽尺部細微無力為脫陰寸脈浮而有力主寒邪表實宜汗浮而無力主風邪表虛宜實尺脈沉而有力主陽邪在裡為實宜下無力主陰邪在裡為虛宜溫寸脈弱而無力切忌發汗尺脈弱而無力切忌汗下初按來疾去遲名曰內虛外實去疾來遲名曰內實外虛尺寸俱同名曰緩緩者和而生也汗下後脈靜者生燥亂身熱者死乃邪氣勝也溫之後脈來歇止者正氣脫而不復生也純弦之脈名曰負負者死按之解索名曰陰陽離離者死陰病見陽脈者生陽病見陰脈者死傷寒標本論治病之有標本猶草之有根苗拔茅須連其茹治病必求其本標本不明處方何據所謂瞑目夜行無途路而可見矣原夫六氣為本三陰三陽經為標病氣為本臟腑經絡受病為標先受病為本次受病為標且如尺寸俱浮者太陽受病也其經標本膀胱小腸也膀胱寒水為本其脈循脊上連風府故頭疼脊強小腸為標主發熱其正冬月時在本者麻黃湯在標者桂枝湯余月改用沖和湯也尺寸俱長者陽明受病也其經標本大腸與胃也大腸為標燥金為本大腸與肺為表裡但發熱解肌湯本脈絡鼻循目故目痛鼻乾不眠虛則汗解實則大柴胡承氣選用尺寸俱弦者少陽受病也其經標本三焦與膽也三焦相火本也遊行乎一身故微熱足膽標也其脈循脅絡耳故耳聾脅痛寒熱嘔而口苦緣膽無出入之路故從中治證用小柴胡和解散而愈其經有三禁汗下吐是也尺寸俱沉者太陰受病也其經標本肺與脾也肺標脈循咽脾本濕土故腹滿咽乾當得本治宜泄大柴胡承氣也尺寸俱微沉者少陰受病也其經標本心與腎君火為本心苗舌故舌燥標腎脈循肺主口乾故口乾舌燥故在標者因身冷治主薑附也在本者宜下三乙承氣看微甚而用之尺寸俱微緩厥陰受病也其經標本肝與心包絡也風木為本下循陰器故囊縮標心包絡系舌故舌卷大抵溫之四逆輩其四經並前三經中若有陽分傳來者下之庶不誤也論傷寒正治逆治反攻寒熱辨寒熱真假不可不知正治逆治豈可不辨假如熱病服寒藥熱不退後用熱藥而熱方退假如寒病服熱藥而寒不退後用寒藥而寒方退者此為從治也從治者反攻也治熱病以寒藥而愈治寒病以熱而愈者逆治也逆治者正治也且反攻之法人亦難曉者多如寒病服寒藥而愈者此陽極變陰熱極反得水化也熱病服熱藥而愈者此陰極變陽寒極反得火化也蓋物極則反也論傷寒用藥法則標本逆從之既明五劑之藥須用識且如表汗用麻黃無蔥白不發吐痰用瓜蒂無豆豉不湧去實熱用大黃無枳實不通溫經用附子無干薑不熱甚則以泥清水加蔥白煎之竹瀝無薑汁不能行經絡蜜導無皂角不能通祕結非半夏薑汁不能止嘔吐非人參竹葉不能止虛煩非小柴胡不能和解表裡非五苓散不能通利小便非天花粉乾葛不能消渴解肌非人參麥門冬五味不能生脈補元非犀角地黃不能止上焦之吐衄非桃仁承氣不能破下焦之瘀血非黃耆桂枝不能實表間虛汗非茯苓白朮不能去濕助脾非茵陳不能除黃疸非承氣不能制定發狂非枳桔不能除痞滿非陷胸不能開結胸非羌活沖和不能治四時之感冒身疼非人參敗毒不能治春瘟非四逆不能救陰厥非人參白虎不能化斑非理中烏梅不能治蛔厥非桂枝麻黃不能除冬月之惡寒熱隨汗解非薑附湯不能止陰寒之泄利非大柴胡不能去實熱之妄言陰陽咳嗽上氣喘急用加減小青龍分表裡而可汗下此傷寒用藥之大法也傷寒統論受病之由夫傷寒者冬時天氣嚴寒水冰地凍而成殺厲之氣正乃腎與膀胱坎水用事體虛觸冒之人中而即病曰傷寒不即病者乃寒毒藏於肌膚此因腎水涸竭春木無以發生熱不能發泄藏鬱於內遇感而發至春變為溫病至夏變為熱病熱病重於溫病也雖曰傷寒實為熱病非時行之氣春應暖而反寒夏應熱而反涼秋應涼而反熱冬應寒而反溫此非其時而有其氣是一歲之中長幼病皆相似者也是時行不正之氣非暴厲之氣暴厲者疫病也疫病者乃春分至秋分前天有暴寒皆為時行之寒疫也又有四時之正氣者春氣溫和夏氣暑熱秋氣清涼冬氣凜冽此四時之正氣也然正氣亦能為病春傷於風夏必飧泄夏傷於暑秋必瘧痢秋傷於濕冬必咳嗽冬傷於寒春必溫病總曰傷寒病自外而入或入於陽或入於陰非但始於太陽終於厥陰或有太陽傷者或有傳至一二經而止者或有始終只在一經者或有越經而傳者或有入太陽不作鬱熱便入少陰而成陰證者或有直中陰經而成寒證者緣經無明文故多妄治若三陽傳至三陰之陰證外雖有厥冷內有熱邪耳若不發熱四肢便厥惡寒者此是直中陰經之陰證也蓋先起三陽氣分傳入三陰血分則熱深厥亦深矣此亢則害承乃制者歟熱極反兼寒化也先熱後厥者傳經陰證也故宜四逆散大承氣看微甚而下之如初病無熱便厥者此直中陰經之寒證也宜四逆湯溫之傷寒無陰證辨傷寒無陰證人傷於寒則為病熱熱病乃汗病也造化汗液皆陽氣也冬時腎水用事為傷寒者其風傷於榮衛使人毫毛畢直皮膚閉而為熱初入太陽膀胱受證頭疼惡寒發熱腰脊強直按至皮膚之上下手便得脈來浮緊有力無汗為傷寒表證寒則傷榮血冬用麻黃湯開發腠理表汗除邪脈來浮緩無力有汗怕風為傷風風則傷衛氣冬用桂枝湯充塞腠理止汗散邪其餘月時雖無惡寒為重也治三時感寒無汗以羌活沖和去地黃加紫蘇藿香以發散之有汗用加減羌活湯如用桔梗湯止汗退邪必加涼藥於中免斑出黃生之患此謂無伐天和也若將冬時正傷寒之藥通治非時暴感寒熱定為害矣論傷寒難拘日數辨假如一日至十三日若有一毫頭痛惡寒者每日如此不論日數多少尚有表證未解還用微汗不可攻裡若攻下之則為結胸等證一二日惡寒皆除便覺胸中滿悶疼痛大便閉渴而不惡寒反怕熱熱入里也大柴胡承氣下之切不可拘於日數並始太陽終厥陰之論也二三日邪傳陽明胃身熱目痛鼻乾不眠按至皮膚之下肌肉之間脈來微洪而長者屬半表半裡渴而無汗葛根湯渴而有汗人參白虎湯微微惡寒者桂枝湯若無頭疼惡寒而反怕熱便閉燥渴狂言譫語揭去衣被揚手擲足者此為熱邪傳入陽明之本脈來沉數有力正宜承氣湯下之泄去胃中實熱燥屎而愈也三四日邪傳少陽膽胸脅痛而耳聾寒熱嘔而口苦按至半陰半陽及脈來弦數者是半表半裡也緣膽無出入之路用小柴胡其經有三禁汗下吐也蓋陽明與少陽二經不從標本從乎中治也中者半表半裡兩陽交中名曰少陽也四五日邪傳太陰脾腹滿咽乾口燥而渴按至筋骨之間脈來沉而有力者桂枝大黃湯若不渴自利身無熱脈來沉緩無力者四逆湯溫之也五六日邪傳少陰腎舌乾口燥重指按至筋骨之間脈來沉而有力者正用大柴胡承氣下之若發渴自利清水不多腹脹者亦當下之俱是陽邪傳入陰經之陰證也若有一時初起不入太陽竟入太陰無頭疼身熱便見四肢厥冷怕寒或腹痛自利小便清白脈沉無力或脈全無者此是直中陰經之陰證也非是三陽傳來急用附子理中湯溫之脈沉有二陰陽寒熱虛實用在有力無力中分有力為熱無力為寒又有少陰太陽二證相併脈沉無力當無熱今反有熱如不頭痛者陰證反陽也麻黃細辛湯身發熱脈當浮大今反沉細若有頭痛者陽證反陰也四逆湯主之六七日邪傳厥陰肝煩渴囊縮舌卷耳聾身不熱大便閉按至筋骨之間脈實弦而有力正用承氣下之此邪從三陽傳入三陰外有厥冷內有邪熱耳如脈微而無力腹痛自利不渴四肢厥冷怕寒者真陰寒證也附子理中湯溫之口中出沫流涎者亦寒也茱萸理中湯主之傷寒陽厥陰厥辨陽厥脈沉而有力腹痛後重大便稠黏小便赤澀或大便不通必是先熱後發厥也其四肢雖冷上不過肘下不過膝此熱深陽厥也承氣湯下之陰厥脈沉而無力口不渴四肢痛甚及大便泄利小便清白而身怕寒面如刀刮四肢厥冷上過乎肘下過乎膝此陰厥也四逆湯治之兩陽交盡名曰厥陰也大抵三陰無傳經胃實熱可下也又有傷寒兩感者病為巨陽老陰也看傷寒識證內外須知大抵傷寒先須識證察得陰陽表裡虛實寒熱親切復審汗吐下溫和解之法治之庶無差誤先看兩目次看口舌後以手按其心胸至小腹有無痛滿用藥如目皆黃必為欲愈之病也眼胞忽陷目睛直視必難治也開目欲見人屬陽閉目不欲見人屬陰目睛不明神水已竭不能照物者亦難治也次看口舌上有白苔者為熱見黃苔者為熱甚見黑苔及生芒刺者必死後按其心胸有痛而滿悶者亦未經下之為表邪尚在少陽部分只用小柴胡湯加枳殼桔梗為的如按其心下滿痛甚者已經下矣為結胸正用陷胸湯看微甚而用之陷胸宜從緩治結胸證煩躁悉具者死也如小腹覺有硬痛當按其痛處更問其小便通利若何如通則知蓄血下焦宜破瘀血用桃仁承氣湯下盡黑物為好如小便不通則知津液留結宜五苓散加木通山梔治之但覺發熱惡寒頭痛腰脊強脈浮不拘日數即是太陽表證浮緊有力無汗為傷寒宜發汗浮緩無力有汗為傷風宜實表但見肢痛咽乾而渴身無熱手足溫脈沉有力明是熱邪傳來太陰里證宜當下之如肢痛自利不渴惡寒手足厥冷脈沉無力此是太陰自受寒也宜當溫之但見口燥咽乾而渴妄語怕熱大便閉或微利清水而大渴脈沉有力明是熱邪傳來少陰里證不拘日數即宜下之如肢痛泄利嘔吐怕寒手足厥冷不渴脈沉無力此是少陰直中自受內寒陰證急用溫之但見舌卷囊縮而渴身不熱外雖四肢厥冷內有實熱脈來沉緩有力或大便閉實明是熱邪傳來厥陰之證即宜下之如肢痛泄利嘔吐不渴怕寒四肢厥冷小便清利脈微無力此是厥陰自中其寒證也急宜溫之俱照前六經中用藥其一切燥渴大便閉發狂譫語腹滿微厥斑血證脈來有力者俱是從三陽邪熱傳入三陰里證宜當下之輕重用藥無疑如寒當急溫之不可緩也有傷寒一日傳二經為兩感三日傳盡必死再傳止於六日夫兩感發於表者麻黃葛根湯也攻裡者調胃承氣湯也如未盡善須問病者有無痛處大小便通利若胸痛者為結胸不痛者為痞氣乃因下早而成也未經下者非結胸也乃表邪傳至胸中證雖滿悶尚有表邪未及乎腑正屬少陽部分用小柴胡湯加枳殼以治之如未效以本方加小陷胸湯服之而愈痛甚者大陷胸湯下之論傷寒傳足不傳手之誤傷寒傳足不傳手此謬言也人之一身無非血氣且風行水動氣行血流晝夜循環而運行不息豈有不傳手經哉何所據也冬月腎水用事天氣嚴寒則足少陰太陽正司受傷二經最多其次是少陽厥陰肝膽繼冬而施春令蓋風木起於大寒之節即正當十二月中至春分方行溫令故風寒傷之足陽明太陰脾胃中土中土無定位無成名寄旺於四時寒熱之氣皆能傳也其邪亦歸於胃其手之經主於夏秋故不傷也若言傷足不傷手正理也若言傳足不傳手非理也論傷寒六經變正法夫六經傳變所由必須緊記誦不釋手可也且如鄭聲者手足鄭重冷而為虛也譫語有虛有實虛則失血亡陽實則內熱便閉脾約者大便硬而小便利水穀不化臟寒也久利不止曰腸癖傷寒十三日不好曰過經吐長蛔曰蛔厥陰厥發躁曰陰躁手足冷者為之厥指頭微寒情之縱汗吐下溫不好曰壞證又若何為逆逆而有四或變為溫瘧或變為風濕或變為溫毒或變為溫疫此四者是也發汗出不止曰漏風亦為亡陽大下損血為亡陽陽證汗出不止曰亡陽大衄取汗發狂者曰亡陽大抵皆無汗其有汗者曰亡陽三月至夏方發為晚發冬感寒而春發者曰溫病非時暴寒伏於少陰之經咽痛下利名曰腎傷寒發汗後身灼熱者曰風溫名中暍感四時不正之氣老幼相似者為疫癘病瘥後必發者曰勞復病瘥後多食而發者曰食復病瘥後發熱者曰遺熱吐利交作曰霍亂鼻中出血曰衄逆咳者曰嗽乾嘔者曰噦大便挾寒下利曰腸垢大便堅硬曰硬心振寒而動曰悸渴飲水而吐曰水逆心中惱亂不安而悶者曰憹懊皮膚不知癢痛者曰不仁振握而動曰肉瞤筋惕臍下有動氣曰奔豚上有吐者曰湧之下利者曰泄之手足攣搐者曰瘛瘲四肢風病曰末疾厥而下利當不食反能食者曰除中三陰無合病三陽俱病者曰合病二陽先病後一陽自病曰並病湊泄之所曰腠曰理婦人之中二曰理也論傷寒見證識病法傷寒之病從表入里里必達外見證之由所屬必相審治庶無誤也且如頭痛項強者太陽證也頭搖者里病也頭汗者里有瘀血必發黃也面戴陽者下虛也面慘不光傷寒也面光不慘傷風也面上乍黑乍白唇口生瘡狐惑也面如錦紋者陽毒也口難言血少也舌上有白苔黃苔內熱也或黑者熱極也鼻燥漱水不下或目瞑溺血也目睛黃小腸熱也憹懊者胃虛也喜惡如狂蓄血也肉瞤筋惕汗下虛也身如被杖陰毒也一身盡痛多眠或微腫難轉者風濕也身目俱黃濕熱疸病也身如蟲行表虛也背惡寒陰勝寒也不眠因汗下多而神虛也坐而伏者短氣也下利清穀內寒也咽中生瘡上實下虛也舌上生刺熱盛也利者熱盛也叉手冒心因汗多而血虛也腹滿手足溫者邪入太陰也舌卷囊縮邪入厥陰也論傷寒有證見之必死法夫傷寒死證一一須明生死不明將何措手非惟有干名節亦且投藥無用且赤斑者五死五生黑斑者十死一生陽證見陰脈者死發少陽汗連厥陰血者厥竭而死發左右動氣汗者死發風濕者死發陰陽毒過六七日死大發濕家汗成痓熱而痓者死發熱發少陽汗譫語者死發溫家汗為重暍者死兩感傷寒者死有汗不為汗衰為陰陽交者死結胸證悉具煩躁者死狂言不食者死發厥肌冷而發躁無時得安者曰臟厥而死結胸舌上生苔為臟結者死咳逆不止者死舌卷囊縮者死少陰吐利煩躁四逆者死結胸證煩躁悉具者死少陽與陽明合病下利脈長大名曰負負者死目亂無神氣目無精者死男子病新瘥婦人與之交曰陽易婦人病新瘥男子與之交曰陰易男子陰腫小腹痛婦人裡急連腰股眼昏四肢拘急為女勞復者死厥利本不能食反能食為除中者死傷寒七八日大發熱汗出不止如貫珠此本氣衰者死爪甲青為陽衰者死循衣摸床喘而不休衛氣絶者死柔汗為冷汗出發黃者乃脾絶也死唇吻反青乃肝絶也死環口黎黑脈絶也死直視搖頭心絶也死面黑遺尿腎絶也死聲如鼻鼾肺絶也死身體如僵正氣脫也死喘而不休邪氣勝也死水漿不下胃氣絶也死形體不仁榮衛不行也死乍靜乍亂者死也論婦人傷寒與男子不同治法且夫天地陰陽各有分位傷寒雜病豈無各科男婦何可同治也男子調氣為主女子養血為先女子血蓄則血室不蓄二氣和平一有凝結水火相刑凡氣口緊盛者即宜下人迎緊盛者即宜汗但婦人左關浮緊者不可下當發汗以救血室榮衛得和津液得行浹然汗出而解凡婦人經水適斷晝則明瞭暮則譫語如見鬼狀此為熱入血室無犯胃氣及上中二焦言無犯胃氣者謂不可下也以小柴胡湯主之若行陽遲則熱入胃令津液燥中焦上焦不榮成血結胸須針期門可也但婦人傷寒發熱惡寒四肢拘急口燥舌乾經脈凝滯不得往來以桂枝紅花湯若傷寒口燥咽乾不思飲食以黃芩芍藥湯若傷寒喘急煩躁戰而作寒陰陽俱虛不可下也以小柴胡湯若傷寒經水適來邪乘虛而入晝則明瞭暮則譫語如見鬼狀此為熱入血室無犯上中二焦胃氣者宜小柴胡湯若傷寒瘥後猶有餘熱不去謂之遺熱宜地黃湯主之論妊婦傷寒又與前證有易法黃帝內經曰有故無殞也大積大聚其可犯也損其大半而止過則殺也且妊婦傷寒保胎宜阿膠散大抵妊婦傷寒仲景無治法最宜避忌諸藥不可以尋常例視之凡妊婦用安胎飲散寒邪以白朮湯妊婦憎寒壯熱宜發其汗以芍藥湯妊婦或中時行灑淅寒熱作寒振栗而悸如噦者宜蘇木湯妊婦傷熱默默欲眠不欲食脅下痛嘔逆痰氣及産後病傷風熱入胞宮寒熱如瘧並經水適來適斷病後勞復飲熱不解以黃龍湯妊婦頭目眩疼壯熱心躁以旋覆花湯妊婦發斑以梔子大青湯論産後傷寒與胎前有別法且産婦始生氣血俱虛外失衛護內無主持最宜調養設受風寒豈能救治故與胎前不同且産後十數日不解頭痛惡寒時時有熱心下堅乾嘔汗出以陽旦湯産後亡津液大便多祕或譫語煩躁宜服神功丸産婦頭疼身熱兼腹內拘急疼痛以桂心牡蠣湯産婦傷風發熱面赤而喘頭痛以竹葉防風湯
