body:
  text: 傷寒明理續論卷之六傷寒三陰三陽脈證論傷寒汗下溫之法最不可輕據脈以驗證問證而對脈太陽者陽證之表也陽明者陽證之裡也少陽者二陽三陰之間太陰少陰厥陰又居於里總謂之陰證也發於外則太陽為之首發於內則少陰為之先太陽惡寒而少陰亦惡寒但太陽之脈多浮少陰之脈沉細與其他證狀亦自異也發熱惡寒身體疼痛或自汗或無汗是為表證可汗不惡寒反惡熱口燥咽乾壯熱腹滿小便如常而大便祕結是為里證可下厥冷囊卷自利煩躁而無身熱頭疼是為陰證可溫浮洪緊數此表病之脈沉實滑數此里病之脈微細緩弱此陰病之脈在表者邪傳於榮衛之間在裡者邪入於胃腑之內胃腑之下少陽居焉若傳之陰則為邪氣入臟矣榮與衛俱為表也亦均可汗也然有汗者為傷風風傷衛氣則以桂枝助陽而汗之輕無汗者為傷寒寒傷榮氣則以麻黃湯助陽而汗之重榮衛固為表也胃腑亦可以為表也然以腑臟而分表裡則在腑為之表在臟為之裡胃取諸腑可以表言若合榮衛腑臟而分之則表者榮衛之所行里者胃腑之所主而臟則又深於里者矣審脈問證辨名定經真知其為表邪則汗之真知其為里邪則下之真知其為陰證則溫之表有邪則為陽虛陰經受邪則為臟病而溫里之藥熱如此而汗如彼而下又如彼而溫桂枝承氣投之不差姜附理中發而必中大抵治傷寒有法投劑少差死生立見古人處方立論曰可汗曰可下曰可溫曰和解曰少與曰急下與夫先溫其里乃發其表先解其表乃攻其里謂知奇者若網在綱有條不紊論至於此則知古人之立論甚嚴而汗下溫之法亦不可輕也信矣經曰傷寒六七日目中不了了無表證脈雖浮亦有可下者少陰病二三日無里證亦有可汗者陰證四逆法當用溫而四逆散性寒豈可用哉曰醫在九流之中非圓機之士不足為語也脈雖浮而亦可下者無表證謂六七日不大便借使大便不難其敢輕下之乎少陰病亦有發汗者少陰本無熱反發熱而表猶未解故用溫藥微取其汗也借使身不發熱其敢輕汗之乎四逆湯用薑附四逆散用枳柴一寒一熱病主四逆固不侔矣然傳經之邪與陰經受邪初病便厥者不同四逆散用藥寒主先陽後陰也四逆湯用藥熱主陽不足而陰有餘也若張氏之論日數多則曰日數雖多但有表證而脈浮者猶可發汗日數雖少若有里證而脈沉實者即須下之此日數之不可拘也至如陽極發厥陰極發躁陰證似陽陽證似陰差之毫釐謬以千里可不深思而熟慮也哉陰陽虛實用藥寒溫辨傷寒一書所謂陰陽虛盛則精微之義不無辨析於其間四十八難曰病之虛實出者為虛入者為實蓋表之真陽既虛故陰邪以盛出而乘陽是以脈浮於外其病在表法當汗之當其陰邪出表脈浮於外之時不可自惑以為陽脈盛也里之真陰既虛故陽邪以盛入而乘陰是以脈入於內其病在裡法當下之當其陽邪入里脈實於內之時不可自惑以為陰脈盛也是說非古人之立言也蓋使人知如此之為陰盛則抑陰而助陽如彼之為陽盛則抑陽而助陰陰盛則邪出於外者發表之藥當性溫以助陽氣如桂枝湯之類是也陽盛則邪入於內者攻裡之藥當性寒以抑陽氣如承氣湯之類是也或曰陰出而乘於外是陽之不足也陽病則當有以發表而汗之何哉是大不然陰邪傳於外不汗之則邪何由而去桂枝之性溫溫之乃所以助陽陽有所助而長則陰邪之所由以消辛甘發散為陽者此也張氏所謂承氣入胃陰盛乃亡者正恐陰盛出外而誤以承氣下之安得而不亡或者有陽入而乘於內是陰之不足也陰病則當有以溫養而下之何哉是又不然陽邪入於內不下之則邪從何而出承氣之性寒寒之乃所以抑陽陽受其抑則微而真陰之所由以長酸苦湧泄為陰者此也張氏所謂桂枝下咽陽盛則斃正恐陽盛入內而誤以桂枝汗之又安得而不死觀古人發表之藥多溫攻裡之藥多寒則知陰陽虛實之意微非只於汗下設矣所以為用藥寒溫設也六經用藥格法太陽屬膀胱寒水非發汗不能愈亦有桂枝麻黃以助陽祛邪此膀胱寒水之經有標本之作風寒初客仍在表宜用辛溫之劑以發散之若無頭痛惡寒或非冬時皆不可用陽明屬胃非通泄不能痊必用大黃芒硝以疏利陽熱此言表證已罷頭痛惡寒已除則熱歸陽明之本矣宜承氣湯寒劑以泄熱若惡寒未除則為表寒邪尚在不可下也冬時亦宜用不可拘忌少陽屬膽無出入之道柴胡半夏能利能汗消解血熱黃芩佐之太陰脾土惟惡寒濕非乾薑白朮不能燥濕也少陰腎水惟惡寒燥非附子不能溫潤厥陰肝木藏血榮筋非芍藥甘草不能滋養此用藥經常之道也陰陽虛盛用藥寒溫辨夫傷寒發表攻裡之藥寒熱殊途用之一差死生反掌所以越人仲景深致意於其間也難經云傷寒陽虛陰盛汗之則愈下之則死陽盛陰虛汗之則死下之則愈且寒邪之傷人也有淺深焉淺者汗之深者下之此古今不易之定法也方其風寒初客皮毛之間陰氣乃盛閉塞腠理身中陽氣已虛不能御衛遂有惡風惡寒之證見焉當此之時只宜桂枝湯辛甘溫之藥助陽抑陰而發之陰邪既散表氣衝和而愈經云辛甘發散為陽者是也不知用此而反以承氣湯苦寒之藥下之表裡俱傷不亡何待表邪既罷寒作為熱陽陷入深而盛於裡則津液消耗腸胃燥澀而臟腑之真陰虛矣陰氣既虛即譫妄狂躁煩渴惡熱之病而作也當此之時宜用承氣湯苦寒之劑扶陰抑陽而泄去熱氣陽邪即退胃中真陰來復裡氣和平而愈內經所謂酸苦湧泄為陰者是也不知用此乃以桂枝辛熱之藥助邪伐正安有不斃者乎所以仲景云桂枝下咽陽盛則斃承氣入胃陰盛乃亡良以此夫嗚呼此論誠為傷寒汗下之樞機乎俗醫不能達此為妙昧於陰陽虛盛之道悖逆此理而不殺人也幾希經云發表不遠熱攻裡不遠寒豈虛語哉三陰三陽脈證經云尺寸俱浮者太陽受病也當一二日發以其脈上連風府故頭項痛腰脊強傷寒則發熱惡寒傷風則鼻塞惡風然傷風有汗傷寒無汗尺寸俱長者陽明受病也當二三日發以其脈夾鼻絡於目故身熱目疼鼻乾不得臥又曰不惡寒而作渴皆為在經不惡寒反惡熱自汗出大便難尺寸俱弦者少陽受病也當三四日發以其脈循脅絡於耳故胸脅痛而耳聾口苦咽乾目眩往來寒熱而嘔此三經受病未入於腑者可汗而已尺寸俱沉細者太陰受病也當四五日發以其脈布胃中絡於嗌故腹滿而咽乾或腹痛手足溫自利不渴尺寸俱沉者少陰受病也當五六日發以其脈貫腎絡於肺系舌本故口燥舌乾而渴惡寒口中和默默欲寐時時腹痛又咽痛三證尺寸俱微緩者厥陰受病也當六七日發以其脈循陰器絡於肝故煩滿而囊縮唇青舌卷筋急或渴不欲食即吐蛔此三經皆受病也已入於腑者可下而已此皆自陽經傳來者故宜下而去之非若陰經自中之寒此則為真陰證矣當用四逆湯輩溫之汗下溫正法太陽傷風自汗惡風桂枝湯傷寒無汗惡寒麻黃湯陽明不惡寒反惡熱自汗者大便難大柴胡湯小承氣湯汗不止者胃汁干急下之大承氣湯無汗惡寒升麻葛根湯有汗脈遲微惡寒為表未解桂枝湯無汗脈浮而喘麻黃湯少陽證病屬小柴胡湯太陰自利不渴為臟寒理中湯四逆湯胸中脹滿枳實理中丸脹滿脈浮桂枝湯脹滿時痛桂枝加芍藥湯痛甚桂枝加大黃湯少陰脈沉口不幹舌不燥背惡寒小便清白四逆湯始得病脈沉反發熱麻黃附子細辛湯口燥咽乾而渴急下之大承氣湯六經中惟此一經難治大要以口燥而渴知其熱脈沉而遲別其寒厥陰脈微浮為欲愈不浮為未愈小建中湯脈浮緩如瘧狀桂枝麻黃各半湯脈沉短者囊必縮為毒氣入臟承氣湯下之利不止者四逆湯傷風見寒傷寒見風脈證熱盛而煩手足自溫脈浮而緊此傷風見寒脈也不煩少熱四肢微厥脈浮而緩此傷寒見風脈也二者為榮衛俱病法用大青龍湯然不可輕用須風寒俱盛又加煩躁方可與之一法以桂枝麻黃湯尤穩今改羌活湯三陽合病本太陽病若汗若下若利小便無津液胃中燥轉屬陽明是為脾約若惡寒用升麻葛根不惡寒反惡熱大便難白虎湯譫語者調胃承氣湯下之喘而胸滿者不可下麻黃湯太陽少陽頭項強急脅下硬滿目眩往來寒熱小柴胡湯少陽陽明本少陽病因為發汗利小便後胃中燥大便難屬調胃承氣湯正陽陽明乃本經風盛氣實也大柴胡湯大小承氣湯選用之三陽合病腹滿身重譫語遺尿口中不仁屬白虎湯口乾舌燥不仁背惡寒同太陽陽明少陽陽明正陽陽明無表證者俱可下惟惡寒者為太陽陽明合病未過經為屬表可發汗桂枝麻黃各半湯蓋在經則汗過經則下也太陽陽明並病本太陽病發汗則汗出不徹因轉屬陽明續自微汗出不惡寒是並歸陽明也太陽證尚在桂枝麻黃各半湯太陽證也大小承氣湯陽明證也春溫變熱溫熱病者冬時感寒偶不即發寒毒藏於肌膚至春變為溫病夏變為暑病暑病者熱又甚於溫也溫病發於春三月夏至前是也發熱咳嗽頭疼身痛口燥渴脈浮弦熱甚者小柴胡湯熱微者升麻葛根湯解肌湯微熱不渴小柴胡加桂枝渴者加五味渴者去半夏加栝蔞人參脈實煩渴者大柴胡湯微利之以其脈實必大便難也虛煩者竹葉石膏湯然用羌活湯解之為當渴加知母石膏夏月熱病發熱頭疼身體痛重不惡寒而惡熱其脈洪不可溫宜羌活湯渴加知母石膏三月至夏謂之晚發梔子升麻湯有少陽證者小柴胡湯更於前方內選用若春夏有惡風惡寒類傷寒證者蓋當時暴中風寒之氣新病即非冬時受寒通用羌活湯治之痓痓者先太陽中風重感寒濕所致經曰身熱足寒頸項強急惡寒時時頭熱面赤目赤獨頭面搖卒口噤背反張者痓病也桂枝加栝蔞湯主之傷風頭痛常自汗出而嘔者若汗之必發痓大發濕家汗亦作痓新産血虛汗出傷風亦作痓若其脈沉弦而遲或帶緊或散於指外皆惡候也發熱無汗惡寒為剛痓葛根湯或麻黃葛根湯發熱有汗不惡寒為柔痓桂枝加葛根湯桂枝栝蔞葛根湯二痓通用小續命湯剛痓為陽去附子柔痓為陰去麻黃剛痓胸滿口噤咬牙腳攣臥不著席大承氣湯下之柔痓桂心白朮湯附子防風湯白朮散桂枝煮散選用風溫濕溫風溫尺寸俱浮素傷於風因而傷熱風與熱搏即為風溫其外證四肢不收身熱自汗頭疼喘息發渴昏睡或體重不仁慎勿發汗汗之則譫語煩躁目無精彩病在少陰厥陰二經葳蕤湯人參敗毒散葛根龍膽湯小柴胡湯選用未醒者柴胡桂枝湯發汗已身灼熱知母葛根湯渴甚栝蔞根湯脈浮身重汗出漢防己湯誤汗風溫防己黃耆湯濕溫寸濡而弱尺小而急素傷於濕因而中暑濕與熱搏即為濕溫其狀胸腹滿目痛壯熱妄言自汗兩脛逆冷攣急惡寒若發其汗使人不能言耳聾不知痛處其身青而色變醫殺人耳濕溫在太陰經用白虎蒼朮湯加桂枝濕勝則一身盡痛發熱身黃小便不利大便反快五苓散加茵陳臟腑虛自利甚理中湯朮附湯風濕中濕風濕脈浮先傷濕而後傷風也其證肢體腫痛不能轉側額上微汗惡寒不欲去衣大便難小便利熱至日晡西而劇治法但微解肌若正發汗則風去濕在非徒無益而又害之解肌用麻黃杏子薏苡甘草湯白朮防己黃耆湯不嘔不渴脈浮虛者桂枝附子湯濕多身痛小便自利甘草附子湯煩渴小便不利五苓散外不熱內不渴小便自利朮附湯緩弱昏迷腹滿身重自汗失音下利不禁白通湯加白朮去甘草身腫痛微喘惡風杏仁湯人參敗毒散通用熱而煩渴者小柴胡加栝蔞若誤下之小便必不利可五苓散中濕小便不利大便自利甘草附子湯五苓散大小便皆利則與朮附湯身體痛或鼻塞小建中湯加黃耆溫毒中暍溫毒者冬月感寒毒異氣至春始發也表證未罷毒氣不散故有發斑之證心下煩悶嘔逆咳嗽後必下利寸脈洪數尺脈實大為病則重以陽氣盛故耳治法通用玄參升麻湯黑膏主之詳見發斑條中中暑脈虛而伏身熱背惡寒面垢自汗煩躁大渴毛聳惡寒昏昏倦怠而身不痛與傷寒諸證不同矣內外俱熱口燥煩渴四肢微冷而身不痛用白虎湯痰逆惡寒橘皮湯熱悶不惡寒竹葉石膏湯頭痛噁心煩躁心下不快小便不利五苓散下消暑丸中暑用小柴胡湯良脈芤遲腠理開灑然毛聳口齒燥白虎加人參湯霍亂煩躁大渴腹痛四肢冷腳轉筋以黃連香薷湯發熱夫翕翕然而熱者表熱也有蒸蒸而熱者裡熱也其屬表者風寒客於皮膚邪氣怫鬱於外表熱而里不熱也其屬裡者陽氣下陷入於陰中裡熱甚而達表也其在半表半裡者以表熱未罷邪氣傳裡里未作實則表裡俱熱而但輕於純在裡也太陰厥陰皆不發熱惟少陰反有發熱之證或其脈沉或下利手足冷為異耳雖然傷寒發熱病之常也脈陰陽俱虛熱不止者汗後復發熱脈燥疾下利者皆不易治其可例視之乎太陽病發熱頭疼惡寒有汗桂枝湯惡寒無汗麻黃湯傷寒六七日目中不了了無表裡證大便難身微熱此為實急下之大承氣湯脈浮數者大柴胡湯陽明病發熱汗出脈浮數實者調胃承氣湯脈浮桂枝湯汗多者胃汁干急下之大承氣湯中風發熱六七日不解而煩有表裡證渴欲飲水水入即吐名曰水逆五苓散脈浮而大其人發熱煩渴小便赤表裡俱見五苓散少陽發熱脈弦細而嘔小柴胡湯少陰反發熱有二病脈沉者麻黃附子細辛湯下利厥逆裡寒外熱脈不出者通脈四逆湯脈浮熱甚反灸之因火而動必咽燥吐血四逆湯脈浮大遲表熱裡寒下利清穀四逆湯發熱口乾鼻燥能食者黃芩湯脈浮發熱無汗而渴表未解也小柴胡湯加人參栝蔞湯壯熱頭痛心中煩者梔子黃芩湯汗下後有熱大汗則損氣損氣則陽微故脈虛而惡寒大下則傷血血傷則陰弱故脈澀而發熱誤汗誤下皆有此耳且陰以陽為主陽以陰為根下之亡陰矣陰無所主邪氣搏之血虛乃發熱也太陽病發汗遂發熱惡寒小柴胡湯蒸蒸而熱者屬胃調胃承氣湯下後陰弱而發熱是為內熱葶藶苦酒湯若脈浮則汗之麻黃湯脈實則下之大柴胡湯大下後身熱不去心中結痛者未欲解梔子豉湯發汗又復下之惡寒發熱無休止時小建中湯傷寒以丸藥下之身熱不去微煩者梔子乾薑湯下後身熱不去心中結痛者梔子豉湯瘥後勞復發熱小柴胡湯脈浮者當汗解柴胡桂枝湯脈沉者當下解調胃承氣湯下利腹反痞滿者生薑瀉心湯小便不利麥門冬湯食復發熱梔子豉湯加大黃病後虛羸微熱不去者竹葉石膏湯頭痛大凡頭痛屬三陽乃邪氣上攻也太陽專主頭痛陽明少陽亦有之三陰絡上不過頭惟厥陰循喉嚨之後上連目系頂巔故有頭痛乾嘔吐涎沫之證卻無身熱亦與陽證不同雖然風濕在少陰濕溫在太陰其經從足走至胸中而還及頭痛過於陰毒是又不可拘也若兩感於寒太陽少陰俱病則頭痛口乾煩滿而渴與夫頭痛極甚又連於胸手足寒者則為真頭痛不可治矣太陽病頭痛發熱惡寒無汗麻黃湯有汗桂枝湯已發汗未發汗頭痛如破者葛根蔥白湯太陽病下之脈細數者頭痛未止連須蔥白湯陽明頭痛不惡寒反惡熱六七日不大便胃實氣攻於上也少與調胃承氣湯少陽頭痛脈弦發熱小柴胡湯濕家頭痛鼻塞瓜蒂末納鼻中黃水出立愈痰涎頭痛胸滿寒熱脈緊瓜蒂散吐之厥陰頭痛乾嘔吐涎沫吳茱萸湯頭痛壯熱心煩梔子黃芩湯天行勞復頭痛四肢痛蔥頭湯項強項背強者太陽表邪也發散則解結胸項強有下之證寒濕項強則成痓見本條臨病宜審太陽病項強無汗惡風為表實葛根湯項背強發熱汗出惡風為表虛桂枝加葛根誤下太陰結胸項強大陷胸丸一法頻與理中丸若損甚者兼與四逆湯項強脅下滿身熱惡風手足溫而渴小柴胡湯陰毒初得病項背強咽痛心腹痛短氣厥逆吐利身如被杖附子湯陰毒甘草湯正陽湯天明覆作熱至晚則腰痛頭項強身重葛根生薑豉湯惡風惡風者見風則怯密室之中無所惡也風傷衛氣衛虛則腠理不密由是而惡矣悉屬於陽非比惡寒有陰陽之別若無汗而惡寒者為傷寒當發其汗汗出而惡風者則為中風當解其肌不可更發汗若里證甚而惡風未罷者尤當先解其表三陽風濕皆有此證不可不辨太陽中風陽浮陰弱惡風自汗發熱鼻鳴乾嘔桂枝湯頭痛發熱身疼腰痛骨節疼惡風無汗而喘麻黃湯發汗太過衛虛亡陽遂漏不止而惡風者法當用溫桂枝附子湯小便難四肢微急難以屈伸治與上同若吐若下後七八日不解表裡俱熱時惡風大渴舌乾燥而煩白虎加人參湯汗不止必惡風煩躁不得臥先防風白朮牡蠣湯次小建中湯風濕惡風不欲去衣骨節煩疼不得屈伸汗出短氣小便不利或身微腫甘草附子湯脈浮身重汗出惡風防己黃耆湯惡寒惡寒者不見風亦惡寒身雖熱亦不欲去衣被其風寒客於榮衛陰氣上入陽中則灑淅而惡寒也經曰發熱惡寒者發於陽也無熱惡寒者發於陰也謂如或已發熱或未發熱必先惡寒而繼之以發熱此則發於陽也若初病惡寒而倦脈沉細而緊此則為熱發於陰也在陽則發汗在陰則溫里或下證悉具而微惡寒者是表猶未解當先解表而後攻裡若少陰病惡寒而倦手足厥冷自利煩躁脈不至者又為不治之證太陽病發熱或未發熱惡寒有汗桂枝湯無汗麻黃湯病發熱惡寒熱多寒少脈微弱者無陽也不可發汗越婢湯陽明病固宜下微惡寒者系與太陽合病在經屬表可發汗麻黃湯若脈遲汗多微惡寒者表未解也雖陽明證可桂枝湯少陽病頭汗出微惡寒柴胡桂枝湯發熱汗出後惡寒而嘔但心下痞者五苓散發汗後惡寒者虛也芍藥附子甘草湯惡寒脈微而復利正亡血也四逆湯加人參汗後惡寒脈細數浮遲嘔不止理中丸大下後復發汗心下痞而惡寒表未解也當先解表桂枝湯後攻痞三黃瀉心湯太陽病下後脈促胸滿者桂枝去芍藥若微惡寒者桂枝加芍藥附子湯少陰病脈沉細惡寒者四逆湯若下利惡寒而倦手足溫者小建中湯若惡寒而倦時時自煩不欲厚衣大柴胡湯亡血家不可發汗汗之則寒栗而振小柴胡湯芍藥湯脈弱者不可發汗汗之則寒栗不能自還當歸四逆湯背惡寒背為陽腹為陰背惡寒陽不足也陽不足則陰氣盛陰氣盛者口中和陽氣內陷者口乾燥附子白虎宜加詳審口中和背惡寒者屬少陰附子湯及灸氣海陽氣內陷口乾燥背惡寒白虎湯寒熱寒熱往來者陰陽相勝邪正相爭而作也蓋陽不足則陰邪出於表而與之爭故陰勝而為寒陰不足則陽邪入於裡而與之爭故陽勝而為熱邪居表多則多寒邪居里多則多熱邪在半表半裡則寒熱相半乍往乍來而間作也小柴胡湯專主寒熱寒多者加桂熱多者加大黃是大法也太陽病八九日如瘧狀發熱惡寒熱多寒少不嘔清便自可一日二三度發桂枝麻黃各半湯脈微緩者不可汗宜越婢湯病至十餘日熱結在裡往來寒熱大柴胡湯心煩發嘔胸膈滿不欲食寒熱往來小柴胡湯汗下後不嘔不渴頭汗出胸膈滿小便不利寒熱往來柴胡桂薑湯熱多寒少尺脈遲者榮血不足黃耆建中湯脈浮大寒熱往來宜祛邪凡婦人中風七八日續得寒熱發作有時經水適斷為熱入血室小柴胡湯潮熱潮熱屬陽明陽明旺於未申一日一發日晡而作也邪入胃腑為可下之證設或脈浮而緊潮熱而利或小便難大便溏者熱未入腑猶帶表邪先當和解其外如小便利大便硬方可攻之若潮熱於寅卯寅卯則屬少陽潮於巳午則屬太陽是又不可不辨病人煩熱汗出則解又如瘧狀日晡潮熱脈實可下小承氣湯或大柴胡脈虛者不可下桂枝湯陽明病潮熱大便微硬者大承氣湯陽明病脈浮而緊必潮熱發作有時但脈浮者必盜汗出柴胡桂枝湯腹滿不大便潮熱小承氣湯微利之似瘧似瘧一名瘧狀作止有時非若寒熱往來無定也太陽似瘧脈浮洪桂枝湯清便自可不嘔一日二三度發桂枝麻黃各半湯陽明似瘧煩熱汗出日晡發熱脈浮桂枝湯脈實承氣湯婦人熱入血室其血必結亦如瘧狀小柴胡湯熱多寒少陽乘陰也若尺脈遲為血少先以黃耆建中湯養其榮衛脈不遲卻以小柴胡湯桂枝湯越婢湯選用之厥陰脈浮緩囊不縮必發熱惡寒似瘧為欲愈桂枝麻黃各半湯溫瘧其脈如平身無寒但熱骨節煩疼時嘔白虎湯加桂渴者柴胡加人參栝蔞湯無汗無汗寒邪中經腠理閉密津液內滲而無汗也若風暑濕干之則自汗出矣當汗之證與麻黃湯三劑而不得汗者此又不可療也太陽當熱無汗頭痛麻黃湯項背強兀兀無汗葛根湯剛痓發熱惡寒無汗葛根湯或小續命湯脈浮發熱無汗表不解者麻黃湯汗不止白虎湯渴欲飲水無表證者白虎加人參陽明反無汗脈浮而喘者麻黃湯若無汗小便不利心中懊憹身必發黃五苓散加茵陳自汗衛氣者所以肥腠理而固津液者也衛為邪所幹不能衛護於外由是而汗出焉且自汗者有表裡虛實之分若自汗出惡風寒為表未解當解肌以致汗泄惡風與汗後惡寒皆為表虛必用溫劑若汗出不惡風寒則為表解里未和從下之設或汗出發潤如油如珠凝而不流皆不可治也太陽中風自汗脈浮緩桂枝湯汗出而渴小便難五苓散不渴者茯苓甘草湯自汗出小便難而用桂枝惟加芍藥甘草自汗出小便不數心煩微惡寒腳攣急桂枝附子陽明汗多而渴發熱譫語大便硬調胃承氣湯太陽病發汗遂漏不止惡風寒桂枝附子湯若小便自利而汗出為津液少不可攻利宜蜜導煎通之若汗多者胃汁干急下之大承氣湯汗多而渴勿用五苓散汗不止無他證者溫粉撲之服桂枝湯大汗出煩渴不解脈洪大者白虎加人參下後不可更用桂枝湯若汗而喘無大熱者麻黃杏仁甘草石膏湯頭汗諸陽經絡循於頭三陰則至項而還頭汗者邪搏諸陽則汗見於頭也若遍身汗者為之熱越今熱不得越而陽氣上騰津液上湊故但頭汗耳夫裡虛則不可下內涸則不宜汗頭汗之證更不可再汗也其或瘀血在裡與夫熱入血室虛煩水結皆令頭汗此為熱鬱於內而上達或吐或下以祛其邪設或小便不利內外關格而頭汗則為陽脫誤下濕家額上汗出而喘小便難小便利亦為陽脫二者皆不療矣百問表實裡虛故頭汗不可下發黃頭汗及項而止小便難引水漿此濕也茵陳蒿茵陳五苓散心結胸心忪滿無大熱頭汗出半夏茯苓湯譫語頭汗是為血熱屬陽明用承氣湯若心中懊憹而頭汗者梔子豉湯半表半裡有柴胡證並小柴胡湯熱寒往來微惡寒為表脅下滿大便堅為里手足汗四肢者諸陽之本熱聚於胃則津液旁達於手足也蘊熱則躁煩譫語挾寒則水穀不分是又承氣理中之不同陽明病手足漐漐汗出譫語大便難與承氣湯陽明中寒不能食小便不利手足汗出大便初硬後溏水穀不分與理中湯一法用豬苓湯盜汗盜汗者睡著則汗出覺則便不出矣雜病責於陽虛傷寒責在半表半裡故知膽有熱也陽明病脈浮緊潮熱盜汗柴胡桂枝湯脈浮大欲眠目合則汗小柴胡湯又柴胡桂枝湯煩熱邪熱傳裡不經發汗吐下則為煩熱與發熱似同而異經曰病人煩熱汗出則解如未作膈熱但當和解微熱而已若心下滿而煩則有吐下之異宜別其證之虛實而為劑之輕重也先煩而悸者為實先悸而煩者為虛虛煩而心中欲嘔吐鬱悶之狀太陽病心煩自汗小便數者不可與桂枝湯宜芍藥甘草湯服桂枝湯後出汗後煩渴者脈洪大白虎加人參湯陽明病心煩喜嘔壯熱往來心下悸小便不利小柴胡湯加茯苓傷寒二三日心中悸而煩小建中湯發汗後解半日許復煩脈浮數者可更發汗桂枝湯衄而煩渴者飲則吐水五苓散不愈竹葉石膏湯下後晝煩夜靜不渴不嘔無表證脈微沉乾薑附子湯若懊憹梔子豆豉湯若發汗若下之病仍不解而煩躁者茯苓四逆大下後六七日不大便不解腹滿痛者有燥屎大承氣湯吐汗下後虛煩心下痞滿氣上衝胸頭眩身為振搖茯苓桂枝白朮甘草湯腎傷寒表裡無熱但煩憒不欲見光明有時腹痛其脈沉細四逆湯煩躁煩為擾亂而躁為憤怒躁為先煩而漸至躁也傷寒煩躁則有陰陽虛實之別心熱則煩陽實陰虛腎熱則躁陰實陽虛煩則熱之輕躁則熱之甚也有邪在裡而煩躁者有不煩便作躁悶者此為陽盛隔陰欲於泥水中臥飲水不得入口也其或結胸證具而煩躁吐利四逆而煩躁下利發熱厥逆煩躁不得眠惡寒燥攣脈不出而躁者皆為不可治也太陽中風脈浮緊熱而惡寒身疼痛不汗出而煩躁大青龍湯得病二三日脈弱無太陽證柴胡湯證煩躁心下硬能食小承氣湯微和之心中悸而煩躁者小建中湯惡風自汗脈濡弱而煩躁者皆用此法但發熱六七日渴欲飲水者五苓散無熱但狂言煩躁者五苓散水調服探吐之陽明病不大便繞臍痛煩躁承氣湯下之少陽吐利厥逆煩躁欲死吳茱萸湯厥逆脈沉自利煩躁不得眠黃連雞子湯黃連阿膠湯下後復發汗晝則煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱乾薑附子湯發汗若下之病仍在不去煩躁者茯苓四逆湯陰極發躁或陰毒火邪投熱藥反劇者不可用涼藥躁甚仍與熱劑用四逆湯輩懊憹懊憹者心中懊懊憹憹鬱悶不舒之貌蓋由表證誤下正氣內虛陽邪內陷結於心胸之間甚則為結胸也邪在心胸則宜吐熱結胃腑則宜下不可拘也發汗吐下之後虛煩不得眠甚則反覆顛倒心中懊憹梔子豉湯舌上白苔飢不能食虛煩不眠頭汗懊憹上同短氣煩躁咽硬胸中懊憹大陷胸湯陽明病下之後懊憹而煩中有燥屎宜承氣湯陽明無汗小便不利心中懊憹者必發黃宜茵陳蒿湯身痛身痛太陽表證也雖曰表邪未解而有發汗溫經先後之不同自利脈沉為陰病身痛其身重者屬乎陽明為有風也又有陽邪內行不榮於表是又不可不知太陽身痛脈浮緊無汗麻黃湯或尺脈遲為無血先用小建中湯候尺脈浮卻用麻黃湯下利脈沉身痛宜四逆湯輩發汗後身痛脈沉遲桂枝芍藥人參湯一身盡痛發熱面黃七八日後結熱在裡乃攻其表溫里四逆湯攻表桂枝湯霍亂後身痛不休桂枝湯濕家身疼痛不可發汗發汗則成痓葛根桂枝湯凡中濕身痛有本條四肢拘急拘急者手足不能自如屈伸不便如蜷臥惡風之貌四肢者諸陽之本蓋因發汗亡陽陽虛是有其證也傷寒脈浮自汗出小便數心煩惡寒腳攣急芍藥甘草湯小便難者桂枝加附子太陽病發汗遂不止惡風小便難四肢微急難以屈伸桂枝加附子湯吐利汗出發熱惡寒四肢拘急手足厥冷四逆湯咳嗽咳者謦咳俗謂之嗽肺主氣肺為邪所乘氣逆而不下也故令咳嗽有肺寒而咳者有停飲而咳者有邪在半表半裡而咳者治各不同其水咳三證不可不辨小青龍太陽之表水也十棗湯太陽之裡水也真武湯水證之水氣也蓋水與表寒相合而咳則小青龍當汗之水與裡寒相合而咳則真武湯溫之里癖合水動肺而嗽十棗湯所以下之也太陽病身熱咳嗽乾嘔喘而利小青龍湯有加減法惡寒身痛只依本方身涼咳嗽乾嘔微利心下痞滿引脅下痛十棗湯四肢痛重腹痛下利咳嗽或嘔真武湯有加減之法少陽病寒熱往來胸脅硬滿而痛咳嗽小柴胡湯有加減之法少陰咳嗽四逆湯腹痛下利咳嗽中滿而嘔大半夏湯喘傷寒發喘有邪在表者有邪在裡者有水氣者在表者心腹濡而不堅外證無汗法當汗之在裡者心腹脹滿外證有汗法當下之其水氣者心下怔忡是以有青龍湯之證或注喘汗出而喘宜發之雖然喘特病之常也其或直視譫語汗出發潤身汗如油皆不可治太陽病無汗而喘麻黃湯陽明病汗出不惡寒短氣腹滿潮熱而喘小承氣湯太陽陽明合病喘而胸滿不可下宜麻黃湯誤下太陽利不止脈促有汗而喘葛根麻黃黃芩湯無汗而喘麻黃杏仁甘草石膏湯水氣喘咳乃太陽汗後飲水多而水停心下小青龍湯去麻黃加杏仁小腹痛者去麻黃加茯苓陰病喘促者反陰丹氣逆氣逆者氣自腹中時時上衝也蓋因太陽病下之表邪乘虛傳裡里不受邪則氣逆上行仍在表也當復汗之厥陰客熱氣上衝心此熱在裡而氣上也若病如虛羸少氣氣逆欲吐者又動氣發汗而氣上衝者此正氣虛而氣逆也當依法調治之脈沉緊者不可汗太陽病下之後其氣上衝者可與桂枝湯不上衝者不可與之病如桂枝證頭不痛項不強寸脈浮微胸中痞硬氣上衝咽喉不得息此為胸中寒瓜蒂散吐之脈微者不可吐吐則心口逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振搖茯苓白朮桂枝甘草湯動氣發汗氣上衝者李根湯病後虛羸少氣氣逆吐者竹葉石膏湯短氣短氣者呼吸短促而不能相續也千金方云少氣不足以息也金匱要略曰短氣不足以息者實大抵心腹脹滿而短氣者邪在裡而為實心腹濡滿而氣短者邪在表而為虛又有停水心下亦令短氣隨證攻治無不愈矣短氣潮熱腹滿而喘此為外欲解而里欲實大柴胡湯小承氣湯風濕相搏汗出短氣小便不利惡風不欲去衣其邪在表甘草附子湯食少飲多水停心下短氣小半夏湯身涼乾嘔短氣汗出不惡寒此表解里有水十棗湯誤下太陽短氣煩躁心中懊憹便為結胸大陷胸湯及丸口乾邪熱聚於胃腑消耗津液故口乾熱而渴也經曰少陰病故口燥咽乾者急下之若不口燥咽乾而渴脈沉者急溫之又有漱水不下咽者若見表證必衄為邪熱在經也以血氣俱多經中熱甚迫血妄行而作衄者無表證加之胸腹滿而如狂者又為蓄血在內者陽明口燥咽乾無大熱背微惡寒煩渴白虎加人參湯少陽口燥咽乾小柴胡湯少陰口燥咽乾而渴急下之用承氣湯陽明病口燥欲漱水不咽者必衄黃芩芍藥湯漱水不咽發狂輕者犀角地黃湯甚者抵當湯渴渴者里有熱也津液為熱所耗故令渴也傷寒六七日傳至厥陰為消渴者渴飲水多而小便少乃熱能消水也朱氏曰脈浮而渴屬太陽有汗而渴屬陽明自利而渴屬少陰至於厥陰則又熱之極矣太陽無汗若渴忌白虎宜柴胡湯陽明多汗而渴戒五苓宜竹葉石膏湯若先嘔後渴則為欲解當與之水先渴後嘔則為水停屬赤茯苓湯當從此議勿令誤也太陽病發渴脈浮表不解心下有水氣小青龍湯去半夏加栝蔞服桂枝湯汗出後煩渴甚者白虎加人參湯小便不利而渴五苓散身熱惡風手足溫脅滿而渴小柴胡去半夏加栝蔞陽明發渴則有汗脅下硬不大便而嘔舌上白苔小柴胡湯加減同用若汗少小便不利脈浮而渴五苓散渴而飲水嘔者同發黃頭汗出小便不利渴飲水漿茵陳蒿湯茵陳五苓散少陽發汗則自利咳而嘔引水飲豬苓湯下利渴欲飲水白頭翁湯下利脈數而渴者自愈不愈必下清血宜黃芩散病人脈微細欲吐不吐心煩但寐小便白下利而渴四逆湯陽毒大熱大渴黑奴丸中暑發渴白虎加人參湯胸脅滿痛胸滿者胸膈間氣塞閉也非心下滿脅滿者脅肋下氣填脹滿也非腹中滿蓋邪自表傳裡必先自胸脅以至心腹而入胃是以胸滿多帶表證宜發汗脅滿者多在半表半裡之間宜和解至於邪結胸中而為實者又須湧吐之也太陽病下後脈促胸滿桂枝去芍藥湯病在於胃氣芍藥入榮故去之陽明病喘而胸滿猶帶表證不可下與麻黃湯麻黃杏仁甘草石膏湯胸脅俱滿或脅下硬痛或嘔吐舌上白苔或不大便並屬小柴胡湯傷寒五七日往來寒熱胸脅若滿默默不飲食心煩喜嘔或脅下痞硬柴胡加牡蠣湯傷寒七八日下之胸滿煩驚小便不利譫語一身盡痛不可轉側柴胡加龍骨牡蠣湯胸中痰實瓜蒂散吐之胸膈不快填滿閉塞唇青手冷脈細沉少情緒或腹痛此名太陰結胸經曰病發於陽而反下之熱入因作結胸注曰發熱惡寒者發於陽也外證項強心下滿硬而痛是也此為實邪在裡法當下之若脈浮大若表證若水氣填不可下亦有不因下而心下硬滿者經曰病人手足厥脈乍緊邪結胸中心滿而煩飢不欲食當吐之是則病在胸中也經曰陽明病心下硬滿不可下下之利不止而死是則邪氣自表傳裡留於心下未全為實法當吐之故有此戒其或結胸證具而煩躁者不治結胸寸脈浮關尺皆沉緊宜下若脈浮大或有表證先用小柴胡湯表已解下之大結胸不按而痛連臍腹痛硬不可近大陷胸湯或太峻用丸小結胸按之而痛心下硬小陷胸湯熱實結胸懊憹煩渴心下痛少與大陷胸湯寒實結胸無熱證三物白散枳實理中丸痞經曰病發於陰而反下之因作痞注云無熱惡寒者發於陰也輕於結胸者心下滿而不痛按之則濡是其虛邪留滯故但滿而不痛也惟枳桔最良欲攻之只從表證解而後可痞者關脈多沉枳實理中丸半夏瀉心湯關脈沉者三黃湯瀉其肝若惡寒者附子瀉心湯服此湯痞不去煩渴小便不利五苓散下後復汗心下痞而惡寒表不解不可攻痞先與桂枝湯表解乃攻痞三黃湯表未解而心下妨悶曰支結柴胡桂枝湯胸脅滿而微結小柴胡湯加乾薑牡蠣表證未罷因攻之協熱而利心下硬為表裡俱病桂枝人參湯下利心下痞硬干噎食臭腹鳴甘草瀉心湯生薑瀉心湯治法通用桂枝人參湯若下利不止則治下焦赤石脂禹餘糧湯又不止只利小便五苓散發熱不解嘔吐不利心下痞硬大柴胡湯吐汗下後噎氣痞硬旋覆代赭湯若咳逆氣虛用四逆湯胃寒先宜理中丸後用旋覆代赭湯腹滿脾為中央之土所以腹滿多屬太陰也常病者為裡實從下之時減者為裡虛當溫之若解表內不消非大滿尤生寒熱未可下是邪全未入腑若大滿大實兼有燥屎雖得之四五日亦為可下謂邪已入腑也大抵陽熱為邪則腹滿而咽乾陰寒為邪則腹滿而吐利食不下若雖經吐下後而腹滿者治法又各不同是又不可不知也太陽誤下因時腹滿而痛桂枝加附子湯痛甚桂枝加大黃湯陽明發熱腹滿微喘口苦咽乾或不大便譫語者小柴胡湯噦而小便難加茯苓三陽合病腹滿身重難以轉側譫語口中不仁小柴胡湯有汗白虎湯太陰腹滿吐食不下枳桔理中丸少陰病六七日腹脹滿不大便急下之大承氣湯腹滿痛者脾不勝水水與氣搏皮肉之間腸中漉漉有聲小半夏茯苓湯加桂枝下利腹滿身疼痛先溫其里四逆湯後攻其表桂枝湯發汗後腹滿當溫厚朴半夏生薑人參湯吐後腹滿當下少與調胃承氣湯下後腹滿宜梔子厚朴湯腹脹滿者陰陽不和桔梗半夏湯腹痛邪氣入里與正氣相搏則為腹痛蓋陽邪傳裡而痛者其痛不常當以辛溫之劑和之陰寒在內而痛者則痛無休時欲作利也當以熱劑溫之有燥屎宿食為痛者則煩而不大便腹滿而痛也則後用下經曰諸痛為實痛隨利減此皆為里證而所治各不同矣又當隨證施治傷寒四五日腹中痛若轉氣不趣小腹者此欲自利也四逆湯少陰腹痛四逆或咳或悸或小便不利或瀉利下重並四逆散下利清穀脈微欲絶通脈四逆湯腹痛小便不利真武湯胸中熱胃中有邪氣腹痛欲嘔吐者黃連湯大便實痛者關脈實腹滿不大便桂枝加大黃湯大小承氣湯選用之小腹滿小腹滿者臍下滿是也若胸滿心下滿腹滿皆為邪氣而非物今小腹滿皆為有物而非氣小便利者則為蓄血之形小便不利者乃是溺澀之證滲利之劑宜分兩途經曰病人素有痞氣連在臍旁痛引小腹入陰筋者名臟結也死太陽病不解熱結膀胱其人如狂小便急結桃仁承氣湯太陽病六七日表證在脈微沉不結胸發狂小腹硬滿小便自利抵當湯太陽病目黃脈沉結小腹硬小便不利者五苓散陰陽易小腹痛燒裩散病者手足厥冷真武湯不結胸小腹滿按之痛者此冷結在膀胱關元宜灸關元穴嘔吐嘔者聲物俱出者也吐者無聲而但出物者也故仲景復言干以別之則嘔為有物明矣干猶空也但空嘔而無所出耳然嘔吐俱有物出較之輕重則嘔甚於吐蓋表邪傳裡裡氣上逆故嘔吐而水穀不下也有胃熱脈弦數口舌煩渴有胃寒脈弦遲逆冷不食小便利有水氣先渴後嘔膈間怔忡有膿血喉中腥奔逆上衝不須治之嘔膿儘自愈是四者不可不辨大抵邪半在表半在裡則多嘔吐及其裡熱而嘔吐者亦有之故經曰嘔多雖有陽明證不可攻之為其氣逆未收斂為實也設或嘔而脈弱小便復利身惟熱而見厥者難治以其虛寒甚也太陽少陽合病自利而嘔黃芩加半夏生薑湯太陽陽明合病當自利若不利但嘔葛根加半夏湯傷寒胸中熱胃中有邪氣腹痛氣逆欲嘔吐者黃連湯太陽病發熱汗出心下煩郁痞硬不利嘔吐大柴胡湯三陽發熱而嘔逆小柴胡湯嘔而渴者豬苓湯五苓散先嘔後渴此為欲解宜與水解先渴後嘔而水停心下赤茯苓湯少陰病又吐但欲寐五六日自利而渴小便色白四逆湯加生薑少氣或咳或悸身痛自利真武湯去附子加生薑膈上寒飲乾嘔吐涎沫四逆湯若吐利手足厥冷煩躁甚者吳茱萸湯食谷欲嘔者屬陽明也上同得湯反劇者屬上焦橘皮湯小柴胡湯似嘔似噦似喘心下憒憒大橘皮湯汗下後關脈遲緩而吐為胃寒理中丸瘥後虛煩嘔吐竹葉石膏湯加生薑汁屢經汗下寒氣膈塞食入即吐乾薑黃芩黃連人參湯汗後水藥不入口者四逆半夏茯苓湯金匱要略曰諸嘔吐谷不下半夏湯嘔吐脈滑數或洪發熱茅根湯乾嘔乾嘔者嘔而無物出也大抵熱在胃脘與穀氣並熱氣上熏心下痞結則有此證太陽汗出乾嘔桂枝湯主自汗也少陰下利乾嘔姜附湯主下利也厥陰吐沫乾嘔吳茱萸湯主涎沫也邪去則吐自止矣若有水氣二證又當以表裡別之傷寒表不解而心下有水氣乾嘔身熱微喘或自利小青龍湯主之不發熱不惡寒肋痛咳而利乾嘔者十棗湯下之自汗頭痛乾嘔桂枝湯少陰下利乾嘔脈微白通湯下利不止乾嘔而煩厥逆無脈白通加豬膽汁湯惡寒外熱脈微欲絶乾嘔通脈四逆湯膈上有寒飲乾嘔亦屬少陰四逆湯乾嘔吐痰沫頭痛吳茱萸湯得此湯反劇者與小柴胡湯乾嘔自利黃芩湯半夏生薑湯太陽中風陽浮陰弱自汗惡風寒發熱鼻鳴乾嘔者桂枝湯乾嘔噦若手足厥者橘皮湯咳逆噦夫咳逆者俗謂之吃忒是也才發聲於喉間則遽止𠮾𠮾然連續數聲然而短促不長古人謂之噦者非也噦與乾嘔無異但其聲濁惡而長然皆有聲而無物病至於噦則危難治矣大抵䭇近於噦䭇者但胸間氣塞不得下通噦則惡濁之聲達於外矣蓋因胃氣本虛汗下太過或復飲水水寒相搏虛逆而成經曰陽脈浮則為氣䭇又曰脈滑則為噦此為醫咎責虛取實之過也又有熱氣擁郁上下氣不得通而噦者輕則和解之通利之甚則溫散之設若不尿腹滿而噦者咳逆脈散而無倫者雖神醫不能措手與傷寒咳而氣逆者又不同也若將吃忒紊於噦與咳而氣逆則誤人多矣臨病之際宜明辨之咳嗽大便少與大承氣湯下之蓋由熱氣衝膈肝肺故耳若便軟瀉心湯胃氣虛而衝脈逆也若脈散者不治咳逆潮熱小柴胡加橘皮生薑湯厥逆不止烏苓湯有寒者羌活附子散傷寒表不解心下有水氣乾嘔發熱而咳或䭇小青龍湯去麻黃加附子寸口脈浮大醫反下之為逆又飲冷水令汗大出水得寒氣冷必相搏其人即䭇豆蔻湯噦而腹滿大便不利先宜半夏生薑湯次用承氣湯小便不利豬苓湯陽明中風脈浮弦小便難潮熱而噦小柴胡湯加茯苓嘔噦手足冷逆小橘皮湯若胸滿虛煩大橘皮湯胃氣寒者吳茱萸理中湯溫中湯金匱要略曰噦逆者橘皮竹茹湯主之噦不止者橘皮乾薑湯半夏生薑湯退陰散子宜消息用之溫病熱未除重被暴寒入胃蘊結不散變噦梓皮飲子溫病有熱飲水暴冷作噦茅根葛根湯溫病胃冷變噦茅根橘皮湯溫病有熱飲水暴冷枇杷茅根湯下利傷寒表邪傳裡裡虛助熱則自下利又有不應下而便攻之內虛協熱亦為下利要當別其陰陽三陽下利身熱太陰下利手足溫少陰厥陰下利身涼無熱此大概也自利清穀不渴小便色白微寒厥冷惡寒凡此皆寒渴欲飲水溺色如常泄下赤黃發熱後重凡此皆熱蓋因風邪入胃水來侮土故令暴下或溫或攻或清下焦或利小便隨證施治但不宜發汗耳邪氣內攻復泄其津液胃氣轉虛必成脹滿若夫下利譫語而目直視下利厥躁不得眠下利發熱厥而自汗下利厥冷無脈灸之不溫而脈不出下利日數十行其脈反實皆為不治之證五者最忌者也太陽陽明合病下利頭目痛鼻乾脈浮葛根湯太陽少陽合病下利頭痛胸滿乾嘔脈浮弦黃芩湯嘔甚加半夏生薑少陽陽明合病下利身熱胸脅滿乾嘔往來寒熱脈長大而弦弦而為負負者死長大不弦為順大承氣湯下之滑而數為有宿食亦從下之太陽病未解而欲下之遂協熱而利心下痞硬表裡不解者桂枝人參湯太陰自利不渴四逆湯理中湯朮附湯少陰下利不渴腎虛飲水自救脈微者白通湯厥逆無脈者白通加豬膽汁湯四逆湯少陰下利渴而嘔心煩不得眠者豬苓湯少陰下利咽痛胸滿心煩者豬膚湯自利清水心下必痛口中乾燥此不可溫宜用下大承氣湯傷寒醫下之續得下利清穀身痛者急當救里宜四逆湯清便自調急當救表宜桂枝湯胃熱利白腹垢臍下必熱便下垢膩赤黃或渴黃芩湯白頭翁柏皮湯通用之白虎湯胃寒利白鴨溏臍下必冷腹脹滿便中清白或清穀四逆湯理中湯寒毒下利面戴陽者下虛也下利譫語有燥屎也脈不微細小承氣湯尺脈弦腸鳴泄利腹痛者冷痛也小建中湯三部平心硬而下利者腸胃積結也宜下之大承氣湯下利脈滑當有所去下之乃愈大承氣湯下利脈大者虛也以其強下之故也設脈浮革因爾腸鳴者當歸四逆湯下利瘥後至其年月復發者以病不盡故也宜下之大承氣湯便膿血衝脈為血之海即血室也男女均有此血氣均有此衝脈沖之得熱血必妄行在男子則為下血譫語在婦人則為寒熱似瘧皆為熱入血室逼血下行則血熱而利也挾血之脈乍澀乍數或伏或沉血熱交併則脈洪盛大抵男多於左手女多於右手見之又有陰寒為病下利便膿血者乃下焦虛寒腸胃堅固清濁不分而利下膿血也二者一為挾血一為陰寒臨病宜精別焉太陽病不解熱結膀胱其人如狂而血自下者愈不愈用桂枝湯明理論抵當湯陽明病下血譫語胸脅滿如結胸夜則見鬼此為熱入血室小柴胡湯少陰病下利便膿血者桃花湯腹滿身熱下如魚腦曰濕毒桃花湯地榆散黃連阿膠湯下後無表裡證脈數不解散消穀易飢多日不大便此為瘀血桃仁承氣湯抵當湯或小柴胡湯加桃仁大黃下焦蓄血其人如狂小腹急結小便必利抵當丸四逆手足不溫謂之四逆邪在表則手足熱邪在表裡之間則手足溫至於邪傳少陰則手足有逆冷之證與厥陰又相遠也然自熱而至溫自溫而至厥乃傳經之邪輕則四逆散重則承氣湯下之非若得病手足便逆而不溫者四逆湯溫之則為陰經受邪而陽氣不足也其或吐利煩躁厥逆蜷臥皆屬少陰又為不治之證少陰病四逆其人或咳或悸或小便不利或腹中痛滿或利下重並四逆散初病以來厥冷四逆即四逆湯手足逆冷大便閉小便赤或大便黑色脈沉而滑此為陽證以白虎湯甚者大承氣湯厥逆陽氣伏藏陰氣越出陰陽不相順接所以厥也若先熱而後厥者乃熱邪伏於內也先厥而後熱者乃陰退而陽得復也若始得病便厥者是陽不足而陰勝也熱伏於內者其脈沉而數狂言發渴露手揚衣躁不得眠或大便閉初便厥者其脈沉遲而弱醒醒而靜惡寒引衣或下利清穀也其或惡寒蜷臥煩躁下利不知人皆為惡候故曰逆也先發熱而後厥者揚手擲足煩躁飲水畏熱頭汗大便閉小便赤怫鬱昏悸當下失下血氣不通所以謂熱深則厥深者此也大柴胡湯小承氣選而用之初病便厥足攣惡寒引衣自蓋不渴大小便自利默默而惶惶諸四逆選用之傷寒厥而心下悸者宜先治悸茯苓桂甘湯後治厥四逆湯吐利厥逆煩躁欲死者吳茱萸湯當歸四逆湯仍灸太溪不大便不大便謂大便難也皆因發汗利小便耗其津液以致腸胃乾燥而轉屬陽明裡者多矣其小便自數者則為津液偏勝故使大便亦難也若下若發汗小便數大便硬者與承氣湯和之謂津液內竭也又有不宜便下者至於脈浮脈虛惡寒此尤帶表邪乃不可下其嘔吐為邪未入腑雖有陽明證不可攻之小便清者知其邪不在裡仍在表也大便難小便少不轉矢氣此內無燥屎也但初硬後溏爾陽明脈浮或經發汗小便自利不大便者亦津液內竭宜蜜導煎通之經曰其脈浮而數能食不大便此為實名曰陽結也宜大柴胡湯若不了了得屎而解其脈沉而遲不能食身體重大便反難名曰陰結也宜金液丹傷寒不大便六七日頭痛有熱者小承氣湯病人不大便六七日繞臍煩躁發作有時者此為屎硬不得大便小承氣湯夫病陽明者下之則硬汗多極發其汗則亦硬並小柴胡湯陽明病脅下硬滿不大便而嘔舌上白苔小柴胡湯少陰病六七日腹脹不大便急下之大承氣湯若發汗若利小便津液內竭大便自難者不可攻之無陰陽強大便者下之必清穀脹滿並用蜜導煎譫語鄭聲附經曰邪氣盛則實精氣奪則虛故實則譫語虛則鄭聲傷寒胃中熱盛上乘於心心為熱冒則神識昏迷妄有所見而言也輕者睡中呢喃重者不睡亦語亦有譫語者有獨語者有語言不休者有言亂者凡此見其熱之輕重也大抵熱入於胃水涸屎燥必發譫語又有被火劫者有亡陽者名各不同但氣短者死脈自和則愈或喘滿氣逆而上奔自利柔脫而奪下皆為逆也譫語者脈洪數大便閉小便赤手足溫與調胃承氣湯胃實譫語身熱汗多便難或潮熱諸承氣湯選用之發汗多亡陽譫語身自和不可下柴胡桂枝湯下利譫語為有燥屎脈不微細小承氣湯利不止者不治三陽合病譫語者脈滑實身重難以轉側口中不仁面垢遺尿不可汗下與白虎湯傷寒大熱乾嘔呻吟錯語不得眠犀角解毒湯得病無熱但狂言煩躁不安精采不與人相當與五苓散二錢以新汲水吐之則愈一法用豬苓湯瘀血狂言譫語漱水大便黑色小便多身黃腹滿此為當汗不汗蓄熱在裡輕者犀角地黃湯甚者桃仁承氣湯抵當丸婦人熱入血室晝靜夜譫如見鬼狀小柴胡湯陽明病其人喜忘必有瘀血抵當丸鄭聲者重語也又為不正之音也傷寒鄭聲如鄭衛之音不正也蓋因汗後若病人本音失而正氣虛則鄭重語不知高下乃精氣奪之候也其脈微細二便利用小柴胡湯小便不利小便難附邪氣聚於下焦結而不散甚則小腹硬滿而痛此小便所以不通大抵有所不利者行之所以滲泄也若飲水過多下焦蓄熱或中濕發黃水飲停留皆以利小便為先惟汗後亡津液胃汁干與陽明汗多者則以利小便為戒設或小便不利而見頭汗者乃為陽脫關格之疾矣飲水過多下焦蓄血熱小便不利脈浮者用五苓散脈沉者豬苓湯太陽病身黃脈沉者豬苓湯太陽病身黃脈沉結小腹硬小便不利者為亡血也五苓加茵陳嘔而發熱胸滿心下怔忡小便不利者為亡血也五苓加茵陳茯苓少陰病四逆或小便不利四逆散加茯苓陽明病無汗小便不利心下懊憹者身必發黃五苓散加茵陳經曰虛則小便難陰虛者陽必湊之由膀胱受熱致小便赤澀而不流利也又曰雖不大便也六七日而小便少者但初硬後溏未定或硬攻之必溏候小便多屎定硬方可攻之乃胃中水穀不別雖通而不能也陽明中風脈浮弦大身黃鼻乾氣短腹滿潮熱時噦胸脅痛小便難小柴胡加茯苓太陽病小便利者以飲水多必有心下悸茯苓白朮甘草湯小便少者必裡急豬苓湯小便自利小便數遺溺附小便自利者為津液漏滲大便必硬宜以藥微下之其陽明自汗者復發其汗使津液內竭屎雖硬尤不可攻縱使大便難蜜導煎導之太陰當發身黃其小便自利者則濕熱內泄不能發黃惟血證則腹急而如狂腎與膀胱虛則不能約制水液二者皆小便自利若腎與膀胱虛而挾熱熱則水道澀則小便不快故澀淋而數起也若自汗而小便數者雖有表證又不可用桂枝謂亡走津液也太陽病小便自利以飲水多心下悸茯苓桂枝茯苓甘草湯太陽自汗四肢拘急心煩微惡寒腳攣急小便數誤服桂枝湯得之便厥與甘草乾薑湯甘草芍藥湯脈浮自汗小便數胃不和譫語者少與調胃承氣湯陽明脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則難其脾為約宜麻仁湯少陰四逆小便自利或色白為虛寒四逆湯或真武湯去茯苓既吐且利小便復利而大汗出下利清穀內寒外熱脈浮欲絶者四逆湯舌上白苔臟結附經曰舌上如苔者以丹田有熱胸中有寒謂寒氣初傳入里也舌乃心之苗法應南方火色本紅乃邪氣在表舌則無苔又邪氣在裡津液結搏則舌上生苔而滑熱氣漸深其舌苔燥而澀熱聚於胃其舌苔為之黃矣若間黑色則熱已深病已極篤經曰凡熱病口乾舌黑者死乃腎水刑于心火也脈陰陽俱緊口中氣出唇口乾燥蜷臥足冷鼻中涕出舌上滑苔者勿妄治也到七八日以來其人微發熱手足溫者此為欲解或七八日以上反大發熱者此為難治設使惡寒者必欲嘔也小柴胡湯加生薑腹內痛者必欲利也理中湯太陽誤下胃中空虛客熱動膈懊憹舌苔梔子豉湯少陽病脅下硬滿不大便而嘔舌上白苔小柴胡湯陽明病舌上生苔五苓散舌黃者當下之金匱要略曰舌黃未下者下之黃自去臟結者臟氣祕結而不流布也一息不運機緘窮一毫不續霄壤判臟其可結乎外證如結胸狀但欲食如故時時下利為異耳其脈寸浮關沉而緊陰筋引臍腹俱痛是也病人脅下素有痞連臟結無陽證不往來寒熱其人反靜舌上苔滑者不可攻也刺關元灸之亦可仍與小柴胡湯加生薑咽痛咽喉不利或痛或癢不可納食皆毒氣上衝所致經曰太陽病下之脈緊者必咽痛以太陽之邪搏於少陰也少陰之脈循喉嚨夾舌本少陰咽痛脈浮遲厥冷或吐利亦屬少陰並不可汗下用桔梗湯豬膚湯甚者半夏散通脈四逆湯去芍藥加桔梗汗不止藁本溫粉撲之咽中生瘡不能言語聲不出者苦酒湯若傷寒六七日大下後寸脈沉遲尺脈不至咽喉不利唾血膿手足厥利不止者難治宜麻黃升麻湯腎傷寒一證乃非時暴寒伏於少陽之經頭痛腰痛脈微弱初咽痛以傷寒後必下利咽痛半夏桂枝湯即半夏散利四逆湯陽毒咽痛見發斑條咽中閉塞烏扇湯口瘡赤爛蜜浸黃柏噙咽痛甚者升麻六物湯頭眩少陽居表裡之間表邪傳裡表中陽虛故頭眩也又有發汗吐下後而眩者亦陽虛所致也若少陰病下利止而頭眩時自冒者此虛極而脫而風家亦有眩者風主運動故也其或諸逆發汗劇者言亂目眩而死也太陽病若下之因復發汗以此表裡俱虛其人必眩冒冒家汗自出而愈陽明病但頭眩不惡寒故能食而咳茯苓白朮甘草桂枝湯少陽之為病口苦咽乾目眩小柴胡湯太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地真武湯吐汗下後虛煩脈微沉緊心下癖脅下痛氣上衝咽喉眩冒身搖筋脈動惕久而成痿茯苓桂枝白朮甘草湯痿用栝蔞湯鼻衄經絡熱盛迫血妄行出於鼻者為衄血也是雖熱其邪尤在經然亦不可發汗經曰以桂枝麻黃治衄非治衄也乃欲散其經中邪氣耳衄血故為欲解若衄不止而頭汗出其身無汗及發熱汗不至足者又為惡證當明辨之太陽證衄血及服桂枝湯後致衄者為欲解也屬犀角地黃湯衄不止茅花湯無汗能食者即欲衄黃芩湯衄家不可發汗汗出必額上陷脈緊急直視不能盻不得眠芍藥地黃湯陽明病渴欲漱水不咽者必衄黃芩芍藥湯不因下而自利加衄者麻黃升麻湯脈浮大欲發熱下利鼻衄乾嘔者黃芩芍藥衄煩而後渴欲飲水水入即吐先服五苓散次服竹葉石膏湯少陰病但厥無汗強發之必動其血或從口鼻或自目出名下厥上竭為難治當歸四逆湯仍灸太溪三陰交湧泉一法用黑錫丹吐血諸陽受熱其邪在表當汗不汗致使熱毒入臟積瘀於內遂成吐血凡見眼閉目紅神昏語短眩冒迷妄煩躁漱水狂驚譫語鼻衄唾紅背冷足寒四肢厥逆胸腹急滿大便黑利小便頻數皆瘀血證也不必悉具但見一二便作血證主張初得此病急宜用藥至於陸續不已經數時而腹痛者此又難於料理也經曰服桂枝湯吐者其後必吐膿血犀角地黃湯大下後寸脈沉遲尺脈不至咽喉不利唾膿血者麻黃升麻湯此有兩證一陽毒一陰毒陽毒用升麻湯陰毒用甘桔湯加半夏生薑血熱者黃連阿膠湯地榆柏皮湯三黃瀉心湯脈浮發熱反灸之必咽燥吐血救逆湯咽喉閉塞不可發汗發汗則吐血氣欲絶手足厥冷蜷臥不能自溫當歸四逆湯心悸心悸者築築然動怔忡不能自安者是也其證有二一者氣虛一者停飲其氣虛者陽氣內弱心中空虛而為悸又有汗下之後正氣內虛亦令人悸與氣虛而悸者則又甚也法當定其氣悸也其停飲者由飲水過多停留心下心火畏水不能自安而為悸也治法必先分水氣雖有餘邪亦先治悸免使水氣散走而成他證也傷寒二三日心中悸而煩小建中湯經云先煩而悸者此為熱先悸而煩者此為虛故宜建中湯太陽病小便利者以飲水多故心下悸茯苓桂枝白朮甘草湯小便少者必裡急豬苓湯陽明病壯熱來往心下悸小便不利心煩喜嘔小柴胡湯太陽病發汗過多其人叉手自冒心下悸欲得按者桂枝甘草湯發汗後其人臍下悸欲作奔豚茯苓桂枝白朮甘草湯太陽病發汗不解仍發熱心下悸頭眩肌體瞤動振振欲劈地真武湯少陽病耳聾目赤胸滿而煩妄加汗下則悸而驚與小建中湯有熱者小柴胡湯少陰病四逆其人或悸四逆散加桂枝心下有水氣厥而悸當先治水茯苓甘草湯不然水入胃中必不利也傷寒脈結代心動悸炙甘草湯發黃內經曰濕熱相交民多病疸疸者單陽而無陰也太陰脾土為濕熱所蒸則雖見於外必發身黃濕氣勝則如熏黃而晦熱氣勝則如橘黃而明傷寒至於發黃熱勢已極且與蓄血大抵相類小便不利為發黃小便自利為蓄血也設或寸口無脈鼻出冷氣與夫形如煙燻搖頭直視環口黧黑舉體發黃是皆真臟氣絶也傷寒瘀血在裡身必發黃麻黃連翹赤小豆湯太陽中濕發黃身熱頭痛目黃汗出濕在裡五苓散梔子柏皮湯濕家之為病一分盡痛發熱身雖如似熏黃小便不利五苓散小便自利朮附湯身煩痛麻黃湯加蒼朮脈浮身重汗出惡風防己黃耆湯陽明病脈遲食難用飽飽則微煩頭眩必小便難此欲作谷疸雖下之腹滿如鼓谷疸湯五苓散加茵陳陽明傷寒發黃易飢短氣腹滿鼻乾咽燥心脅痛小便難潮熱咳嗽頭眩嗜臥脈弦浮大小柴胡湯加茯苓血證發黃如狂小便多大便黑犀角地黃湯桃仁承氣湯抵當湯選用之黃疸脈浮滑緊數頭面汗出渴飲水漿小便不利茵陳蒿湯調五苓散初發黃以瓜蒂末口噙水搐鼻中黃水出愈發狂難經曰重陰者癲重陽者狂傷寒熱毒在胃併入於心遂使神不寧而志不定也故發狂始則少臥不飢妄語妄笑甚則登高而歌棄衣而走逾垣上屋皆獨陽亢極熱之所致非大下之不能止也亦有當汗不汗瘀熱在裡下焦蓄血如狂者小便不利時如狂未至於狂耳若夫狂言直視便溺自遺其與汗後大熱脈燥狂言不食又為可慮也重陽即陽毒脈數實狂走錯語煩躁乾嘔面赤咽痛潮熱發狂或下利黃赤陽毒升麻黃芩湯時行熱病發狂黑奴丸經曰太陽病不解熱結膀胱其人如狂而血自下者愈若外不解與桂枝湯外已解但小腹急結桃仁承氣湯血證如狂脈微身黃唇燥漱水無寒熱小腹滿小便不利大便黑犀角地黃湯甚者桃仁承氣湯抵當丸取下黑物為效筋惕肉瞤內經曰陽氣者精則養神柔則養筋發汗過多津液枯少陽氣偏虛筋肉失所養故惕然而跳瞤然而動非溫經助陽不可也張氏故特設真武湯以救之或因發汗吐下後表裡俱虛而有此狀者此又逆之甚矣太陽病發汗不解發熱心悸頭眩身瞤欲劈地真武湯發汗過多或虛弱人微發汗或傷風自汗妄用大青龍湯便有厥逆筋惕肉瞤之證並屬真武湯羸者去芍藥有熱者去附子應發而腹中左右有動氣者並不可汗汗之則筋惕肉瞤或頭眩汗出不止其候最逆先宜防風白朮牡蠣湯次服小建中湯十救一二吐下之後心下逆滿氣上衝胸起則頭眩脈沉緊身振搖者茯苓桂枝白朮甘草湯久而成痿者通用心下痞滿者枳桔湯加茯苓甘草多眠汗下附霍亂夫衛氣者晝行於陽夜行於陰行陽則寤行陰則寐陽氣虛陰氣盛則目瞑故多眠乃邪氣傳於陰而不在陽也昏昏閉目陰自闔也默默不言者陰主靜也經曰太陽病十日已去脈浮細嗜臥者外已解也鼻乾不得汗嗜臥者風熱內攻不幹乎表故熱氣伏於裡則喜睡也三陽合病但欲眠睡目合則汗譫則有熱也見盜汗其胃熱亦嗜臥也風溫狐惑亦有是證又當辨之太陽病十日脈浮細嗜臥者外雖已解設胸滿脅痛鼻乾不得汗者小柴胡湯脈但浮者麻黃湯少陰病但欲寐尺寸俱沉細者四逆湯少陰病欲吐不吐心煩多寐尺寸俱沉細者四逆湯少陰病欲吐不吐心煩多寐五六日自利而渴小便白者則止矣其濕霍亂死者少乾霍亂死者多若上不得吐下不得利所傷之物不得出泄壅閉正氣陰陽懸隔喘脹而死素問食飲有節起居有常安得有霍亂也霍亂頭痛發熱身疼痛熱多欲飲水五苓散寒多不飲水者理中湯吐利汗出脈微惡寒手足厥冷拘急四逆湯腹滿而痛四肢拘急轉筋下利理中湯加附子官桂加減詳見本方吐利止身痛不休桂枝湯既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯吐利止但汗出而厥四肢拘急不解脈微欲絶者通脈四逆加豬膽汁陰陽易陰陽交凡男子陽易婦人陰易者病新瘥而動淫欲也其候身重氣乏小腹絞痛頭不能舉足不能行四肢拘急百節解散眼中生花手足拳攣其脈離經皆不可治或榮衛精髓竭翕翕少氣手足不能舉者而死籲外傷六氣內傷七情其為害若是耶燒裩散猳鼠屎湯竹皮湯乾薑湯青竹茹湯當歸白朮湯宜選用之陰陽交者溫病不得發汗汗之復生大熱狂言不食其脈燥疾是也皆不治若脈浮數表證尤在可再汗之若脈沉實則為胃實又從汗下之後復熱者同此法再汗用桂枝湯再下用承氣湯怫鬱怫鬱者陽氣蒸越形於頭面體膚之間聚赤而不散其證則有異焉大便硬而氣短者實也汗下後而得噦者虛也當詳究之太陽初得病發汗不徹並於陽明續自微汗出面色赤者陽氣怫鬱也解肌湯或汗久不徹其脈浮緊與麻黃湯小便不利時有微熱大便乍難怫鬱不得臥此燥屎裡實也承氣湯主之汗下後虛熱又復下之其人怫鬱復與之水因而成噦此胃中寒也桂枝人參湯加茯苓瘛瘲瘛瘲者瘈則急而縮瘲則緩而伸熱則生風風主動故筋脈相引而伸縮傷寒至於瘛瘲可謂危矣能以祛風蕩熱之劑減其大勢間有可治者治法與痓同戰栗戰栗者陰陽爭戰故身為之搖也邪氣外與正氣爭則為戰邪氣內與正氣爭則為栗戰者正氣勝故有得汗而解者栗則不戰而但鼓頷遂成寒逆此陰氣內熱正不勝邪宜姜附四逆湯加灼艾以御之經曰陰中干邪必內栗也又云邪中下焦陰氣為栗足膝逆冷便溺妄出皆此類耳方在惡寒條四逆湯甘草乾薑湯若復躁而不得臥者不治時行兩感時行者春應暖而反大寒夏應熱而反大涼秋應涼而反大熱冬應寒而反大溫此非其時而有其氣是以一歲之中長幼之病多相似者此即時行之氣春感寒邪在肝升麻葛根解肌湯夏感寒邪在心調中益氣湯射香湯半夏桂枝甘草湯秋感濕邪在肺白虎加蒼朮發黃茵陳五苓散冬感寒邪在腎名曰冬溫栝蔞湯溫疫通用人參敗毒散升麻葛根湯從春分以後至秋分節前天有暴寒者皆為時行寒疫宜用辛溫藥發散傷寒兩感半屬於陰半屬於陽臟腑俱受病一日太陽少陰俱病則頭疼口乾煩滿而渴二日陽明太陰受病則腹滿身熱不欲食譫語三日少陽厥陰俱病則耳聾囊縮而厥水漿不入口不知人者六七日死長沙無治法但凡兩感病俱作治有先後發表攻裡本自不同後人以意消息謂如下利不止身體疼痛當先救里與四逆湯清便自調與桂枝湯然治有先後之說太陽先受病在表先解表少陰先受病在裡先救里先表者里不可緩也先里者表亦不可緩也此通權變之論也不得眠陽盛陰虛則晝夜不得眠蓋夜以陰為主陰氣盛則目閉而臥安若陰為陽所勝故終夜煩擾而不得眠也所謂陰虛則夜爭者是也汗出鼻乾不得臥則邪在表也若胃有燥屎與大熱錯語及大汗胃中汁干而不得臥則為邪在裡也胃不和則臥不得安故宜散熱和胃若汗吐下後虛煩不得眠又從梔子豉湯以湧之至於少陰病熱煩於內而不得眠又宜扶陰散熱若瘥後不得眠者則熱氣與諸陽相併陰氣未復也有汗下太過陽氣暴虛而不得眠者若無熱證又宜姜附湯以退陰復陽也此又不可不知太陽病二三日不能臥但欲起心下結脈微弱者此本有寒今反下之若利止必結胸未止三四日復下必協熱而利結胸理中丸協熱而利白頭翁湯少陰利下咳而嘔渴心煩不得眠者豬苓湯此停水也若二三日心煩不得眠黃連阿膠湯病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也大承氣湯下之後復發汗晝則煩躁不得眠夜則安靜不嘔不渴無表裡證脈沉微身無大熱者乾薑附子湯吐下汗後心中懊憹虛煩不得眠梔子豉湯陽勝陰則狂言亂夢心煩乏氣者酸棗湯陰勝陽則驚悸昏沉大熱乾嘔呻吟錯語不得眠犀角解毒湯中風汗出脈濡而弱厥而且寒躁不得眠小建中湯煩躁竹葉石膏湯瘥後飲酒煩惡乾嘔口燥呻吟錯語不得眠犀角解毒湯發斑大熱則傷血血熱不散裡實表虛熱氣乘虛出於皮膚而為斑也輕則為疹子甚則為錦紋或病本屬陽誤投熱藥或當汗不汗當下不下或汗下未解皆能致此大抵有兩證一者溫毒即春時發汗下不解邪氣不散故發斑也一者熱病即冬時溫暖乖戾之氣遇春暄熱而發斑也不可誤汗若發其汗重令開泄更加斑爛也然而斑之方萌如蚊跡類焉發斑多見於胸腹蚊跡只在於手足陽脈洪大病人昏憒先紅後赤者斑也脈不洪大病人自靜先紅後黃者蚊跡也其或大便自利怫鬱氣短燥屎不通又如果實靨者雖盧扁復生亦不能施其巧凡汗下不解煩悶咳嗽嘔吐足冷不溫便是發斑之候溫毒發斑黑膏主之渴而心悶下利嘔吐下部有瘡或口瘡黃連橘皮湯葛根湯橘皮湯陽毒發斑狂癲妄言面赤咽痛身斑如錦下利赤黃升麻湯麥奴丸有下證調胃承氣湯時氣發斑大青四物湯豬膽雞子湯發斑通用升麻湯犀角地黃湯熱多者玄參升麻湯黃連一物湯青木香一物湯凡赤斑五死一生黑斑不救動氣動氣者臟氣不調築築跳動隨臟所主而形見於臍之左右上下也難經各臟載之又有真氣內虛水結不散氣與相搏即發奔豚以其從氣衝突如豚之奔皆不宜汗下然而獨不言脾當臍之有動氣者脾為中州以行津液妄施汗下必先動脾是以不言而喻也左右上下不宜汗下何況中州之氣其敢輕動之乎傷寒所以看外證為當者蓋不在脈之可見必待問之可得發汗下其可輕舉哉動氣通用理中湯去白朮加桂白朮燥腎閉氣故去之桂泄奔豚加之一法用柴胡桂枝湯亦良二方當看有熱無熱動氣在左發汗則頭眩汗下不止筋惕肉瞤為逆先宜防風白朮牡蠣湯汗止與建中湯動氣在右發汗則衄而渴心若煩飲則吐先宜五苓散後與竹葉石膏湯動氣在上發汗則氣上衝心桃根湯動氣在下發汗則心中大煩骨節疼痛目暈食入即吐先宜大橘皮湯後與小建中湯動氣在左不可下下之則腹滿拘急身雖熱反欲拳先宜甘草乾薑湯後與小建中湯動氣在右下之則津液竭咽乾鼻燥頭眩心悸宜竹葉石膏湯動氣在下下之則腹滿清穀心痞頭眩宜甘草瀉心湯蛔厥狐惑蛔厥屬厥陰病人素有寒妄發其汗或汗後身有熱又復汗之以致胃中虛冷飢不欲食食即吐蛔而乍靜乍煩者蛔或上而或下也蟲聞食臭必出所以食即吐蟲也蛔厥先用理中丸次用烏梅丸若誤下之利不止用四逆湯狐惑濕䘌皆蟲證也蓋腹中有熱入食無多腸胃空虛故三蟲求食而食人之五臟也其候四肢沉重惡聞食氣默默欲眠目不能閉齧齒晦面眉間赤白黑色變易無常蟲食下部為狐下唇有瘡其咽乾蟲食其臟為惑上唇有瘡其聲啞治䘌通用桃仁湯黃連犀角湯雄黃鋭散無陽者用金液丹厥陰為病消渴氣上衝心飢不欲食食即吐蛔曰胃寒復有消渴之證蓋熱在上焦而中焦則但寒無熱矣又有大便難一證並用理中湯加大黃入蜜少許微利之百合病百合者百脈一宗舉身皆受病無復所謂經絡傳次也大病虛勞之後臟腑不平變而成此其狀似寒無寒似熱無熱欲食不食欲臥不臥欲行不行口苦便赤藥入即吐利也其脈微數每尿則頭痛六十日愈頭痛者但淅淅然惡寒者四十日愈若尿則快然但頭眩者二十日愈百合知母湯百合地黃湯滑石代赭湯雞子湯百合洗方可選用之不仁不仁謂不柔和也經曰諸虛承寒則為鬱冒不仁蓋其血氣虛少不能周流於身是為邪氣所伏故肌體頑麻不知痛癢寒過厥如尸而鬱且冒也設或脈浮而洪身汗如油喘而不休水漿不下形體不仁又此為命絶也經曰少陰脈不至腎氣微精血少寒氣上奔血結心下陽氣退下熱歸陰股與陰相動人之身不仁此為尸厥以鬱冒不仁為可刺之而得痊者實神醫之診也甘草乾薑湯桂枝芍藥湯加乾薑桂枝麻黃各半湯宜消息選用之霍亂霍亂者上吐下利揮霍而撩亂者是也邪在上焦吐而不利邪在下焦則利而不吐邪在中焦既吐且利然胃氣為邪氣所傷陰陽乖隔遂上吐而利也乃謂霍亂其餘但稱吐利者有以異也故以乾霍亂死者多濕霍亂死者少吐利則所傷之物得以泄出胃中水穀盡也瘥後昏沉傷寒瘥後半月以來十餘日終不惺惺錯語少神或寒熱似瘧或潮熱頰赤醫以風溫治之非也是由發汗不透寒熱在心包絡間也瘥後昏沉不醒知母麻黃湯取微汗胃脘有熱虛煩而嘔竹葉石膏湯加生薑嘔吐不已膈上有寒理中丸瘥後從腰以下有水牡蠣澤瀉散瘥後日暮微煩以其病方瘥強與穀食不消也損谷則愈矣傷寒四證類玄出指掌圖痰證外證憎寒壯熱惡風自汗胸滿氣上衝咽不得息但身不疼項不強若涎多者亦隱隱頭疼脈有寸浮者亦有寸伏者以意參之柴胡半夏湯金沸草散大半夏湯氣上衝者瓜蒂散吐之傷食亦頭疼惡寒身熱但左手脈平和右手脈緊盛知為食也大橘皮湯二陳湯心腹滿痛大柴胡湯下之胸滿嘔吐瓜蒂散吐之虛煩諸虛煩熱與傷寒相似但不惡寒頭不疼身不痛為異耳表既虛不可汗里不實不可下叔和云虛煩有熱不可攻腳氣傷寒傳足不傳手所以寒濕之氣發於足則類傷寒其證頭疼身熱肢節痛大便祕或嘔但初病時起於腳膝屈弱不能移動為異耳感於寒所患必冷越婢小續命湯入生薑汁最妙感於暑所患是熱小續命去附子減桂一半腳腫木瓜散檳榔散大便祕脾約丸小便自利太陽身黃小便當不利今反自利其人如狂血證也抵當湯傷寒有熱小腹滿應小便不利今反自利為有血也抵當丸下之尿血延胡索湯延胡索朴硝二兩為末每服四錢水一盞煎八分溫服陽明自汗應小便不利而反自利津液內竭也屎雖硬不可攻宜蜜導煎豬膽汁法少陰四逆小便自利虛寒也四逆湯及真武湯去茯苓小便祕或赤知內有熱也小便自利其人如狂小腹滿知不為熱乃蓄血也若陽明津竭自利與夫少陰自利乃胞寒不禁可不溫乎熱入血室婦人中風發熱惡寒經水適來得之七八日熱除脈遲身涼胸脅滿如結胸狀譫語者此為熱入血室當刺期門隨其實而瀉之婦人傷寒發熱經水適來晝日明瞭暮則譫語如見鬼狀此為熱入血室無犯胃氣及上中二焦必自愈婦人中風七八日續得寒熱發作經水適斷此為熱入血室其血必結故如瘧狀小柴胡湯陽明下血譫語此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出而愈婦人熱入血室有二經水適來二條不言藥者蓋以經血方來熱氣乘虛而入經血止則熱亦出矣故不可用汗下藥犯其胃氣及上中焦如其胸滿譫語此內實也刺期門以瀉之若經水適斷續得寒熱其血必結故用小柴胡湯若陽明熱入血室此男子失血之證但當刺以瀉熱也
