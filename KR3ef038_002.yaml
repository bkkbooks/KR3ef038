body:
  text: 傷寒家祕的本卷之二傷寒總論治傷寒業擅專門誠為重寄論死生易如反掌利莫苟圖雜證緩可取方傷寒專在活法原傷寒有活人書明理論指掌圖傷寒論其中有論缺方者有方失論者有脈無證者有證無法者非仲景之全書緣其歷年已久遺失頗多王叔和以斷簡殘篇而補方造論成無己順文注釋而集成全書所以遺禍至今而未已也較今庸俗治傷寒一二日不問屬虛屬實而便用麻黃桂枝之類汗之三四日不問在經在腑而便用柴胡之類和之五六日不問在表在裡而便用承氣之類下之以致內外俱虛變證蜂起大抵病人表裡虛實不同邪之傳變有異豈可以日數為準蓋風寒初中人無常或入於陰或入於陽事無定體非但始太陽終厥陰論也或有自太陽始日傳一經六日傳至厥陰邪氣衰不傳而愈者或有不罷再傳者或有即傳者或有間經而傳者或有傳至二三經而止者或有始終只在一經者或有越經而傳者或有初入太陽不作鬱熱便入少陰而成真陰證者或有直中陰經而成寒證者或有證變者或有脈變者或有取證不取脈者或有取脈不取證者緣經無明文後人有妄治之失況前人立法之差使後人蒙害者多矣夫麻黃桂枝二湯仲景立治冬時正傷寒之方今人通治非時暴寒溫暑之誤又將傳經陰證與直中陰經之陰證混同立論豈為善乎暴寒溫暑必有別方直中傳陰必有活法今皆忘失而無徵也古人之書引領後進書不盡意意不盡言說其大概雖博古而通今皆在得其傳受須活潑潑地且活法者如珠走盤但見太陽證者宜直攻太陽但見少陰直攻少陰此活法也仲景又云日數雖多但有表證而脈浮者尤宜汗之日數雖少但有里證而脈沉者尤宜下之此先賢之確論也切不可執定一二日發表三四日和解五六日方下此庸醫執死法也務俾審脈驗證辨名定經一一親切無疑方可下手真知其為表邪而汗之真知其為里邪而下之真知其為直中而溫之如此而汗如彼而下又如彼而溫桂枝承氣授之不差姜附理中發而必當投劑少差死證立見可不深思而熟慮哉仲景取方立論甚嚴曰可溫曰可汗曰少與曰急下與夫先溫其里乃攻其表先解其表乃攻其里得其綱領者不難也如響應聲如影隨形見病者則目識心通見醫人則接談無慮不得其傳者實難也見病者舉手無措見醫人則汗顏緘默此猶繡麒麟耳正謂名譽虛隆而實德則病矣嗟夫常病用常法誰人不知設有感冒非時暴寒而誤認作正傷寒者有勞力感寒而誤認作真傷寒者有雜證類傷風而誤認作傷寒治者有直中陰經真寒證而誤認作傳經之熱證者有溫熱病而誤認作正傷寒治者有暑證而誤認作傷寒治者有如狂而認作發狂者有血證發黃而誤認濕熱發黃者有蚊跡而認作發斑者有動陰血而認作鼻衄者有譫語而認作狂言者有獨語而認作鄭聲者有女勞復而認作陰陽易者有短氣而認作發喘者有痞滿而認作結胸者有心下硬痛下利純清水而俗呼為漏底者有噦而誤認乾嘔者有並病而認作合病者有正陽明腑病而認作陽明經病者有太陽證無脈而便認死證者有里惡寒而認作表惡寒者有表熱而誤作裡熱者有陰發躁而認作陽證者有少陰病發熱而認作太陽證者有標本全不曉者此幾件終世不相認者比比然乎胸中若不證脈講明論方得法但同庸俗一概妄治此殺人不用刃耳非惟救人功大亦且陰騭匪輕吾老矣傷寒專科實得仲景先師厥旨雖無萬全之功十中可生八九曾著有書不能盡心刻骨因今老邁後恐繼業者不得其傳有玷名行遂將一生所蓄肺腑語句並家祕不傳之妙及一提金殺車槌法逐一語録於後論注證而證注脈脈注法而法注方再三叮嚀吾後子孫不必集閒方而睹別論別繁亂而莫知其源必須熟記久則自然精貫不與庸醫伍不使時醫笑可也爾宜珍藏受授謹之慎之毋怠毋忽故戒傷寒祕要脈證指法與瑣言大略同傷寒治法得其綱領者如拾芥若求之多岐則支離破碎如涉海問津矣蓋脈證與理而已傷寒之脈以浮大動數滑為陽沉澀弱弦微為陰然脈理精深今人何能到此田地耶夫脈者非血非氣乃營行之道路實先天后天之大造無所窮盡叔和脈云指下難明者真言也今人夸誕通曉者但能言而不能行也吾老專以浮中沉三脈候而治之察其陰陽表裡虛實寒熱如見其肺肝然無所逃其情矣既云傷寒則寒邪自外入內而傷之其入則有淺深次第自表達里先入皮膚肌肉次入筋骨腸胃以此推之而不難也原風寒初入或先太陽寒水之經此經本寒標熱便有惡風惡寒頭疼發熱蓋寒鬱皮毛是為表證若在他經則無此證矣脈若浮緊無汗為傷寒用麻黃湯發之得汗為解脈若浮緩有汗為傷風用桂枝湯以散邪汗止為解若無頭疼惡寒脈又不浮此為表證罷而在中中者即半表半裡之間也乃陽明少陽之分脈又不浮不沉在乎肌骨之間謂皮膚之下然則有二焉若微洪而長陽明脈也外證則目痛鼻乾不眠用葛根以解肌脈弦而數少陽脈也其證胸脅痛而耳聾寒熱嘔而口苦如見此證此脈便以小柴胡和之蓋陽明少陽二經不從標本從乎中也過此邪入里為熱實脈不浮而沉沉則按之筋骨之間方是若是脈來沉實有力外證則不惡風寒而反惡熱譫語大渴或潮熱自汗或揚手擲足揭去衣被五六日不大便明其熱入里而腸胃燥實也輕則大柴胡湯重則三承氣湯選用大便通而熱愈矣若脈來沉遲無力此為直中陰經真寒證之陰脈其證無頭痛無身熱初起怕寒手足厥冷或戰栗蜷臥不渴兼之腹痛嘔吐泄瀉或口出涎沫面如刀刮者乃陰經自中之寒不從陽經傳入故不在傳經熱證治例更當看外證如何輕則理中湯重則姜附四逆以溫之其中緊要關節吾再表而出之太陽者陽證之表陽明者陽證之裡少陽者二陽三陰之間太陰少陰厥陰又居於里總而謂之陰證然三陰俱是沉脈妙在指下有力無力中分有力者為陽為實為熱無力者為陰為虛為寒最為切當其三陽經證前論已云不再多録夫三陰傳經熱證脈雖開明論尤未詳重加訂證如腹滿咽乾屬太陰舌乾口燥屬少陰煩滿囊縮屬厥陰此三者俱是陽經傳入陰經之熱證脈見沉實有力急當攻裡下之如其下後利不止身疼痛脈反沉細無力又當救里溫之此權變之法也三陰傳經熱證與其三陰直中寒證脈雖沉而有力無力所別證有異而治各不同是其大法也歟前云正陽明病本經風盛氣實脈亦沉實有力者因邪熱傳入胃腑而有燥屎此一節指腑病屬裡而言也實證治之奇功指法之玄妙祕之不與俗人言之耳今將浮中沉三脈列為三圖圖下就注證治之法使因脈以知證緣證以明治以此達彼猶粗入精亦可以為後人之宗也論浮脈形法主病浮初排指於皮膚之上輕手按之便得曰浮此為寒邪初入太陽陽經病在表之標可發而去之雖然治之則有二焉寒傷榮則無汗惡寒用麻黃湯風傷衛則自汗惡風用桂枝湯一通一塞不可同也浮緊有力無汗惡寒頭項痛腰脊強發熱此為傷寒在表宜發散冬時麻黃湯春夏秋皆用羌活沖和湯浮緩有汗惡風頭項痛腰脊強發熱此為傷風在表冬時用桂枝湯餘三時用加減沖和湯腹痛小建中湯痛甚者桂枝大黃湯論中脈形狀指法主病中按至皮膚之下肌骨之間略重按之乃得謂之半表半裡證也然亦有二焉蓋陽明少陽二經不從標本從乎中也長而有力即微洪脈也此為陽明在經其證微有頭疼眼眶痛鼻乾不得眠發熱無汗用葛根解肌湯若渴而有汗不解或經汗過渴不解者用白虎湯加人參無渴不可服此藥為大忌弦而數此為少陽經脈其證胸脅痛而耳聾寒熱嘔而口苦俱用小柴胡湯本方自有加減法或兩經合病則脈弦而長此湯加葛根芍藥緣膽無出入有三禁只宜和解表裡論沉脈形狀指法主病沉重手按至肌肉之下筋骨之間此為沉脈亦有二焉陰陽寒熱在沉脈中分無人知此實祕訣耶沉數有力則為陽明之本表證解而熱入於裡惡寒頭疼悉除反覺怕熱欲揭衣被揚手擲足譫語狂妄燥渴或潮熱自汗五六日不大便輕則大柴胡湯重則三承氣選用沉遲無力為寒外證無頭疼無身熱不渴初起怕寒厥冷蜷臥兼或腹痛吐瀉或戰栗面如刀刮或口吐白沫冷涎皆是陰經自中真寒證輕則理中湯重則姜附四逆湯溫之傷寒至沉脈方分陰陽仔細體認下藥不可造次倘有差失咎將歸己凡診脈須分三部九候每部必先浮診三候輕手於皮膚之上候三動也中診三候略重指於皮膚之下肌肉之上候三動也沉診三候重手於肌肉之下筋骨之上候三動也三三而成九候然後知病之淺深表里以為處治之標的豈可忽略於脈而欲求病之所在乎切脈謂之巧得心應指自然神效有枉死者此吾所不信也若不明脈識證狂妄行醫視人命如草芥他日若不受天殃吾亦不信也辨脈雖浮亦有可下者脈雖沉亦有可汗者夫脈浮當汗脈沉當下固其宜也其脈雖浮亦有可下者謂邪熱入腑大便難也大便不難豈敢下乎其脈雖沉亦有可汗者謂少陰病身有熱也假若身不發熱豈敢汗乎此取證不取脈也論風傷衛氣寒傷榮血辨蓋風則傷衛氣寒則傷榮血者緣氣本屬陽風屬陽陽則從陽故傷衛氣陽主開泄皆令自汗故用桂枝湯辛甘溫之劑以實表血本屬陰寒屬陰陰則從陰故傷榮血陰主閉藏皆令無汗故用麻黃湯輕揚之劑以發表正所謂水流濕而火就燥云從龍而風從虎各從其類者是也用藥寒溫辨夫發表之藥用溫攻裡之藥用寒溫里之藥用熱者表既有邪則為陽虛陰盛溫之乃所以為陽陽有所助而長則陰邪所由以消故用辛甘溫之劑發散為陽此指發表之藥用溫者明矣里既有邪則為陰虛陽盛寒之乃所以助陰而抑陽陽受其抑則微而真陰所由以長故用酸苦之劑瀉湧為陰此指攻裡之藥用寒者明矣陰經自受寒邪則為臟病主陽不足而陰有餘故用辛熱之劑以助陽抑陰此指溫經之藥用熱者明矣表有邪不汗之其邪何從而去里有邪不下之其邪何從而出臟有寒不溫之其寒何從而除此三者所謂用藥寒溫辨也正傷寒及溫暑暴寒勞力感冒時疫治各不同論夫傷寒二字蓋冬時天氣嚴寒以水冰地凍而成殺厲之氣人觸犯之即時病者為正傷寒乃有惡寒頭疼發熱之證故用麻黃桂枝發散表中寒邪自然熱退身涼有何變證如或頭疼惡寒表證皆除而反見譫語怕熱燥渴大便閉者以法下之大便通而熱愈有何怪證其餘春夏秋三時雖有惡寒身熱頭疼亦微即為感冒非時暴寒之輕非比冬時氣正傷寒為重也如冬感寒不即病伏藏於肌膚至春夏時其伏寒各隨時氣改變為溫為熱者因溫暑將發又受暴寒故春變為溫病既變之後不得復言其為寒矣所以仲景有云發熱不惡寒而渴者其理可見溫病也暑病亦然比之溫病尤加熱也不惡寒則病非外來渴則明其熱自內達表無表證明矣治溫暑大抵不宜發汗過時而發不在表也其伏寒至夏又感暴寒變為暑病暑病者即熱病也取夏火當權而言暑字緣其溫暑二證從冬時伏寒所化總曰傷寒所發之時既異治之不可混也若言四時俱是正傷寒者非也此三者皆用辛涼之劑以解之若將冬時正傷寒之藥通治之定殺人矣辛涼者羌活沖和湯是也兼能代大青龍湯治傷寒見風傷風見寒為至穩一方可代三方危險之藥如坦夷其神乎哉世俗皆所未知也若表解而里證具者亦以法下之無惑又傷寒汗下後過經不愈者亦溫病也已經汗下亦不在表也隨病制宜凡有辛苦勞役之人有患頭疼惡寒身熱加之骨腿痠疼微渴自汗脈雖浮大而無力此為勞力感寒用補中益氣兼辛溫之劑為良經云溫能除大熱正此謂也若當和解者即以小柴胡加減和之下證見者即以本方加大黃微利之切勿過用猛烈其害非細若初病無身熱無頭疼便就怕寒厥冷腹痛嘔吐泄瀉脈來沉遲無力此為直中寒證宜溫之而不宜汗下也疫癘者皆時行不正之氣老幼傳染相同者是也緣人不近穢氣免傷真氣若近穢氣有傷真氣故病相傳染正如牆壁固賊人不敢入正氣盛邪氣不敢侵正氣既虛邪得乘機而入與前溫暑治又不同表證見者人參敗毒散半表半裡證者小柴胡里證具者大柴胡下之無以脈診以平為期與其瘧痢等證亦時疫也照常法例治之兩感傷寒誤治論與瑣言同傷寒兩感者陰陽雙傳也雖為必死之證猶有可救之理蓋用藥先後發表攻裡本自不同活人書先救里以四逆湯後攻表以桂枝湯殊不知仲景云太陽與少陰病頭疼惡寒邪在表口乾而渴邪在裡陽明與太陰病身熱目痛邪在表不欲食腹滿邪在裡少陽與厥陰病耳聾脅痛寒熱而嘔邪在表煩滿囊縮邪在裡三陽之頭痛身熱耳聾脅痛惡寒而嘔在表者已自不可下之其三陰之腹滿口渴囊縮譫語在裡者可不下乎活人書引下利身疼痛虛寒救里之例而欲施治於煩滿囊縮實熱之證可乎蓋仲景所謂發表者葛根麻黃是也攻裡者調胃承氣是也活人書卻謂救里則是四逆攻表則是桂枝今以救為攻豈不相悖若用四逆是火濟火而腹滿囊縮等證何由而除臟腑何由而通榮衛何由而行故死者可立而待也學者豈可執一定之法於胸中乎傷寒合病並病論合病並病世所難明若非得其精專焉能識此證哉合病者兩經或三經齊病不傳者為合病並病者一經先病未盡又過一經之傳者為並病若並而未盡是傳未過尚有表證法當汗之若並之已盡是為傳過法當下之是知傳則入腑不傳不入腑言其有傳受如此也三陽互相合病皆自下利太陽陽明合病主葛根湯太陽少陽合病主黃芩湯少陽陽明合病主承氣湯三陽合病無表證者俱可下但三陽經合病仲景無背惡寒語句雖則有口燥渴心煩背微惡寒者乃屬太陽證而非三陽合病也三陽若與三陰合病即是兩感所以三陰無合併例也傷寒少陰證似太陽太陽脈似少陰為反用藥不同論蓋太陽病脈似少陰少陰病證似太陽所以謂之反而治當異也今深究其旨均自脈沉發熱以其有頭疼故為太陽病脈當浮今反脈不浮而沉者以裡虛久寒正氣衰微所致今身體疼痛故宜救里使正氣內強逼邪外出而乾薑生附亦能出汗而解假使里不虛寒則見脈浮而正屬太陽麻黃證也均自脈沉發熱以其無頭疼故名少陰病當無熱今反寒邪在表但皮膚鬱閉而為熱而在裡無熱故用麻黃細辛以發表間之熱附子以溫少陰之經假使寒邪在裡則外必無熱當見吐利厥逆等證而屬正少陰四逆湯證也以此觀之表邪浮淺發熱之反尤輕正氣衰微脈沉之反為重此四逆為劑不為不重於麻黃附子細辛湯也可見熟附配麻黃發中有補生附配乾薑補中有發所謂太陽少陰脈沉發熱雖同而受病有無頭疼與用藥自別故並言之耳若誤治之其死必矣傷寒陰陽寒熱二厥辨陰陽二厥治之一差死證立判夫陽厥者先自三陽經氣分因感寒邪起於頭疼發熱惡寒已後傳進三陽血分變出四肢厥冷乍溫大便燥實譫語發渴揚手擲足不惡寒反怕熱脈沉有力此見傳經熱證謂之陽厥陽極發厥者即陽證似陰外雖有厥冷內有熱邪耳蓋因大便結實失下使血氣不通故手足乍冷乍溫也如火鍊金熱極金反化水水寒極而成冰反能載物厥微熱亦微四逆散厥深熱亦深大承氣正謂亢則害其物承乃制其極也若醫人不識疑是陰厥復進熱藥如抱薪救火矣夫陰厥者因三陰經血分自受寒邪初病無身熱無頭疼就便惡寒四肢厥冷直至臂脛以上過乎肘膝不溫引衣蜷臥不渴兼或腹痛吐瀉或戰栗面如刀刮口吐涎沫脈沉遲無力此為陰經直中真陰寒證不從陽經傳入謂之陰厥也輕則理中湯重則四逆湯溫之勿令誤也傷寒結胸痞滿辨詳見瑣言中傷寒結胸者今人不分曾下與未下便呼為結胸便與枳桔湯反成真結胸者有之殊不知乃因下早而成未經下者非結胸也乃表邪傳至胸中未入於腑者雖滿悶尚為在表正屬少陽部分只消小柴胡加枳桔以治其悶如未效則以本方對小陷胸湯一服豁然其妙如神祕之莫與俗人言之耳若因下早而成者方可用陷胸湯分淺深從緩而治之不宜太峻此乃清道至高之分若過下之則傷元氣也太陽證發熱惡寒頭疼無汗此寒傷榮血當服麻黃湯發散醫者不達而誤下之榮血重傷而成痞滿太陽證頭疼惡寒發熱自汗此風傷衛氣當服桂枝湯散邪實表醫者不達而誤下之衛氣重傷而成結胸蓋言榮衛陰陽也若言寒熱陰陽證者則誤之甚矣治法又録於後條傷寒伏陰脈大論用藥之誤夫病身不熱頭不疼初起怕寒四肢厥冷腹痛嘔吐泄瀉蜷臥沉默不渴脈來沉遲無力人皆共知為陰證必矣至於發熱面赤煩躁揭去衣被脈大人皆不識認作陽證誤投寒藥死者多矣殊不知陰證不分熱與不熱須憑脈下藥至為切當不問脈之浮沉大小但指下無力重按全無便是伏陰不可與涼藥服之必死急與五積散一服通解表裡之寒隨手而愈若內有沉寒必須薑附以溫之切忌發泄脈雖洪大按之無力重按全無者陰脈也若將伏陰之證而誤作熱證用涼藥治之則渴愈盛而燥愈急豈得生乎此取脈不取證也傷寒伏脈辨夫頭疼發熱惡寒或一手無脈兩手全無者庸俗以為陽證得陰脈便呼為死證不治殊不知此因寒邪不得發越便為陰伏故脈伏必有邪汗也當攻之又有傷寒病至六七日以來別無刑剋證候或昏沉冒昧不知人事六脈俱靜或至無脈此欲正汗也勿攻之此二者便如久旱將雨六合陰晦雨後庶物皆蘇換陽之吉兆正所謂欲雨則天鬱熱晴霽天乃反涼理可見也當攻者發汗冬用麻黃湯三時用羌活沖和湯勿攻者止汗五味子湯各有治法當謹記之傷寒言證不言病論詳見瑣言中言證不言病者深有理哉夫證之一字有明證見證對證之義存且如婦證奸而贓證盜刃證殺而病對證不得辭而無逃其情矣人之心肝脾肺腎藏而不見若夫耳目口鼻舌則露而共見者也五臟受病人焉知之蓋有諸中必形諸外肝病則目不能視心病舌不能言脾病口不知味肺病則鼻不聞香臭腎病則耳不聽聲以此言之其證最親切矣其太陽經受病證出頭疼身熱惡寒一或傷之本經之證見矣將此首經論之余經不言可知吾故曰傷寒言證不言病耳傷寒傳足不傳手經論詳見瑣言中傳足不傳手者此庸俗之謬論也豈有是哉人之充滿一身無非血氣所養晝夜循環運行不息豈有隻行足而不行手乎況風寒之中人先入榮衛吾故明其所由蓋傷寒者乃冬時感寒即病之名冬乃坎水用事其氣嚴凝凜冽水冰地凍在時則足太陽少陰正司其令觸冒之者則二經受病其次則足少陽厥陰繼冬而施春令而亦受傷者蓋風木之令起於大寒節正當十二月至春分後方行溫令故風寒亦能傷之足陽明太陰中土也與冬時無預而亦受傷者土無定位無成名無專氣寄旺於四時終始於萬物則四時寒熱溫涼之氣皆能傷之也況表邪傳裡必歸於胃而為燥屎用承氣湯下之胃氣和矣手之六經主於夏秋故不傷也足之六經蓋受傷之方分境界也若言傷足不傷手則可以為傳足不傳手則不可也設或不傳氣逆作喘何經而來如謂不然仲景設有桂枝麻黃乃肺經藥也豈虛言哉急下急溫論與瑣言互看急下急溫者蓋病勢危篤將有變也非若常病可緩如少陰口燥舌乾而渴因邪熱內消腎水將絶固當急下以救腎家將絶之水少陰病自利純清水心下硬痛口燥渴者急下之少陰病腹脹硬痛或繞臍痛不大便土勝水也急下之陽明汗多熱盛恐胃汁干急下以存津液陽明病腹滿痛為土實急下之熱病目不明熱不止者多死目睛不明腎水已竭不能照物則已危矣急宜下之五者俱大承氣湯少陰急溫有二證內寒已盛陽和之氣欲絶急溫之少陰膈上有寒飲乾嘔不可吐急溫之四逆湯此急救之功也傷寒標本論夫傷寒標本不明如瞽者夜行無路可見也原標者病之稍末本者病之根本先受病為本次受病為標標本相傳先以治其急者此良法也假如先起頭痛惡寒就為本已後發熱就為標此受病之標本也將此一件推之余皆仿此又脈之標本者假如浮沉為本虛實為標此脈之標本也治傷寒看證法則凡看傷寒先觀兩目或赤或黃赤為陽毒六脈洪大有力燥渴者輕則三黃石膏湯重則大承氣黃為疸證如小水不利或赤兼小腹脹滿不痛渴而大便實脈來沉實有力者為濕熱發黃輕則茵陳五苓散重則茵陳湯分利小水清白為愈黃自退矣劫法開在殺車槌方前次看口舌有無苔狀如見滑白色者邪未入里屬半表半裡證宜小柴胡和解舌上黃苔者胃腑有邪熱也宜下之調胃承氣湯大便燥實脈沉有力而大渴者方可下便不實脈不沉微渴者未可下尤宜小柴胡湯舌上黑苔生芒刺者是腎水克於心火十有九死急用大承氣下之無疑矣此邪熱已極也劫法開在殺車槌方前已後以手按其心胸至小腹有無痛處若按之當心下硬痛手不可近燥渴譫語大便實脈來沉實有力為結胸證急用大陷胸湯加枳桔下之量元氣虛實宜從緩治若按心胸雖滿悶不痛尚為在表未入乎腑乃邪氣填乎胸中只消小柴胡加枳桔以治其悶如未效本方對小陷胸一服如神若按之當心下脹滿而不痛者宜瀉心湯加枳桔是痞滿也以手按之小腹若痛而小水自利大便黑兼或身黃譫妄燥渴脈沉實者為蓄血桃仁承氣下盡黑物則愈若按之小腹脹滿不硬痛小水不利即溺澀也五苓散加減利之不可大利恐耗竭津液也若按小腹繞臍硬痛渴而小水短赤大便實者有燥屎也大承氣下之劫法備開殺車槌方前再後問其大小便通利若何有何痛處及服過何藥方知端的務使一一明白證脈相對庶得下藥無差凡看傷寒若見吐蛔者雖有大熱忌下涼藥犯之必死蓋胃中有寒則蛔上膈大凶之兆人皆未知急用炮乾薑理中湯一服加烏梅二個花椒十粒服後待蛔定卻以小柴胡退熱蓋蛔聞酸則靜見苦則安矣凡治傷寒若煩渴欲飲水者因內水消竭欲得外水自救大渴欲飲一升正可與一碗常令不足不可太過若恣飲過量使水停心下則為水結胸等證射於肺為喘為咳留於胃為噎為噦溢於皮膚為腫蓄於下焦為癃滲於腸間則為利下皆飲水多之過也又不可不與又不可強與經云若還不飲非其治強飲須教別病生正此謂也凡治傷寒若經十餘日以上尚有表證宜汗者與羌活沖和湯微汗之十餘日若有里證宜下者可與大柴胡湯下之蓋傷寒過經正氣多虛恐麻黃承氣太峻誤用麻黃令人亡陽誤用承氣令人不禁故有此戒若表證尚未除而里證又急不得不下者只得以大柴胡通表裡而緩治之又老弱又血氣兩虛之人有下證者亦用大柴胡下之不傷元氣如其年壯力盛者不在禁例從病制宜凡治傷寒尺脈弱而無力者切忌汗下寸脈弱而無力者切忌發吐俱宜小柴胡和之凡治傷寒若汗下後不可便用參耆大補宜小柴胡加減和之若大補使邪氣得補而熱愈盛復變生他證矣所謂治傷寒無補法也如曾經汗下後果是虛弱之甚脈見無力者方可用甘溫之劑補之此為良法其勞力感寒之證不在禁補之例看消息用之凡治傷暑與傷寒俱有熱若誤治之害矣傷寒則外惡寒而脈浮緊傷暑則不惡寒而脈虛此為不同治經云脈盛身寒得之傷寒脈虛身熱得之傷暑治宜小柴胡湯加石膏知母或人參白虎湯天久淫雨濕令大行蒼朮白虎湯若元氣素弱而傷重者用清暑益氣湯治之傷寒表裡見證治例活法凡治傷寒若見頭痛惡寒發熱腰項脊強脈浮者即是表證不拘日數多少便用解表藥無疑凡治傷寒若見耳聾脅痛寒熱嘔而口苦脈見弦數者即是半表半裡證不拘日數多少便用和解藥無疑凡治傷寒若頭疼惡寒悉除及見怕熱燥渴譫語揭去衣被揚手擲足發狂斑黃或潮熱自汗大便不通小水短赤或胸中連臍腹注悶疼痛脈沉有力或上氣喘促即是傳裡熱證不拘日數多少便用通利下藥無疑凡治傷寒若見初病起無頭疼無身熱就便怕寒四肢厥冷或腹痛吐瀉或口吐白沫或流冷涎或戰栗面如刀刮引衣蜷臥不渴脈來沉遲無力即是直中陰經真寒證急用熱藥溫之無疑要在隨所見證表裡而治之切莫亂投湯劑不可拘於日數若非深得仲景之意豈能至此耶三陰無傳經論凡傷寒邪熱自三陽傳至三陰臟腑入里為盡無所復傳故言無傳經也如再傳者足傳手經也發熱翕翕發熱為表熱是風寒客於皮膚怫鬱於外表熱而里不熱也無汗脈浮緊宜發表有汗脈浮緩宜解肌蒸蒸發熱者為裡熱是陽邪入陷於陰中裡熱而表不熱也脈沉實而渴者宜下之若表熱未罷邪氣傳裡里未作實則表裡俱熱脈必弦數宜和解少陰脈沉反發熱者是未離於表也麻黃附子細辛湯如發熱煩渴小便赤脈浮大者此為表裡俱見五苓散利之其陰陽俱虛熱不止者汗下後復大熱脈躁亂者下利熱不止者皆死也頭痛頭痛者寒邪入足太陽經上攻於頭此表證也頭痛脈浮緊無汗惡寒可發汗頭痛脈浮緩有汗惡寒宜解肌照前時令用藥陽明病不惡寒反惡熱五六日不大便胃實燥渴熱氣上攻於頭目脈實者調胃承氣下之少陽頭痛者小柴胡和之濕家鼻塞頭痛者瓜蒂散搐鼻黃水出即愈痰涎頭痛胸滿寒熱者瓜蒂散吐之厥陰乾嘔吐涎沫頭痛者吳茱萸湯主之三陽雖有頭疼不若太陽專主也三陰無頭痛惟厥陰有頭痛者是脈系絡於頂巔也若痛連於胸手足俱青為真頭痛必死矣項強項強者太陽感邪表證也無汗脈浮緊宜發汗葛根湯有汗脈浮緩宜解肌桂枝湯結胸項強大陷胸湯寒濕項強則成痓例載後條惡寒惡寒者乃寒邪客於榮衛則灑淅惡寒維一切屬表尚在腑陰陽所分若發熱惡寒兼之頭疼脊強脈浮緊者邪入太陽表證也宜汗之照時令用藥若無熱惡寒體倦脈沉遲無力者寒邪入足少陰里證也宜溫之四逆湯經云發熱惡寒發於陽無熱惡寒發於陰或有下證悉具而微惡寒者大柴胡下之其少陰病惡寒而蜷手足厥冷煩躁脈不至者死也惡風惡風者風邪傷衛腠理不密由是惡風悉屬於陽非比惡寒乃有陰陽之別者有汗惡風脈浮緩者當解肌隨時用藥惡風發熱兼喘者羌活沖和湯若發汗太過衛虛亡陽遂漏不止惡風脈浮者桂枝湯加朮附惡風小便難四肢拘急難以屈伸者同上若風濕惡風不欲去衣骨節痛汗出短氣小便不利身微腫者甘草附子湯汗後七八日不解表裡俱熱時時惡風大渴舌乾燥而煩者人參白虎湯主之背惡寒背惡寒者陽氣不足陽氣不足者陰氣盛陰氣盛者口中和附子湯陽氣內陷者口乾燥白虎湯二者俱背惡寒宜審治之寒熱往來寒熱者陰陽相勝邪正分爭也屬少陽半表半裡證蓋陽不足則陰邪出表而與之爭故陰勝而為寒陰不足則陽邪入里而與之爭故陽勝而為熱邪居表多則多寒邪居里多則多熱邪在半表半裡則寒熱相半乍往乍來而間作也小柴胡專主往來寒熱寒多者加桂熱多者加大黃是其大法也太陽證八九日如瘧狀一日二三度發不嘔清便脈浮緩者為自愈不浮緩為未愈柴胡桂薑湯病至十餘日熱結在裡大渴大便實往來寒熱大柴胡湯若往來寒熱胸脅滿而不痛者半表半裡證未入乎腑小柴胡加枳桔婦人中風七八日續得寒熱發作有時經水適斷為熱入血室亦用小柴胡治之潮熱潮熱者屬正陽明胃腑旺於未申一日一發日晡而作如潮水之有信也專主胃中實熱燥糞使然宜下之如熱不潮大便不實而脈浮表證尚在者未可與承氣湯候大便硬而燥渴與夫自汗譫語潮熱者急當下之無疑矣似瘧似瘧者一名瘧狀作止有時非若寒熱往來之無定也太陽證似瘧脈浮洪桂枝湯不嘔清便一日二三發屬厥陰脈浮緩囊不縮為自愈如脈不浮及面赤色有熱者以其不能得小汗身必癢用桂麻各半湯陽明似瘧煩熱汗出日晡發熱脈浮桂枝湯脈實者承氣湯熱入血室其血必結如瘧者小柴胡湯熱多寒少尺脈遲者建中湯候尺脈不遲小柴胡和之濕瘧脈和平身無寒但熱骨節煩疼時嘔白虎湯加桂渴者小柴胡加栝蔞根湯治各有異也無汗無汗者寒邪中經腠理固密津液內滲而無汗也風暑濕皆令有汗惟寒邪獨不汗出太陽證無汗者冬用麻黃湯春秋羌活沖和湯夏月神術湯項背強𠘧𠘧無汗者葛根湯陽明無汗而喘者麻黃湯脈弱無力難作汗者血虛也黃耆建中加朮附湯剛痓無汗自有本條若夫當汗之證與麻黃湯二三劑汗不出者此為難治矣自汗自汗者衛為邪干不能固密腠理疏而汗出為有表裡虛實之分若惡風寒自汗出者皆因太陽表證未解冬用桂枝湯余月加減沖和湯若汗後惡風寒皆為表虛汗不止黃耆建中湯與夫太陽證發汗遂漏不止為亡陽朮附湯若自汗出不惡風寒則為表證罷而里證實也承氣湯下之若小便自利汗出者津液少也急下之汗出而渴小便難者五苓散利之後或汗出如油貫珠不流喘而不休者衛氣絶矣皆不治也頭汗頭汗者邪搏諸陽之者則汗見於頭至頸而還也若遍身自汗出謂之熱越今熱不得越而陽氣上騰津液上湊故汗出於頭夫裡虛不可下內涸不可汗既頭有汗不可再汗也其或實熱在內小便利而大便黑為蓄血頭汗出者輕則犀角地黃湯重則桃仁承氣湯選用熱入血室有半表裡證頭汗出者小柴胡湯發黃頭汗出小便難渴引水漿者濕也輕則茵陳五苓散重則茵陳大黃湯水結胸心下怔忡滿而微熱頭汗與其誤下濕家額上汗出而喘小便難大便利者亦陽脫也手足汗手足汗者手足乃諸陽之本熱聚於胃腑則津液旁達於四肢也蘊熱則燥屎譫語手足汗出者大承氣湯下之挾寒則水穀不分手足汗出者理中湯溫之是有承氣理中之不同也盜汗盜汗者睡中則出而醒則止矣緣邪在半表半裡故知膽有熱也專主小柴胡為當矣煩熱煩熱者不經汗吐下則為煩熱與發熱有異也經曰病人煩熱汗出則解如未作膈實但當和解微熱而已若心下滿而煩則有吐下之殊也先煩而悸者為實先悸而煩者為虛虛謂心中欲嘔欲吐之貌陽明病心煩喜嘔壯熱往來心下悸小便不利小柴胡加茯苓湯發汗後解半日許脈浮數者可更發汗桂枝湯汗後晝煩夜靜不嘔渴無表證脈微沉乾薑附子湯大汗後六七日不大便煩而不解腹滿痛者有燥屎也大承氣湯下之止汗下後心下痞滿氣上衝頭身振搖而煩者茯苓白朮湯為要也煩躁煩為擾亂而煩躁為憤怒而躁謂先煩漸生躁也有陰陽虛寒之別心熱則煩陽實陰虛腎熱則躁陰實陽虛煩為熱輕躁為熱重所謂煩躁者先發煩而漸至躁所謂躁煩者先發躁而復發煩也太陽中風不得汗煩躁者此邪在表而煩躁也羌活沖和湯大便不通六七日繞臍痛煩躁發作有時而渴者此為燥屎乃邪氣在裡而煩躁也大承氣湯太陽不得汗醫以火劫取汗火熱入胃此劫令煩躁也小柴胡加牡蠣湯陽微發汗躁不眠與大下後復發汗晝日不得眠至夜安靜身無熱乾薑附子湯汗下後病不解煩躁者茯苓四逆湯俱謂陽虛煩躁也又有不煩便作躁悶者此為陰盛拒陽也欲於泥水井中臥飲水不得入口者是也四逆湯其結胸煩躁悉具及吐利四逆而煩躁下利厥逆而煩躁惡寒蜷臥脈不出而煩躁皆為不治也懊憹懊憹者鬱悶不舒之貌蓋表證誤下正氣內虛陽邪內陷於心胸之間重則為結胸也邪在心胸則宜吐熱結胃腑則宜下發汗吐下後虛煩不得眠懊憹者與夫短氣煩躁心下渴胸中懊憹者用梔子豉湯陽明病下後懊憹而煩胃中有燥屎承氣湯下之陽明無汗小便不利心懊憹者必發黃茵陳湯利之舌上白苔飢不食虛煩不眠頭汗出懊憹者梔子豉湯也身體痛身體痛者雖曰太陽表邪未解又有溫經發汗不同如發熱惡寒頭疼身體痛脈浮緊者表未解也冬月麻黃湯余月羌活沖和湯汗之或下利脈沉身痛如被杖者為陰寒證宜四逆湯溫之發汗後身痛脈沉遲桂枝芍藥人參湯下利煩滿身疼痛先溫其里四逆湯後攻其表桂枝湯一身盡痛發熱面黃七八日熱結在裡有瘀血也桃仁承氣湯下之如身重痛者屬陽明有風也葛根湯主治之拘急拘急者手足不能自如屈伸不便如蜷臥惡風之貌四肢諸陽之本因發汗亡陽陽虛而有此證自汗脈浮小便數心煩惡寒足攣拳急芍藥甘草湯太陽病發汗遂漏不止惡風小便難拘急者桂枝加附子湯吐利後汗出發熱惡寒拘急手足厥冷者四逆湯溫之也咳嗽咳者俗呼為嗽肺為邪氣逆不下有肺寒而咳有停飲而咳有半表半裡而咳各治不同太陽病身熱咳嗽乾嘔微喘而利小青龍湯身涼咳嗽乾嘔而利心下滿引脅痛十棗湯四肢重痛腹疼下利咳嗽或嘔真武湯少陰病咳嗽四逆腹痛下利或悸四逆散加五味子乾薑少陽病往來寒熱胸滿痛滿而咳小柴胡湯咳而嘔滿喘急大半夏湯也喘喘者有邪在表而喘有邪在裡而喘有水氣而喘在表者心腹濡而不堅外證無汗法當汗之在裡者心腹脹滿外證有汗法當下之水氣喘者心下怔忡青龍去麻黃加杏仁湯太陽陽明合病脈促有汗而喘者葛根黃芩湯治之經云喘而汗出宜利之汗不出而喘宜發之其或直視譫語汗出如油喘而不休死證也氣逆氣逆者氣自腹中時逆上衝也因太陽病下之表邪乘虛傳裡里不受邪則氣逆上行而邪在表也當汗之桂枝湯不上衝者勿與之厥陰客熱上衝此熱在裡而氣上也大柴胡湯下之病緩虛羸少氣氣逆上衝欲吐者竹葉石膏湯有動氣因發汗而氣上李根湯二者皆正氣虛而邪氣逆也短氣短氣者呼吸不相接續也大抵心腹脹滿而短氣者邪在裡而為實宜下之承氣湯心腹濡滿而短氣者邪在表而為虛也宜解之桂枝湯食少飲多水停心下短氣者小半夏湯風濕相搏汗出短氣小便不利惡風不欲去衣邪氣在表甘草附子湯太陽證誤下之短氣懊憹煩躁為結胸者大陷胸湯治也口乾口乾者邪熱聚胃消耗津液故少陰證口燥咽乾急下之口乾漱水不欲咽者若見表證鼻衄為邪熱在經緣陽明血氣俱多經中熱甚迫血妄行犀角地黃湯口乾身大熱背惡寒者人參白虎湯若無表證加之胸腹滿如狂者又為蓄血證桃仁承氣湯少陽口乾小柴胡和之也渴渴者里有熱也津液為熱所耗傷寒傳至厥陰為消渴者謂飲水多而小便少乃熱能消水也脈浮而渴屬太陽小青龍去半夏加天花粉有汗而渴屬陽明人參白虎湯便實者宜當下之脈沉而渴屬少陰大承氣湯至於厥陰又熱之極矣俱當下之無疑矣太陽無汗喜渴忌白虎宜小柴胡湯陽明汗多而渴戒五苓宜竹葉石膏湯先嘔後渴此為欲解當與水解先渴後嘔為水停心下赤茯苓湯小便不利而渴五苓散發黃頭汗出小水不利而渴者茵陳五苓散中暑脈虛身熱而渴者白虎湯為要也胸脅滿胸滿者膈間氣塞滿悶也非心下滿脅滿者脅肋下脹滿也非腹中滿蓋表邪傳裡必先胸以至心腹入胃是以胸滿多帶表證宜微汗惟脅滿多帶半表半裡小柴胡加枳桔和之胸中痰實者湧之如胸中結實燥渴大便祕者下之大陷胸湯可也結胸結胸者蓋太陽證自汗當服桂枝湯而誤用承氣下之而成結胸不按自痛連臍腹邊手不可近者大結胸大陷胸湯按之方痛心下硬小結胸小陷胸湯懊憹煩渴心下痛者熱結胸少與大陷胸湯懊憹滿悶身無熱者寒結胸三物白湯心下怔怔頭汗出無大熱為水結胸小半夏茯苓湯若未經下者非結胸也屬半表半裡證宜小柴胡枳桔以和之已經下者為結胸也結胸脈浮大者未可下猶帶表證若結胸證煩躁悉具者必死矣痞痞者因太陽證當服麻黃湯而誤用承氣下之而成痞滿此因虛邪留滯若欲下之必待表證罷而後可宜小柴胡加枳桔湯若惡寒汗出痞滿者附子瀉心湯服後小便不利者五苓散表未解心下妨悶者曰支結柴胡桂枝湯表未解而數下之遂協熱而利心下痞硬為表裡俱病桂枝人參湯為當也腹滿腹滿者邪入太陰脾土也當痛為裡實須下之承氣湯時減者為裡虛當溫之理中湯若表解內不消非大滿猶生寒熱亦未可下是邪全未入腑若大滿大實堅有燥屎雖日數少亦當下之謂邪已入腑也太陽證誤下因時腹滿而痛桂枝加芍藥湯痛甚者桂枝加大黃湯陽明病發熱腹滿微喘口乾不大便小柴胡湯噦而小便難加茯苓三陽合病腹滿身重難轉側譫語口中不仁小柴胡湯太陰腹滿吐食不下枳實理中湯少陰咽乾腹滿不大便急下之大承氣湯下利腹滿身痛先溫其里四逆湯後解其表桂枝湯汗後腹滿當溫厚朴半夏生薑人參湯吐後腹滿少與調胃承氣湯下後腹滿梔子豉湯腹滿大抵陽熱為邪則腹滿而咽乾陰寒為邪則腹滿而吐利食不下若曾經吐汗下後腹滿者治各不同也腹痛腹痛者緣邪氣與正氣相搏則為腹痛如陽邪傳裡而痛者其痛不常當以辛溫之劑和之小建中湯陰寒在內而腹痛者則痛無休時嘗欲作利也以熱劑溫之附子理中湯有燥屎宿食而痛者則煩而不大便腹滿而硬痛也大承氣下之少陰下利清穀脈欲絶腹痛者通脈四逆湯兼小便不利者真武湯實痛而關脈實者桂枝大黃湯經云諸痛為實則痛隨利減之法也小腹滿小腹滿者臍下滿也若胸滿心下滿腹中滿皆為邪氣而非物今小腹滿則為有物而非氣若小便利者則為蓄血之形小便不利此乃溺澀之證滲利之劑宜分兩途太陽病不解熱結膀胱其人如狂小腹急滿結痛者桃仁承氣湯下盡黑物則愈太陰身黃脈沉小腹滿小水不利者五苓散利之小便清白為愈病人素有痞氣連在臍旁痛引入陰筋者名臟結死也嘔吐嘔者聲物俱有而旋出吐者無聲有物而頓出有聲無物為乾嘔也較之輕重則嘔甚於吐矣蓋表邪傳裡裡氣上逆則為嘔也大抵邪在半表半裡則多嘔及裡熱而嘔者俱用小柴胡湯故經云嘔多雖有陽明證不可攻攻之為逆若太陽少陽合病而嘔者黃芩加半夏湯太陽陽明合病當自利若不利而嘔者葛根半夏湯三陽發熱而嘔俱用小柴胡湯先嘔後渴此為欲解當與水解先渴後嘔為水停心下赤茯苓湯若陽明證發熱汗出心煩痞硬下利嘔吐大柴胡湯若胃冷脈沉遲不食小便利者半夏理中湯加薑汁利而見厥逆者難治以其虛寒之甚也乾嘔乾嘔者空嘔而無物出也大抵熱在胃脘與穀氣並熱氣上熏心下痞結則有此證太陽汗出乾嘔桂枝湯主自汗也少陰下利乾嘔姜附湯主下利也厥陰吐涎沫乾嘔吳茱萸湯主涎沫也邪去嘔自止又有水氣二證太陽表不解心下有水氣身熱乾嘔者微喘或自利小青龍湯不發熱只惡寒脅痛咳而利乾嘔者亦水氣也十棗湯膈上有寒飲乾嘔者屬少陰四逆湯也噦噦即乾嘔之甚者非比干嘔則有聲濁惡而長皆有聲而無物也蓋因胃氣本虛因汗下太過或恣飲冷水水寒相搏虛逆而成也又有熱氣擁郁上下不得通而噦者輕則和解疏利重則溫散噦而腹滿大便不利先用半夏生薑湯次用小承氣小便不利者豬苓湯噦不止者乾薑橘皮湯溫病有熱暴飲冷水作噦茅根乾葛湯噦家若不尿而噦者則病篤矣咳逆咳逆者俗謂吃忒是也才發聲於咽喉則遽止軋然連續數聲然而短促不長古謂之噦非也噦與乾嘔無異但其聲濁惡而長比之吃忒大有徑庭矣若將吃忒紊為噦與咳逆誤人多矣若便實脈本有力者少與承氣湯微利之因當下失下熱氣入胸乾肺故耳若便軟脈來無力瀉心湯因胃氣而沖逆故耳脈微者難也下利下利者傷寒下利多屬於熱熱邪傳裡裡虛協熱亦為下利三陽下利身熱太陰下利手足溫少陰厥陰下利身涼無熱此其大概耳夫自利清穀不渴小便色白微寒厥冷惡寒脈沉遲無力此皆寒證也若渴欲飲水溺色如常泄下黃赤發熱後重此皆熱證也寒者理中四逆湯熱者小柴胡豬苓湯寒因直中陰經熱因風邪入胃水來傷土故令暴下或溫或攻或固下焦或利小便隨證施治但不宜發汗耳若汗之便邪氣內攻復泄其津液胃氣轉虛必成脹滿也太陽陽明合病下利葛根湯太陽少陰合病下利乾嘔脈實者承氣湯太陽表未解數下之遂協熱利心下痞者桂枝人參湯太陰自利不渴與夫厥逆無脈而利者四逆湯少陰咽痛下利胸滿心煩者豬膚甘桔湯渴而自利純清水心下硬痛口乾燥者此不可溫急用大承氣湯下之無疑矣傷寒續得下利清穀身疼痛者急當救里四逆湯清便自調急當救表桂枝湯下利譫語脈沉有力為有燥屎急當下之大承氣湯腸鳴腹痛下利脈沉遲無力急當溫之小建中湯寒毒下利而戴陽者下虛也附子理中湯若夫下利譫語目直視下利厥冷躁不眠下利發熱厥而自汗下利厥冷無脈灸之不溫脈不至者下利一日十數行脈反實者皆為不治也熱入血室熱入血室者衝脈為血之海即血室也男女均有此血氣亦均有此衝脈得熱血必妄行在男子則為下血譫語因邪熱傳入正陽明腑在婦人則為寒熱似瘧邪乃隨經而入皆為熱入血室太陽不解熱結膀胱其人如狂而血自下者愈不愈用桂枝湯陽明下血譫語胸滿如結胸夜則如見鬼此為熱入血室小柴胡湯下焦蓄血其人如狂小腹急結小便自利大便黑與夫下利無表裡證脈數不解消穀易飢多日不大便此為瘀血桃仁承氣湯少陰病下利膿血或腹滿下如魚腦者桃花湯主之四逆四逆者手足厥冷不溫謂之四逆邪在表則手足熱邪在半表裡則手足溫至於邪傳少陰則手足冷逆也然自熱而致溫由溫而致厥乃傳經之邪輕則四逆散重則承氣湯下之若初起得病便厥者輕則理中湯重則四逆湯溫之此為陰經受邪乃陽不足而陰有餘也若或惡寒厥逆蜷臥煩躁吐利而脈不至者皆惡候也不大便不大便者因發汗利小便過多耗損津液以致腸胃乾燥蓋邪熱傳入正陽明里證最多惟見發渴譫語脈實狂妄潮熱自汗小水赤或心腹脹滿硬痛急用三承氣湯選而下之大便通而熱愈矣倘脈浮表證尚在或帶嘔者知邪未全入腑尤在半表裡間尚用小柴胡和之候大便硬實不得不下者只得以大柴胡下之若陽明汗多或已經發汗利小便而大便不通者此津液枯竭宜蜜導通之譫語譫語者經云邪氣盛則實精氣奪則虛故實則譫語虛則鄭聲胃中實熱上乘於心心為熱冒則神識昏迷妄有所見而言也輕則睡中呢喃重則不睡亦語有譫語者有獨語者有語言不休者有言亂者此數者見其熱之輕重也大抵熱入於胃水涸糞燥必發譫語為實也有被火劫取汗而譫語者有亡陽譫語者有下利清穀不渴譫語者此為虛也或脈來沉實洪數有力大便不通小水赤燥渴譫語狂妄腹中脹滿硬痛或潮熱自汗或下利純清水心腹硬痛者皆里證邪熱燥屎也俱大承氣下之下後利不止與夫喘滿氣逆而上奔自利氣脫而下奪皆為逆也其三陽合病脈實身重難轉口中不仁面垢遺尿白虎湯或大便結大熱乾嘔錯語呻吟不眠犀角解毒湯初得病無熱狂言煩躁不安精采不與人相當與五苓散三錢以新汲水探吐一法用桂苓湯狂言漱水不欲咽大便黑小水不利身黃脹滿此因當下失下是瘀血譫語桃仁承氣下盡黑物則愈婦人經水適來適斷續得寒熱此為熱入血室譫語小柴胡湯陽明證喜忘如狂者亦瘀血也照前桃仁承氣下盡黑物則愈矣鄭聲鄭聲者如鄭衛之音謂不正也蓋汗下後若病久本音失而正氣虛則語散不知高下乃精氣奪之候其脈微細大小便自利小柴胡湯也小便不通小便不利者邪氣聚於下焦結而不散甚則小腹硬滿而痛此小便不通也大抵有所不利者行之取其滲利也若引飲過多下焦多熱或中濕發黃水飲停滯皆以利小便為先惟汗後亡津液胃中干與陽明汗多者則以利小便為戒設或小水不利而見頭汗出者乃陽脫關格之病篤矣引飲過多小便不利下焦蓄熱浮者五苓散沉脈豬苓湯太陽病身黃脈沉小腹硬小水不利者知無血也與陽明無汗小便不利心中懊憹者必發黃茵陳五苓散黃自退而小便清矣小便難小便難者陰虛也陽必湊之由膀胱受熱故小便赤澀而不能流利也又有雖不大便五六日而小便少者但初硬後溏不定或硬攻之必溏候小便多屎定硬方可攻之乃胃中水穀少便雖通而不多如豬苓湯可也小便自利小便自利者為津液偏滲大便必硬宜藥下之太陰當發身黃其小便自利者則濕熱內泄不能發黃惟血證小腹急而如狂小水自利者腎與膀胱虛而不能約制水液桃仁承氣下之若自汗小便數者雖有表證不可用桂枝謂其走津液也若誤服之得厥者以甘草乾姜為治也舌苔舌上白苔者以丹田有熱胸中有寒謂其寒邪初傳入里也小柴胡湯舌乃心之苗色應南方火邪在表則未生苔邪入里津液結搏則舌上生苔而滑熱氣漸深其舌苔燥而澀熱聚於胃其苔為之黃矣宜承氣湯下之若舌上黑色苔者則熱已深病勢已篤經曰熱病口中乾舌黑者乃腎水刑于心火也脈浮陰陽俱緊口中氣出舌中乾燥蜷臥足冷鼻中涕出舌上滑苔勿妄治也到七八日以來微發熱手足溫者此為欲解也及或大發熱者難治設有惡寒者小柴胡加乾薑服之臟結臟結者臟氣閉結而不復流布也外證如結胸狀但欲食腹滿如故下利舌上白苔者為異其脈寸浮關沉緊痛引陰筋臍腹脹痛者難治也咽痛咽喉不利而痛或成瘡不納穀食皆邪熱毒氣上衝而痛甘桔苦酒湯咽喉不利吐膿血手足厥冷不止者難治升麻六物湯主之頭眩頭眩者少陽半表裡之間表邪傳裡表中陽虛故頭眩又有汗下後而眩冒者亦陽虛所致少陰下利止時頭眩時時自冒此虛極而脫也太陽病若下之因復發汗以此表裡俱虛其人必冒冒家汗自出而愈陽明病頭眩不惡寒能食而飲茯苓白朮甘草生薑湯少陽證目眩小柴胡湯太陽病發汗後汗出不解心下悸頭眩身瞤筋惕振劈地者真武湯吐汗下後虛而脈沉數心下痞脅痛氣衝咽喉不得息身振搖筋肉惕久則成痿茯苓白朮桂枝甘草湯是也鼻衄鼻衄者經絡熱盛迫血妄行於鼻者為衄也是雖熱盛邪猶在經然亦不可發汗經曰以桂枝麻黃治衄非治衄也乃欲散經中邪氣耳其衄血固欲解若衄不止而頭面汗出其身無汗及發熱汗不至足者難治太陽證衄血及服桂枝湯後致衄者為欲解犀角地黃湯無汗而衄脈浮緊再與麻黃湯有汗而衄脈浮緩再與桂枝湯節菴曰此二者蓋為脈浮而設也若衄而成流者不須服藥少刻自解若點滴不成流者必用服藥無疑經曰奪血者無汗奪汗者無血俗人以血為紅汗厥有旨哉衄家不可大汗汗之必額上陷脈緊目直視不能盻不眠芍藥地黃湯陽明漱水不欲咽犀角地黃湯衄而煩渴欲水水入即吐先服五苓散次服竹葉石膏湯若少陰但厥無汗強發之必動其血或從口鼻耳目中出名下厥上竭為難治當歸四逆湯是也吐血吐血者諸陽受熱其邪在表當汗不汗致使熱毒入臟積蓄於內遂成吐血凡見眼閉目紅神昏語短眩冒迷忘煩躁漱水驚狂譫語鼻衄唾紅背冷足寒四肢厥逆胸腹急滿大便黑小便數皆瘀血證也雖有多般不必悉具但見一二便作血證主張初得此證急宜治之服桂枝湯吐者其後必吐膿血犀角地黃湯血熱者黃連阿膠湯也心悸心悸者築築然動怔怔忡忡不能自安是也有氣虛有停飲其氣虛者陽氣內弱心中空虛而為悸又有汗下後正氣虛而亦悸與氣虛而悸又甚皆須定治其氣也其停飲者由飲水過多水停心下心火惡水不能自安雖有餘邪必先治悸與水也如小便利而悸者茯苓桂枝白朮湯小便少者必裡急豬苓湯為要也發黃發黃者濕熱交併民多病疸者單陽而無陰也太陰脾土濕熱所蒸色見於外必發黃濕氣勝則如熏黃而晦熱氣勝則如橘黃而明傷寒發黃熱勢已極且與蓄血大抵相類但小便不利大便實者為發黃輕則五苓散重則茵陳湯小便不利大便黑者為蓄血輕則犀角地黃湯重則桃仁承氣湯濕家為病一身盡痛發熱身如熏黃小便不利者五苓散小便自利無黃者朮附湯身煩疼者麻黃湯加蒼朮若夫形如煙煤搖頭直視環口黎黑舉體發黃者此皆真臟絶也發斑發斑者大熱則傷血熱不散裡實表虛熱乘虛出於皮膚而為斑也輕則如疹子甚則如錦紋或本屬陽誤投熱藥或當汗不汗當下不下或汗下未解皆能致此有兩證一曰溫毒即冬時觸寒至春而發汗下不解邪氣不散故發斑也一曰熱病即冬時溫暖感乖厲氣遇春暄熱而發也慎不可發汗若汗之重令開泄更增斑爛也然而斑之方萌與蚊跡相類發斑多見於胸腹蚊跡只見於手足陽脈洪大病人昏憒先紅後赤者斑也脈不洪大病人自靜先紅後黃者蚊跡也其或大便自利或短氣燥屎不通黑斑如果實黶者盧醫不能施其巧矣凡汗下不解足冷耳聾煩悶咳嘔便是發斑之候溫毒發斑咳而心悶下利嘔吐下部並口有瘡者黃連橘皮湯陽毒斑如錦紋面赤咽痛脈洪大不知人者三黃石膏湯便實燥渴者調胃承氣下之發斑通用升麻犀角湯熱多者玄參升麻黃連一物湯治也發狂發狂者重陽而狂熱毒所深併入於心遂使神不寧志不定始得少臥不飢譫語妄笑甚則登高而歌棄衣而走逾垣上屋罵詈不避親疏皆獨陽亢盛不大下之何能止也若因當汗不汗瘀熱在裡下焦蓄血如狂者小便必自利大便黑雖時如狂未至於狂耳須桃仁承氣下之重陽即陽毒脈洪大面赤咽痛潮熱發斑如錦紋或下利黃赤陽毒升麻湯不效者三黃石膏湯大便實者調胃承氣湯下之太陽病不解熱結膀胱其人如狂而血下者愈若外不解與桂枝湯外已解但小腹急結與夫脈沉身黃唇燥漱水小水自利者亦是血證如狂輕則犀角地黃湯重則桃仁承氣下之若狂言直視便溺自遺與汗後大熱脈躁狂言不能食此為慮也肉瞤筋惕肉瞤筋惕者非常常有之陽氣者精則養神柔則養筋發汗過多津液涸少陽氣偏枯筋肉失所養故惕惕然動瞤瞤然跳也非溫經助陽之藥何有愈乎故設真武湯以救之因汗吐下後表裡俱虛有此證者逆之甚也怫鬱怫鬱者乃陽氣蒸越形於頭面體膚之間聚而不散也其證有分別如大便硬而氣短燥渴者實也大柴胡汗下後有此證飲水而噦者胃虛也桂枝人參湯加茯苓初得病發汗不徹並於陽明續自微汗出面色赤者陽氣怫鬱也解肌湯或汗不徹其脈浮緊者與麻黃湯或小便不利時有微熱大便乍難怫鬱不得臥此有燥屎作實也承氣湯下之是也瘥後昏沉瘥後昏沉或半月以來或十餘日終不惺惺錯語少神或寒熱似瘧或潮熱此因發汗不盡餘熱在心包絡間故也知母麻黃湯微汗之若胃口有熱虛煩而嘔者竹葉石膏湯加生薑治也勞復食復病新瘥後因勞動再發為勞復緣其血氣未平餘熱未盡一或勞之熱氣遂還於經絡而復發也小柴胡湯加減治之表者汗之里者下之病新瘥後而多食復發者為食復緣土虛不能勝穀氣如水浸牆壁水退土尚未堅合其損谷則愈輕則消化重則吐下如關脈實大熱燥渴譫語腹痛大便實急下之不可緩也動氣動氣者臟氣不調築築然跳動隨所主而形見於臍之左右上下也其人先有痞氣而後感於傷寒醫人不知患有痞積在內妄施汗下吐法致動其氣故曰動氣凡汗吐下豈可輕舉之乎可見傷寒所以看外證為當者蓋不在脈之可見必待問證之可得又有真氣內虛水結不散氣與之搏即發奔豚以其走動衝突如奔豚皆不宜汗下通用理中去白朮加桂緣白朮燥腎閉氣故去之桂能泄奔豚故加之然而獨不言當臍有動氣者脾為中州以行津液妄施汗下必先動脾氣是以不言而喻也左右上下尚不宜汗下何況中州之氣豈敢輕動之乎傷寒霍亂霍亂者上吐下利揮霍擾亂也乃邪氣飲食所傷邪在中焦既吐且利邪在上焦吐而不利邪在下焦利而不吐俱用正氣散加半夏生薑汁治之如吐利不止者理中湯如其上下不通腹痛甚而頭疼發熱者桂枝大黃湯此為乾霍亂死者多因其所傷之邪不得出擁塞正氣陰陽隔絶先用吐法也不仁不仁者謂不柔和痛癢不知針火不知是也諸虛乘寒為鬱冒不仁血氣虛弱不能周流於一身於是正氣為邪氣所伏故肢體頑麻不仁厥如死尸用桂麻各半湯不愈者補中益氣湯入薑汁設或身體如油汗不休喘而直視水漿不入者此為命絶也陰陽易陰陽易者如換易之易以其邪毒之氣而交相易換也男子病新瘥婦人與之交動淫欲而反得病者婦人病新瘥男子與之交動淫欲而反得病者其候身重氣乏小便絞痛頭不能舉足不能移四肢拘急百節解散眼中生花熱氣衝胸在男子則陰腫入小腹攻刺在婦人則裡急連腰胯重引腹內痛若手足攣拳其脈離經者皆不治也其不因易而自病復發為之女勞復通用逍遙散之加減治也不眠不得眠者陽盛陰虛則晝夜不得眠蓋夜以陰為主陰氣盛則目閉而臥安若為陽所勝故終夜煩擾而不得寧所謂陰虛則與夜爭也汗出鼻乾不得臥者邪在表乾葛解肌湯若胃有燥屎大熱錯語及大汗胃中干不得眠者邪在裡也用大承氣下之胃不和則臥不安故宜徹熱和胃也若汗下後虛煩不得眠梔子豉湯咳而嘔心煩悶不眠者水氣也豬苓湯下後復熱晝日煩躁夜則安靜無大熱者乾薑附子湯吐下後心中懊憹不眠者梔子豉湯陽勝陰狂言不眠亂夢心煩乏氣者酸棗湯陰勝陽則驚悸昏沉大熱乾嘔錯語呻吟不眠者犀角地黃湯治之汗出脈虛不眠者小建中湯主也多眠夫衛氣者晝則行陽夜則行陰行陽則寤行陰則寐陽氣虛陰氣盛則目瞑故多眠乃邪傳於陰而不在陽也昏昏閉目者陰自闔也默默不言者陰至靜也太陽病十餘日脈浮細嗜臥者外已解神將復也設胸滿脅痛鼻乾不得汗嗜眠者風熱內攻不幹乎表故熱氣伏於裡則喜睡不得汗者小柴胡湯脈浮者羌活沖和湯冬用麻黃湯少陰病但欲寐尺寸俱沉細者四逆湯少陰病欲吐不吐欲嘔不嘔心煩多寐五六日自利而渴小便白者四逆湯若復煩熱不得臥者不治三陽合病欲眠目合則汗譫語者則有熱也小柴胡湯其胃熱者亦臥也犀角解毒湯風溫狐惑亦有此證開在後條狐惑狐惑者猶豫不決進退之義也有濕䘌皆蟲證腹中有熱食入無多腸胃空虛三蟲求食而食人五臟其候四肢沉重惡聞食氣默默欲眠目閉舌白齒晦面目間赤白黑色變易無常蟲食下部為狐下唇有瘡其咽乾蟲食臟為惑其聲啞二者通用黃連犀角地黃湯加桃仁越人望而畏之厥陰消渴氣上衝心飢不欲食食即吐蛔既曰胃寒復有消渴蓋熱在上焦而中下焦則但寒而無熱又有大便實證並用理中湯加大黃蜜少許微利之百合百合者百脈一宗舉皆受病所謂無復經絡傳次也大病虛勞之後臟腑不平變成此證似寒無寒似熱無熱欲食不食欲坐不坐欲行不行口苦便赤藥入即吐利其脈微數每尿則頭痛者六十日愈不頭痛但淅然惡寒者四十日愈若尿快然頭眩者二十日愈俱用百合知母地黃湯也蛔厥蛔厥者厥陰病人素有寒妄發其汗或汗後身熱又復汗之以致胃中虛冷飢不能食食即吐蛔乍靜乍煩蛔或上或止蛔聞食即出也治法在前傷風見寒傷寒見風熱盛而煩手足自溫脈浮而緊此傷風見寒也不煩少熱四肢微厥脈浮而緩此傷寒見風也二者為榮衛俱病法雖用大青龍湯此湯峻險不可輕用須風寒俱盛又加煩躁方可與之不若羌活沖和湯為神藥也痓痓者先太陽中風重感於寒無汗為剛痓中風重感於濕有汗為柔痓俱身熱足寒頸項強急惡寒頭面赤目脈赤獨頭搖卒口噤背反張手足攣搐皆痓病也傷風頭痛常自汗出而嘔若汗之必發痓大發濕家汗亦作痓新瘥血虛汗出當風亦成痓若脈沉而遲或緊或散於指外者皆死證也有汗加減沖和湯無汗者羌活沖和湯口噤咬牙者大承氣湯下之瘛瘲瘛瘲者瘈則急而縮瘲則緩而伸熱則生風風主乎動故筋脈相引而伸縮傷寒至此證可謂死矣能以去風滌熱之劑間有生者是其幸也治法痓病同風溫風溫尺寸俱浮素傷於風因時傷熱風與熱搏即為風溫其外證四肢不收身熱自汗頭疼喘息發渴昏睡或體重不仁慎不可汗汗之則譫語躁擾目亂無睛光病在少陰厥陰二經葳蕤湯小柴胡選用未醒者柴胡桂枝湯發汗復身灼熱知母葛根湯渴者栝蔞根湯脈浮身重防己湯誤汗風溫防己黃耆湯也濕溫濕溫寸濡而弱尺小而急素傷於濕因時中暑濕與熱搏即為濕溫其狀胸腹滿目痛壯熱妄言自汗兩脛疼倦怠惡寒若發其汗使人不能言耳聾不知痛處其身青面色變是醫殺人耳濕溫在太陰蒼朮白虎湯加桂濕氣勝一身盡痛發熱身黃小便不利大便儘快五苓散加茵陳臟虛自利附子理中湯也風濕中濕風濕脈沉先傷濕而後傷風也其證肢體腫痛不能轉側額上微汗惡寒不欲去衣大便難小便利熱至日晡而劇治法但微解肌若正發汗則風去濕在非徒無益而又害之羌活沖和湯咽渴小便不利者五苓散外不熱內不渴小便利朮附湯緩弱昏迷腹滿身重自汗失音下利不禁白虎湯加白朮去甘草身腫痛微喘惡風杏仁湯熱而煩渴者小柴胡加天花粉若誤下之小便必不利五苓散中濕小便不利一身盡痛身黃大便快茵陳五苓散大小便俱利無黃者朮附湯身痛鼻塞小建中湯加黃芩也溫毒中暍溫毒者冬月感寒毒異氣至春始發也表證未罷毒氣未散故有發斑之候心下煩悶嘔吐咳嗽後必下利寸脈洪數尺脈實大為病則重以陽氣盛故耳通用玄參升麻湯也中暑脈虛而伏身熱面垢自汗煩躁大渴毛聳背惡寒昏倦身不痛與傷寒諸證大不同矣內外俱熱口燥煩渴四肢微冷而不痛用白虎湯痰逆惡寒橘皮湯熱悶不惡寒竹葉石膏湯頭痛噁心煩躁五苓散中暑用小柴胡加香薷最良脈遲灑然毛聳口齒燥人參白虎湯霍亂煩躁大渴腹痛厥冷轉筋黃連香薷湯治為要也須頓冷服之如熱服反為吐瀉矣戰栗戰栗者陰陽相爭故身為之戰搖也邪與正氣外爭為戰內與正氣爭為栗正勝邪得汗而解邪勝正遂成寒證矣在表者羌活沖和湯在內者人參理中湯此陰經自中之真寒者用之傳經戰栗者大柴胡湯治之是也
