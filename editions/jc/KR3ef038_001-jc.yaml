body:
  text: 傷寒一提金卷之四一提金啟蒙余謂初學醫者先熟藥性次明經絡再識病名然後講解脈理以證其所生病證脈相同藥無不應病家云發熱惡寒頭項痛腰脊強則知病在太陽經也身熱目痛鼻乾不得眠則知病在陽明經也胸脅痛耳聾口苦舌乾往來寒熱而嘔則知病在少陽經也腹滿咽乾手足自溫或自利不渴或腹滿時痛則知病在太陰經也引衣蜷臥惡寒或舌乾口燥則知病在少陰經也煩滿囊縮則知病在厥陰經也潮熱自汗譫語發渴不惡寒反惡熱揭去衣被揚手擲足或發斑黃狂亂五六日不大便則知病在正陽明胃腑病也設若脈證不明誤用麻黃令人汗多亡陽誤用承氣令人大便不禁誤用薑附令人失血發狂正為寒涼耗其胃氣辛熱損其汗液燥熱助其邪熱庸醫殺人莫此為甚傷寒之邪實無定體或入陽經氣分則太陽為首其脈必浮輕手便得或入陰經血分則少陰為先其脈必沉重手方得浮而有力無力是知表之虛實沉而有力無力是知里之寒熱中而有力無力是知表裡緩急脈有浮沉虛實證乃傳變不常治之之法先分表裡寒熱陰陽虛實標本先病為本次病為標先以治其急者此為上工問證以知其外察脈以知其內全在活法二字不可拘於日數但見太陽證在直攻太陽但見少陰證在直攻少陰但見真寒直救真寒但見三證具便作主張不必悉具當如何處治此為活法若同而異者明之似是而非者辯之在表者汗之散之在裡者利之下之在上者因而越之下陷者升而舉之從乎中者和解之直中陰經者溫補之若解表不開不可攻裡日數雖多但有表證而脈浮者尚宜發散此事不明攻之為逆經云一逆尚引日再逆促命期若表證解而里證具者不可攻表日數雖少但有裡熱證而脈沉實者急當下之此事不明禍如反掌經云邪熱未除復加燥熱抱薪救火矣如直中陰經真寒證然無熱惡寒不渴急宜溫補切禁寒涼此事不明殺人甚速經云非徒無益而反害之陰證似陽者溫之陽證似陰者下之陽毒者分輕重下之陰毒者分緩急溫之陽狂者下之陰厥者溫之濕熱發黃者利之下之血證發黃者清之下之發斑者清之下之譫語者下之溫之痞滿者消之瀉之結胸者解之下之太陽證似少陰者溫之少陰證似太陽者汗之衄血者解之止之發喘者汗之下之咳嗽者利之解之正傷寒者大汗之大下之感冒暴寒者微汗之微下之勞力感寒者溫散之溫極病者微解之大下之此經常之大法也有病一經已用熱藥而又用寒藥如少陰證用白虎湯四逆散寒藥者少陰證用四逆湯真武湯熱藥者庸俗狐疑詎能措手哉嗚呼能察傷寒之證名而得傷寒之方脈如此親切乃為良醫是知寒藥治少陰乃傳經熱證也是知熱藥治少陰乃直中陰經之寒證也辯名定經明脈識證驗證用藥真知在表而汗真知在裡而下真知直中陰經而溫如此而汗如彼而下又如彼而溫辛熱之劑投之不差寒涼之藥用之必當病奚逃乎須分輕重緩急老少虛實久病新發婦人胎產室女經水大凡有胎產而傷寒者不與男子傷寒同治法無胎產者治相同婦女經水適斷適來寒熱似瘧者即是熱入血室但當和解表裡久病者過經不解壞證也新發者始病也老者血氣衰少者血氣壯緩者病之輕急者病之重寒藥熱服熱藥涼服其中和之劑溫而服之戰汗分為四證要知邪正盛衰類傷寒四證照常法則治之雖云發蒙實登仲景之梯階也余雖專傷寒科必出乎庸俗夸誕之醫萬萬且餘一生所蓄肺腑家秘語句方法俱已備載發揮窺我門牆者雖有多人然片言不繁之要不得再四經自講明故述啟蒙捷法脈要貫珠數一一開注明白所示自宜謹慎深密勿授受於非人毋輕泄於澆薄莫負我之用心耳一提金六經證治捷法太陽經見證法頭項痛腰脊強發熱惡寒噁心是足太陽膀胱經受證假如先起惡寒者本病已後發熱者標病若有一毫頭痛惡寒身熱不拘日數多少便宜發散自然熱退身涼有何變證辯證法表虛自汗者為風傷衛氣宜實表表實無汗者為寒傷榮血宜發表診脈法脈浮緊有力為傷寒脈浮緩無力為傷風用藥法冬月正傷寒用升陽發表湯即加減麻黃湯冬月傷風用疏邪實表湯即加減桂枝湯春秋無汗用羌活沖和湯發表有汗用加減沖和湯實表夏月無汗用神術湯有汗用前加減沖和湯陽明經見證法目痛鼻乾不眠微惡寒是足陽明胃經受證假如先起目痛惡寒身熱者陽明經本病已後潮熱自汗譫語發渴大便實者正陽明胃腑標病本宜解肌標宜急下只看消息用之辯證法目痛鼻乾微惡寒身熱病在經潮熱自汗譫語發渴便實不惡寒病在腑診脈法脈見微洪為經病脈見沉數為腑病用藥法微惡寒自然目眶痛鼻乾不眠者用柴葛解肌湯即加減葛根解肌湯渴而有汗不解者如神白虎湯即加減白虎湯潮熱自汗譫語發渴揭去衣被揚手擲足斑黃狂亂不惡寒反惡熱大便實者輕則大柴胡湯重則三承氣選用俱在秘方六乙順氣湯內加減治之少陽經見證法耳聾脅痛寒熱嘔而口苦是足少陽膽經受證假如先起惡寒身熱耳聾脅痛者本病已後嘔而舌乾口苦者標病緣膽無出入病在半表半裡之間只宜小柴胡一湯加減和解表裡治之再無別湯本方自有加減法此經有三禁不可汗下吐也若治之得法有何壞證常須識此宜當審焉辯證法耳聾脅痛寒熱嘔而口苦舌乾便屬半表半裡證不從標本從乎中治診脈法脈見弦數本經證用藥法耳聾脅痛寒熱嘔而口苦舌乾者用柴胡雙解飲即加減小柴胡湯太陰經見證法腹滿自利津不到咽手足溫者是足太陰脾經受證假如先起腹滿咽乾者本病已後身目黃標病內有寒熱所分不可混治臨病之際用在得宜辯證法腹滿咽乾發黃者屬腑熱自利不渴或嘔吐者屬臟寒診脈法脈見沉而有力宜當下脈見沉而無力宜當溫用藥法腹滿咽乾手足溫腹痛者桂枝大黃湯即加減桂枝湯身目黃者茵陳大黃湯即加減茵陳湯自利不渴或嘔吐者加味理中飲即加減理中湯重則回陽救急湯即加減四逆湯少陰經見證法舌乾口燥是足少陰腎經受證假如先起舌乾口燥者本病已後譫語大便實者標病至陰經則難拘定法或可溫而或可下陰分直中者寒證傳經者熱證是其發前人之所未發也辯證法大要口燥舌乾渴而譫語大便實者知其熱須詳嘔吐瀉利不渴或惡寒腹痛者別其寒診脈法脈見沉實有力宜當下脈見沉遲無力宜當溫用藥法口燥咽乾渴而譫語大便實或繞臍硬痛或下利純清水心下硬痛者俱是邪熱燥屎使然急用六乙順氣湯分輕重下之即承氣湯有加減法無熱惡寒厥冷蜷臥不渴或腹痛嘔吐瀉利沉重或陰毒手指甲唇青嘔逆絞痛身如被杖面如刀刮戰慄者俱是寒邪中里使然急用回陽救急湯溫之即四逆湯有加減法厥陰經見證法煩滿囊卷者是足厥陰肝經受證假如先起消渴煩滿者本病已後舌卷囊縮者標病亦有寒熱兩端不可概作熱治辯證法煩滿囊卷消渴者屬熱口吐涎沫不渴厥冷者屬寒似瘧不嘔清便必自愈診脈法脈沉實者宜當下脈沉遲者宜當溫脈浮緩者病自愈用藥法消渴煩滿舌卷囊縮大便實手足乍冷乍溫者急用六乙順氣湯下之即承氣湯有加減法口吐涎沫或四肢厥冷不溫過乎肘膝不渴小腹絞痛嘔逆者急用茱萸四逆湯溫之即回陽救急湯自有加減法一提金脈要或人問曰治傷寒先明脈證脈證不明取方無法脈證既明工中之甲夫脈之一字實先天后天之造化何為先天何為後天何為脈也答曰人之陰陽即為先天人之氣血即為後天脈者非血非氣乃血氣之先即營行之道路又問曰既知先後天之脈理須明持脈之要曰舉曰按曰尋三字若此不明則陰陽表裡虛實何以別之持脈者輕手循之曰舉重手取之曰按不輕不重委曲求之曰尋初持輕手候之脈見皮膚之間便得曰浮是太陽經脈也有力者主寒邪在表無汗為寒傷榮血表實者宜汗之無力者主風邪在表有汗為風傷衛氣表虛者宜實之脈附於肌肉之下筋骨之間而得曰沉是三陰經脈也其三陰俱是沉脈妙在指下有力無力中分有力者主熱邪在裡為裡實宜下之無力者主寒邪中里為裡虛宜溫之不輕不重中而取之乃得其脈應於血肉之間陰陽相半若見微洪是陽明經脈也主邪在表多里少宜解肌若見弦數是少陽經脈也主邪在半表半裡宜和解前之所云陰陽表裡虛實寒熱俱在浮中沉三脈有力無力中分有力者為陽為實為熱無力者為陰為虛為寒若浮沉中之不見則委曲而求之若隱若見則陰陽伏匿之脈也三部皆然或曰君之瞭然非庸俗所能識也其三脈中有進退焉有伏脈焉有可解不可解焉有歇至焉有燥亂焉請備言其所由答曰脈大者為病進大則邪氣勝而正氣無權脈緩者為邪退緩則胃氣和而邪氣無權何謂伏脈一手無脈曰單伏兩手無脈曰雙伏若病初起頭痛發熱惡寒而脈伏者緣陰邪陷於陽中不得發越此欲汗而當攻之使邪氣退而正氣復脈自至而病自除如欲雨則天鬱熱晴霽天乃反涼之可見也若七八日以來別無刑剋證候或昏冒不知人事或脈全無者此欲汗而勿攻之如六合陰晦雨後庶物皆蘇換陽之吉兆也何謂可解不可解脈浮緩在表者以汗解之脈沉實在裡者以下解之脈沉遲在裡者以溫解之且夫浮汗沉下而溫固其宜也然浮宜下沉宜汗其故又何耶答曰浮而下者因大便難也設使大便不難豈敢下乎沉而汗者因表有熱也設使身不發熱豈敢汗乎何謂歇至如寒邪直中陰經溫之而斷續者為歇至何謂燥亂因汗下後脈當靜今反盛者曰燥亂大凶之兆也然則君子言有所據乎籲難言也此出經常大法之格語也客欣然起而謝曰予雖白首無窮生平仰慕不意邂逅幸獲開予茅塞正謂鼷鼠而發千鈞之弩甚所不當可謂切而磋琢而磨者也較今庸俗實醯雞坎蛙不知甕外之有天井外之有海耳感君發明於後豈非再來人乎遂筆錄以示之一提金貫珠數交霜降至春分冬月發者為正傷寒表證見者用辛熱之藥大發汗里證見者用寒涼之藥急攻下此與非時傷寒不同治方論開的本槌法中不再錄交春分至夏至前有頭疼發熱不惡寒而渴者為溫病用辛涼之藥微解肌不可大發汗里證見者用寒涼之藥急攻下若誤下之未必為害誤汗之變不可言當須識此三月後得此證者為晚發治法同表證不與冬時正傷寒同治法里證治相同方論開在的本槌法中不再錄交夏至後有頭疼發熱不惡寒而渴此名溫病愈加熱者名熱病只用辛涼之藥微解肌不宜大發汗里證見者只用大寒之藥急攻下表證不與正傷寒同治法里證治相同方論開在的本槌法中不再錄交秋至霜降前有頭疼發熱不惡寒身體痛小便短者名溫病亦用辛涼之藥加燥劑以解肌亦不宜大發汗里證見者用寒涼藥急攻下表證不與正傷寒同治法里證治相同方論開在的本槌法中不再錄其春夏秋三時有患頭疼身熱亦有惡寒者即是感冒非時暴寒之輕非比冬時正傷寒之重俱用辛涼之劑小發汗若里證見者用寒涼之藥急攻下表證不與正傷寒同治法里證治相同方論開在的本槌法中不再錄其四時有患頭疼發熱惡寒身體倦痛骨腿痠疼自汗出口微渴脈空浮大而無力名勞力感寒證當用溫涼之劑溫經散寒切禁大發汗里證見者中和之劑加轉藥微下之不可急攻利方論開在的本槌法中不再錄其四時有患頭疼身熱惡寒老幼相傳者名時疫證用辛涼之藥微解表里證見者急攻下從病制宜不與正傷寒同治法方論開在的本槌法中不再錄若先起頭疼發熱惡寒已後傳里頭疼惡寒皆除而反怕熱發渴譫語或潮熱自汗大便不通或揭去衣被揚手擲足或發斑黃狂亂此為陽經自表傳入陰經之熱證俱當攻裡下之設或當下失下而變出手足乍冷乍溫者因陽極發厥即陽證似陰名陽厥急當下之又有失於汗下或本陽證誤投熱藥使熱毒入深陽氣獨盛陰氣暴絕登高而歌棄衣而走罵詈叫喊燥渴欲死面赤眼紅身發斑黃或下利赤黃六脈大名陽毒發斑證用酸苦之藥令陰氣復而大汗解矣如大便實者又當大寒之藥下之此與發狂不同治方論開在的本槌法中不再錄若初病起無頭疼無身熱就便怕寒厥冷腹痛嘔吐瀉利不渴蜷臥沉重戰慄脈沉細此為直中陰經真寒證不從陽經傳來當用熱藥溫之如寒極而手足厥冷過乎肘膝者因寒極發厥名陰厥急當救里溫之此與陽厥不同治又有初病起外感寒邪內傷生冷內既伏陰內外皆寒或本真陰誤投涼藥使陰氣獨盛陽氣暴絕以致病起手足厥冷腰背強重頭眼眶痛嘔吐煩悶下利腹痛身如被杖六脈沉細渴飲不下已後毒氣漸深入腹攻心咽喉不利腹痛轉甚心下脹滿結硬如石燥渴欲死冷汗不止或時鄭聲指甲面色青黑速灸關元氣海須服大熱之劑溫之此名陰毒令陽氣復而大汗解矣若夏月大發熱頭疼燥渴背惡寒微汗脈虛無力口齒燥者名中暑用寒涼之劑清之方論開在雜證中不再錄若病人身微熱煩躁面赤戴陽欲坐臥於泥水井中脈來沉細無力此陰發躁名陰躁當用辛熱之藥溫之不宜涼劑誤用之其躁急渴甚必死矣若病人身冷脈沉細而疾雖煩躁不欲傾水入口者此名陰盛格陽亦用大熱之劑溫之方論開在的本槌法中不再錄一傷寒失於汗下使熱邪傳裡燥渴譫語小水自利大便黑小腹硬痛或身黃是下焦蓄血如狂證此與陽狂不同治宜下盡黑物則愈方論開在的本槌法中不再錄一傷寒初得病與表熱但狂言煩躁不安精采不與人相當此因熱結膀胱其人如狂太陽經之裡證也自有太陽經之裡藥治不與陽狂同治法方論開在的本槌法中不再錄一傷寒小水不利大便實小腹滿燥渴譫語怕熱身目黃此名濕熱發黃輕則疏利重則大下此與血證發黃不同治方論開在的本槌法中不再錄一傷寒失於汗下血熱不散故成發斑大抵不宜發汗輕則化之重則下之起於胸腹先紅後赤者曰發斑起於手足先紅後黃者曰蚊跡臨病之際宜詳審焉方論開在的本槌法中不再錄一傷寒少陰證惡寒發熱無頭疼誤以大發汗使血從耳目口鼻中出者名陰血多不治此與鼻衄陽血不同治方論開在的本槌法中不再錄一傷寒太陽證發熱惡寒頭痛或微喘鼻中出血者為衄血名陽血須分點滴成流此與陰血不同治方論開在的本槌法中不再錄一傷寒失於汗下邪熱傳裡使水涸糞燥大便不通必發譫語或心下硬痛下利純清水燥渴口出無倫語亦譫語凡此皆實當寒涼之劑下之又有汗多亡陽或下後利不止身疼痛或自利清穀譫語者凡此皆虛當辛熱之劑溫之此與狂言不相類方論開在的本槌法中不再錄一傷寒餘熱不除蘊在心包使精神短少冒昧昏沉睡中言語一二句者名獨語宜涼劑清之此與譫語不相類方論開在的本槌法中不再錄一傷寒因汗下後正氣虛而本音失則鄭重語散不知高下大小便自利手足冷名鄭聲宜中和之劑治之此與獨語不相類方論開在的本槌法中不再錄一傷寒瘥後交接淫欲無病人反得病者名陰陽易宜清涼解毒之劑治之此與女勞復不相類方論開在的本槌法中不再錄一傷寒瘥後交接淫樂不因易自病後發者名女勞復與前陰陽易同治法方論開在的本槌法中不再錄一傷寒失於汗下或因汗下後虛令人氣逆不相接續者名短氣分虛實治之此與喘證不相類方論開在的本槌法中不再錄一傷寒失於汗下或因飲水過多令人抬肩擷肚氣逆上者名發喘分表裡水氣治之此與短氣不相類方論開在的本槌法中不再錄一傷寒麻黃湯證誤下之心下滿悶不痛者名痞氣分虛實治之此與結胸不相類方論開在的本槌法中不再錄一傷寒桂枝湯證誤下之心下滿硬而痛名結胸分緩急治之此與痞滿不相類方論開在的本槌法中不再錄一傷寒證病一陽經或三陽經同病不傳者名合病分在經過經治之此與並病不相類方論開在的本槌法中不再錄一傷寒證一陽經先病未盡又過一經之傳者名並病分在經在腑治之此與合病不相類方論開在的本槌法中不再錄一傷寒或汗下太過或恣飲冷水水寒相搏虛逆聲濁惡而長名噦此與乾嘔不相類輕則和解疏利重則溫散方論開在的本槌法中不再錄一傷寒熱在胃口與穀氣並熱氣上熏無物名乾嘔分實熱水氣治之此與噦證不相類方論開在的本槌法中不再錄一傷寒有頭疼發熱惡寒脈沉此名太陽脈似少陰當辛溫之劑散之與少陰證不相類方論開在的本槌法中不再錄一傷寒無頭疼止則發熱惡寒脈沉此名少陰證似太陽當辛溫之劑散之與太陽證不相類方論開在的本槌法中不再錄一傷寒頭疼惡寒身熱者名表熱以辛散之與裡熱不相類方論開在的本槌法中不再錄一傷寒無頭疼無惡寒反怕熱燥渴口苦舌乾譫語大便實名裡熱此與表熱不相類方論開在的本槌法中不再錄一傷寒頭疼身熱惡寒者名表惡寒當辛甘散之此與里惡寒不相類方論開在的本槌法中不再錄一傷寒無頭疼無身熱而惡寒厥冷蜷臥不渴或吐瀉腹痛戰慄者名里惡寒當辛熱之劑溫之此與表惡寒不相類方論開在的本槌法中不再錄
